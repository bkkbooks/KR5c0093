front:
  text: 道德眞經集註序扉一
  hash: sha256:56916f774451524818ca0ef3155fa2ad0b3f7ab3d7ac2081dc93ba577d9b167e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0093_HFL_000-001a, image: hfl/0395/0395-004.png}
body:
  text: 唐明皇撰昔在元聖强著玄言權輿眞宗啓迪來裔遺文誠在精義頗乖撮其指歸雖蜀嚴而猶病摘其章句自河公而或略其餘浸徴固不足數則我玄元妙㫖豈其將墜朕誠寡薄嘗感斯文猥承有後之慶恐失無爲之理每因清宴輒叩玄關隨所意得遂爲箋注豈成一家之說但備遺闕之文今兹絶筆是詢於衆公卿臣庶道釋二門有能起予類於卜商鍼疾同於左氏渴於納善朕所虛懷苟副斯言必加厚賞且如諛臣自聖幸非此流懸市相矜亦云小道既其不諱咸可直言勿烏來者所嗤以重朕之不德左仙公葛玄撰老子體自然而然生乎太無之先起乎無因經歷天地終始不可稱載終乎無終窮乎無窮極乎無極故無極也與大道而倫化爲天地而立根布氣於十方抱道德之至純浩浩蕩蕩不可名也焕乎其有文章巍巍乎其有成功淵乎其不可量堂堂乎爲神眀之宗三光持以朗照天地禀以得生乾坤運以吐精高而無民貴而無位覆載無窮是教八方諸天普弘大道開闢以前復下爲國師代代不休人莫能知之匠成萬物不言我爲玄之德也故衆聖所共尊道尊德貴莫之命而常自然惟老氏乎周時復托神李母剖左腋而生生即皓然號曰老子老子之號因玄而出在天地之先無衰老之期故曰老子世人謂老子當始於周代老子之號始於無數之劫甚窈窈冥冥眇邈乆遠矣世衰大道不行西遊天下關令尹喜曰大道將隱乎願爲我著書於是作道德二篇五千文上下經焉夫五千文宣道德之源大無不包細無不入天人之自然經也余先師有言精進研之則聲參太極高上遥唱諸天歡樂則携契玄人靜思期眞則衆妙感會内觀形影則神氣長存體洽道德則萬神震伏禍滅九陰福生十方安國寧家孰能知乎無爲之文洿之不辱飾之不榮橈之不濁澄之不清自然也應道而見傳吿無窮常者也故知常曰眀大道何烏哉弘之由人斯文尊妙可不極精乎粗述一篇唯有道者寳之焉河上公者莫知其姓名也漢孝文皇帝時結草爲庵于河之濱常讀老子道德經文帝好老子之言詔命諸王公大臣州牧二千石朝直衆官皆令誦之有所不解數句天下莫能通者聞侍郞說河上公誦老子乃遣詔使齎所不了義問之公曰道尊德貴非可遥問也文帝即駕從詣之帝曰普天之下莫非王土率土之濱莫非王臣域中有四大王居其一也子雖有道猶朕民也不能自屈何乃高乎朕足使人富貴貧賤須臾河上公即捬掌坐躍冉冉在虚空之中如雲之升去地百餘丈而上玄虚良乆俛而答帝曰余上不至天中不累人下不居地何民之有陛下焉能令余富貴貧賤乎帝乃悟知是神人方下輦稽首禮謝曰朕以不德忝統先業才不任大憂於不堪雖治世事而心敬道德直以闇昧多所不了惟蒙道君弘愍有以教之則幽夕覩太陽之耀光河上公即授素書老子道德經章句二卷謂帝曰熟研此則所疑自解余注是經以來千七百餘年凡傳三人連子四矣勿示非其人文帝跪受經言畢失公所在論者以爲文帝好老子大道世人不能盡通其義而精思遐感仰徹太上道君遣神人特下教之便去耳恐文帝心未純信故示神變以悟帝意欲成其道眞時人因號曰河上公焉老子以上皇元年正月十二日丙午太歲丁卯下爲周師到無極元年太歲癸丑五月壬午去周西度關關令尹喜宿命合道預占見紫雲西邁知有道人當度仍齋潔燒香想見道眞以其年十二月二十五日老子度關也喜見老子迎設禮稱弟子老子曰汝應爲此宛利天下棄賢世傳弘大道子神仙者矣以二十八日中授太上道德經義洞虚無大無不包細無不入聖王不能盡通其義昔漢孝文皇帝好老子大道從容無爲之堂嘆凡聖無能解此玄奥精思遠感上徹太上道君遣神人下授文帝希徴之㫖道人即信誓傳授至人比字校定外儒所雜傳多誤今當參校此正之使與玄洞相應十方諸天人神仙天地鬼神所宗奉文同無一異矣吾己於諸天神仙大王校定受傳天人至士賢儒當宗極正眞弘道大度何可不精得聖人本文者乎吾所以有言此欲正玄妙於天地人耳今說至矣明矣夫學仙者必能弘幽賾也道士鄭思遠曰余家師葛仙公受太極眞人徐來勒道德經上下二卷仙公曩者所好如親見眞人教以口訣云此文道之祖宗也誦咏萬遍夷心注玄者皆必升仙尤尊是書日夕朝拜朝拜願念具如靈寳法矣學仙君子宜弘之焉仙公常秘此言無應仙之相好者不傳也王雱撰昔老子當道術之變故著書九九篇以明生生之理而末世爲學蔽於前世之緒餘亂於諸子之異論智不足以明眞僞乃或以聖人之經與楊墨之書比雖有讀者而燭理不深乃復高言矯世去理彌遠今世傳注釋王弼張說兩家經文殊舛互有得失害於理意者不一今輒參對定於至當而以所聞句爲之解聖人之言既爲難盡而又知之所及辭有不勝覽者以意逆志則吾之所發亦過半矣書成於熙寧三年七月十二曰竊嘗論曰聖人雖多其道一也生之相後越宇宙而同時居之相去異天壤而共處故其有言如首之有尾外此道者皆邪說也然而道一者言固不同言同者道固不一而世儒徒識其言故以言同者爲是不知其道故以道一者爲非易曰一陰一陽之謂道老子曰既得其母以知其子誠知是則推五行之殊觀四時之變視形度志以參萬物則聖雖不言吾其知之矣故道歲也聖人時也自堯舜至於孔子禮章樂明㝢之以形名度數而精神之運炳然見於製作之間定尊卑别賢否以臨天下事詳物衆可謂盛矣蓋於時有之則夏是也夏反而爲秋秋則斂其散而一之落其華而實之以辨物爲德以復性爲常其志靜其事簡夫秋豈期於反夏乎蓋將以成歲而生物也於是時也動植之死者過半然豈天命之至果非小智之所及邪秋蓋非歲之終也則又有至者焉故四時之變於吾有之則幼壯老死是也傳曰終身由之而不知其道者其是之謂乎嗚呼學道而不期於死之說則亦何以學爲哉朝聞道夕死可矣則所謂道者貴乎可以生死也誠知道德之誠而遡其所歸則死生之說盡矣故余盡心焉
