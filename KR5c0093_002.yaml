front:
  text: 道德真經集注卷之二靡二
  hash: sha256:89f308c601dec32dac4703ff2fe65df4841031350ea696bb49ad22ed474f38e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0093_HFL_002-001a, image: hfl/0395/0395-066.png}
body:
  text: 明皇河上公王弼王雱注天長地久章第七天長地久明皇曰標天地長久者欲明無私無心則能長能久結喻成義在乎聖人後身外身無私成私爾河曰説天地長生久壽以喻教人也天地所以能長且久者以其不自生河曰天地所以獨長且久者以其安靜施不求報不如人居處汲汲求自饒之利奪人以自與弼曰自生則與物爭不自生則物歸也故能長生明皇曰天地生物德用甚多而能長且久者以其資稟於道不自矜其生成之功故爾河曰以其不求生故能長生不終也雱曰自生則有其生有其生則生既喪矣唯無以生為則生未嘗生生未嘗生則所寓之形雖生而無生之纍宜其長且久也天地之不自生非利乎長久而然道固如此而已然所謂長久者亦瞬息之間耳唯蓋載傾陷而未嘗壞者乃其真也是以聖人後其身河曰先人而後己也而身先河曰天下敬之先以為長雱曰聖人雖聖而形與物齊唯其體天道而不爭乃能獨異於衆使其立己而與衆敵則匹夫匹婦皆足以勝之外其身河曰薄己而厚人也而身存明皇曰後身則人樂推故身先外身則心志淡泊故身存河曰百姓愛之如父母神明祐之若赤子故身常存雱曰有我而存之則物皆吾敵夫唯超然自喪不有吾身者物莫能傾之非以其無私邪河曰聖人為人所愛神明所祐非以其公正無私所致乎故能成其私明皇曰天地忘生養之功是無私而能長且久是成其私聖人後外其身是無私而能先能存是成其私也河曰人以為私者欲以厚己也聖人無私而己自厚故能成其私也弼曰無私者無為於身也身先身存故曰能成其私也雱曰聖人無私未嘗有我故也使計而為之則私敦甚焉上善若水章第八上善若水明皇曰將明至人上善之功故舉水性幾道之喻河曰上善之人如水之性雱曰水者五行之首方出空無而入實有者也離道未遠故其性最近道蓋離道則善名立矣上善若水物理自然水善利萬物河曰水在天為霧露在地為泉源也而不爭處衆人所惡河曰衆人惡卑濕垢濁水獨靜流居之也弼曰人惡卑也雱曰處一本作居故幾於道矣明皇曰幾近河曰水性幾與道同弼曰道無水有故曰幾雱曰人有心心為火火騰上而明故好爭唯忘心體道者能利物而無心勝物也居善地明皇曰上善之人處身柔弱亦如水之居地潤益一切地以卑用水好下流河曰水性善喜於地在草木之上即流而下有以於地動而下人也雱曰趣下而流心善淵明皇曰用心深靜亦如水之泉停矣河曰水深空虛淵深清明雱曰深靜而乎內明外晦與善仁明皇曰施與合乎至仁亦如水之滋潤品物矣河曰萬物得水以生與虛而不與盈也言善信明皇曰發言信實亦如水之行險不失其信矣河曰水內影照形不失其情也雱曰萬逝必東政善治明皇曰從政善理亦如水之洗滌羣物令其清靜矣河曰無有不洗清且平也雱曰任理而不任情積柔弱而勝重大事善能明皇曰於事善能因任亦如水性方圓隨器不滯於物河曰能方能圓曲直隨形雱曰唯變所適故無不能也動善時明皇曰物感而應不失其時亦如水之春泮冬凝矣河曰夏散冬凝應期而動不失天時雱曰決之則流壅之則止不先物動亦不失時夫唯不爭河曰壅之則止決之則流聽從人也故無尤矣明皇曰上善之人虛心順物如彼水性壅止決流既不違忤於物故無過尤之地河曰水性如是故天下無有怨尤水者也弼曰言水皆應於此道也雱曰水體一而物莫能易故能兼此諸善蓋有德於物而常下物是以有德使有心於為德則不能成德矣故篇終又言之持而盈之章第九持而盈之不如其已明皇曰執持盈滿使不傾失積財為纍悔吝必生故不如其已已止也河曰盈滿也已止也持滿必傾不如止也弼曰持謂不失德也既不失其德又盈之勢必傾危故不如其已者謂乃更不如無德無功者也雱曰持而盈之有意於有所以失之唯忘有有之為有而有之以無有則無失無溢矣揣而鋭之不可長保明皇曰揣度鋭利進取榮名富貴必驕坐招殃咎故不可長保河曰揣治也先揣之後必棄捐弼曰既揣末令尖又鋭之令利勢必摧衄故不可長保也雱曰揣者巧於度情鋭者利於入物且事物無盡而吾持一身以遇其變則揣鋭之工有時困矣豈可長保乎故至人因時乘理而接之以無我則其出無方而所應不窮也金玉滿堂莫之能守明皇曰此明盈難久持也河曰嗜欲傷神財多纍身弼曰不若其已雱曰實外物而守之所守非所有也豈能久乎富貴而驕自遺其咎明皇曰此明鋭不可揣也驕猶心生故咎非他與河曰夫富當賑貧貴當憐賤而反驕恣必彼禍患也弼曰不可長保也雱曰驕生於恃外恃外之人何足算乎四者皆以己有物與為驕者同纍然自持盈而下每失彌甚功成名遂身退天之道明皇曰功成名遂者當退身以辭盛亦如天道盈虛有時則無憂患矣河曰言人所為功成事立名迹稱遂不退身避位則遇於害此乃天之常道也譬如日中則移月滿則虧物盛則衰樂極則哀弼曰四時更運功成則移雱曰寒暑相推物極則返陰陽代運天道回然而世之愚者一遭其變一犯其名則終身有之認以為己曾不知造化之密移吉凶之倚伏故終至於坐蒙憂患無以自存唯至人不然藏金玉而不寶居富貴而不榮凡物之來寄者如陰影集身窅然不知其在彼邪在我邪然則豈持盈以為慎揣鋭以為工乎苟非無我之妙其何以與於此天之道大矣而莫尚乎是載營魄章第十載營魄河曰營魄魂魄也人載魂魄之上得以生當愛養之喜怒亡魂卒驚傷魄魂在肝魄在肺美酒甘肴傷人肝肺故魂靜志道不亂魄安德壽延年也雱曰魄陰物形之主也神之為物廣大通達而不自了者神常載於魄故神反拘於形體此廣者所以狹通者所以滯也欲學此道者當先廓其志氣勿纍於形體使神常載魄而不載於魄則可以抱一而體神矣竊嘗論曰人之既死有升沉之異者良由滅神徇形以神從魄故至於淪乎幽陰化為異物也若夫神完之人雖魄之陰滯將與神為一而無所不之矣聖人之死日神不從魄也其始也亦載魄而已抱一能無離乎明皇曰人生始化曰魄既生魄陽曰魂魄則陰虛魂則陽滿言人載虛魄常須營護復陽陽氣充魄則為魂魂能運動則生全矣一者不雜也復陽全生不可染雜故令抱守淳一能無離身乎河曰言人能抱一使不離於身則長存一者道始所生太和之精氣也故曰一布名於天下天得一以清地得一以寧侯王得一以為正平入為心出為行布施為德總名為一一之為言志一無二也弼曰載猶處也營魄人之常居處也一人之真也言人能處常居之宅抱一清神能常無離乎則萬物自賔也雱曰一者精之數不言精而言一者守一則精不搖矣學道歸乎復性復性歸乎體神所以不能神者由逐末忘本以物易己故喪精失靈沉為下愚也陰陽之靈曰魂魄魂陽故遊遊而止我身者以魄為之配也魄陰故營營止也故學者必先寧其志氣使精魄靜一魄止則魂定精一則神全矣一生水水為精人之初生因精集神本自渾全而不能了者常至於離析隳散其名曰罔兩罔者神不明兩者精不一也莊子曰無搖汝精抱一之謂也蓋精神水火之象火無常形因膏顯照神則廓然無體不可致工但當存精而己如增膏而火明培根而葉茂也魂魄精神既不虧耗然後心強氣順不為物使靜則體道作則契理妙而極之則與神為一更絶四名矣此學者之至要萬世聖賢皆由此義求不在外當由心得之專氣致柔能如嬰兒乎明皇曰專一沖氣使致和柔能如嬰兒無所分别乎河曰專守精氣使不亂則形體能應之而柔順能如嬰兒內無思慮外無政事則精神不去也弼曰專任也致極也言任自然之氣致至柔之和能若嬰兒之無所欲乎則物全而性得矣雱曰人生有三曰精曰神曰氣精全則神全神全則能帥氣矣神衰而不足以帥氣則氣作不常使人陷於非道孟子曰志者氣之帥也楊雄曰氣者所適善惡之馬歟帥懦而衆悖則師必亡馬怒而御疲則車必敗神不能專氣則喜怒哀樂唯氣所為沈陷越佚理固然也古之士無不曉此苟未及此則當清心以防之孔子所謂三戒皆防氣也門人獨顔回能專氣故曰不遷怒氣之暴在陽而陽之發者莫暴於怒於怒可以無遷則非專氣而何人生本具聖質氣佚而不能專故自壯以往離道彌遠能抱一則神全神全則氣柔氣柔則真全所以與嬰兒同專者有而擅其權之謂滌除玄覽河曰當洗其心使潔清也心居玄冥之處覽知萬事故謂之玄覽也能無疵乎明皇曰玄覽心照也疵瑕病也滌除心照使令清靜能無疵病乎河曰不淫邪也弼曰玄物之極也言能滌除邪飾至於極覽能不以物介其明疵之其神乎則終與玄同也雱曰能專氣則性定性定則智明智明則可以蕩滌除去而玄覽至理矣既燭其理則世間萬態同為至妙儻睹一疵則非識理也愛民治國河曰治身者愛氣則身全治國者愛民則國安能無烏乎明皇曰愛養萬人臨理國政能無為乎當自化矣自上營魄皆教修身身修則德全故可為君矣河曰治身者呼吸精氣無令耳聞也治國者布施惠德無令下知也弼曰任術以求成運數以求匿者智也玄覽無疵猶絶聖也治國無以智猶棄智也能無以智乎則民又僻而國治也雱曰如上説為己之道盡矣然則可以其餘及人也老子之言專於復性有為則非所以使民安性故雖愛治而不尚有為此道之至也天門開闔河曰天門謂北極紫微宫開闔謂終始兩際也治身天門謂鼻孔開謂喘息闔謂呼吸也能烏雌乎明皇曰天門歷數所從出開闔謂理亂言人君應期受命能守雌靜則可以永終天祿矣又解云易曰一闔一闢謂之變言聖人撫運應變無常不以雄成而守雌牝亦如天門開闔虧盈而益謙也河曰治身當如雌牝安靜柔弱治國應變和而不唱弼曰天門謂天下之所由從也開闔治亂之際也或開或闔經通於天下故曰天門開闔也雌應而不唱因而不為言天門開闔能為雌乎則物自賔而處自安矣雱曰至人無心於作精神出入皆應而不唱莊子所謂有物采之者老子於四時當秋其德主金靜一復性者也故其尚如此至於易則先天後天無非道者明白四達河曰言道明白如日月四達滿於天下八極之外故曰視之不見聽之不聞彰布之於十方焕焕煌煌也能無知乎明皇曰人君能為雌靜則萬姓樂推其德明白如日四照猶須忘功不宰故曰能無知乎河曰無有能知道滿於天下者弼曰言至明四達無迷無迷無惑能無以為乎則物化矣所謂道常無為侯王若能守則萬物自化雱曰理無足知知以應物既知至理則自當無知唯能無知故無所不知也如昭然有知則是不知無知之妙何足謂知也竊嘗論之聖智下愚本無殊品因愚顯智乃有聖名聖人本心何嘗自聖故明白四達而初無所知乃真聖人之知也生之畜之河曰道生萬物而畜養之弼曰不塞其原也不禁其性也雱曰道備如上則造化在我可以生畜萬物矣生而不有河曰道生萬物無所取有雱曰道生萬物物之與道常為一體誰有之者烏而不恃河曰道所施為不恃望其報也雱曰不得已而為為於已然之時雖有為之之功而超然自喪豈復矜恃哉長而不宰河曰道長養萬物不宰割以為器用雱曰道如上文則可長天下以無為矣雖在物上如標枝然豈有分割之功乎是謂玄德明皇曰令物各遂其生而畜養之遂生而不以為有修為而不恃其功居長而不為主宰人若能如此者是謂深玄之德矣河曰言道行德玄冥不可得見欲使人如道也弼曰不塞其源則物自生何功之有不禁其性則物自濟何為之情物自長足不吾宰成有德無主非玄如何凡言玄德皆有德而又知其主出乎幽冥雱曰玄為妙體德之至也昔舜在側微書聞玄德蓋至德常在於無思無為此篇之義主於無為故雖為長而德猶稱玄也此篇自為士以至於體神入聖修身之序盡矣三十輻章第十一三十輻共一轂河曰古者車三十輻法月數也共一轂者轂中有孔故衆輻共湊之治身者當除情去欲使五藏空虛神乃歸之也治國者寡能總衆弱共扶強當其無有車之用明皇曰此明有無功用相資而立三十輻者明造車共一轂者因言少總衆夫轅廂之有共則成車車中空無乃可運用若無轅廂之有亦無所用之車車中若不空無則轅廂之有皆為棄物矣河曰無謂空虛轂中空虛輪得轉行輿中空虛人得載其上也弼曰轂所以能統三十輻者無也以其無能受物之故故能以實統衆也雱曰共一本作用埏埴以烏器河曰埏和也埴土也和土以為飲食之器當其無有器之用明皇曰埏和也埴土也陶匠和土為瓦缶之器河曰器中空虛故得有所盛受鑿户牖以為室河曰謂作屋室當其無有室之用明皇曰古者陶穴以為室宇亦開户牖故云鑿爾河曰言户牖空虛人得以出入觀視室中空虛人得以居處是其用也雱曰凡此三物或運轉或貯盛或居處而皆以無有為用故有之以為利河曰利物也利於形用器中有物室中有人恐其屋破壞腹中有神畏形之消亡也無之以為用明皇曰有體利無以無為利無體用有以有為用且形而上者曰道形而下者曰器將明至道之用約形質以彰故借粗有之用無以明妙無之利有爾河曰言虛空者乃可用盛受萬物故曰虛無能制有形道者空也弼曰木埴璧所以成三者而皆以無為用也言無者有之所以為利皆賴無以為用也雱曰無非有對因有有無於無之中復有妙有不窮之用妙有之功若夫有物之有具存形質非能應於不窮者也故但為利利陰屬也雖然此有無之論耳極而言之則無不離有有亦真無非有非無乃真妙有也五色章第十二五色令人目盲河曰貪淫好色則傷精失明也五音令人耳聾河曰好聽五音則和氣去心不能聽無聲之聲五味令人口爽明皇曰目悅青黃之觀耳耽宫徵之音口嗛芻豢之味傷當過分則坐令形骸聾盲河曰爽亡也人嗜五味於口則口亡言失於道味也雱曰人生而靜目物有遷耳自本自希夷而聲色在前真從妄喪口之於味亦復如此故昧於聲聲色色味味之妙者聲色味也馳騁田獵令人心發狂明皇曰馳騁代務執著有為如彼田獵唯求殺獲曰以心鬥逐境奔馳靜而思之是發狂病河曰人精神好安靜馳聘呼吸精神散亡故發狂也弼曰爽差失也失口之用故謂之爽失耳目心口皆順其性也不以順性命反以傷自然故曰盲聾爽狂也雱曰足於內則得逐於外則惑故馳聘田獵血氣俱作心為發狂明逐物失性難得之貨令人行妨明皇曰性分所無求亦不得妄求難得故令道行有所妨傷河曰妨傷也難得之貨謂金銀珠玉心貪意欲不知厭足則傷身辱也弼曰難得之貨塞人正路故令人行妨也雱曰難得之貨非適於養已而愚者妄以為美因毁行以求之唯明乎天下之良貴與夫有萬之富則外物莫能傷矣是以聖人烏腹河曰守五性去六情節志氣養神明不為目河曰目不妄視妄視泄情於外故去彼取此明皇曰取此含受之腹去彼妄視之目河曰去彼目之妄視取此腹之養性弼曰為腹者以物養己為目者以目役己故聖人不為目也雱曰腹無所不容目觸類分别寵辱章第十三寵辱若驚明皇曰操之則栗捨之則悲未忘寵辱故皆驚也河曰身寵亦驚身辱亦驚雱曰心榮於見寵則辱孰甚焉貴大患若身明皇曰身為患本故矜貴其身即如貴大患矣此合云貴身如貴大患而乃云貴大患如身者欲明起心貴身即是大患有貴即身是大患故云貴大患如身若此也此上兩句正標河曰貴畏也若至也畏大患至身故皆驚雱曰有貴而纍其心則其患大矣如人有身動輒自纍何謂寵辱河曰問何為寵何為辱寵者尊榮辱者耻辱及身還自問者以曉人也雱曰一本此有若驚二字非也若曰寵乃世之所榮何以為辱乎設問以發下文寵為下明皇曰前標寵辱如驚恐人不了故問何謂寵辱夫得寵驕盈無不生禍是知寵為辱本故答云寵為下河曰辱為下賤雱曰受寵於人則為下之道趙孟能賤之者寵於人者也凡生莫不有真君足以高天下莫不有真宰足以製萬物而愚者失其良貴逐物求榮與奪之權在人之乎而吾之憂喜繫於得失豈不早且惑乎驚生於有愛而畏奪故有寵之纍如驚也彼三仕三已而無喜愠之色者固驚乎謂誰受寵而不自榮則居寵而非辱矣得之若驚河曰得寵榮驚者處高位如臨危也貴不敢驕不敢奢失之若驚河曰失者失寵處辱也驚者恐禍重來也是謂寵辱若驚明皇曰寵辱循環寵為辱本凡情惑滯雖辱而不驚寵故聖人戒云汝之得寵當如汝得辱而驚則汝之失寵得辱亦如吾戒汝得寵而驚懼也故結云是謂寵辱若驚弼曰寵必有辱榮必有患驚辱等榮患同也為下得寵辱榮患若驚則不足以亂天下也雱曰為其得失之際有若驚之心是以辱也何謂貴大患若身明皇曰恐人不曉即身是患本故問之河曰復還自門何故畏人若身弼曰大患榮寵之屬也生之厚必入死之地故謂之大患也人迷之於榮寵返之於身故曰大患若身也雱曰貴者在物之上而有國家有之而不能忘則為患大矣譬人有身珍而纍之則寒暑疾痛萬緒皆作豈非大患乎市南子曰堯非有人非見有於人者也貴者有人寵者見有於人唯聖人能免此二者吾所以有大患者為吾有身明皇曰身相虛幻本無真實為患本者以吾執有其身痛癢寒溫故為身患河曰吾所以有大患者為吾有身憂其勤勞念其飢寒觸情從欲則遇禍患也弼曰由有其身也及吾無身弼曰歸之自然也吾有何患明皇曰能知天地委和皆非我有離形去智了身非身同於大通夫有何患河曰使吾無有身體得道自然輕舉升雲出入無間與道通神當有何患雱曰萬物與我為一則與道玄同而萬變皆忘吉凶息矣而愚者不能自解恃形為己故形之所遭觸途生患老子先明寵貴之纍而寵貴之纍皆緣有身而生故因譬貴之若身遂及無身之妙莊子曰忘其所不忘而不忘其所忘是之謂誠忘亦明此義而孔子毋我理與是同學期於此而已然所謂無者豈棄而去之乎但有之而未嘗有則不纍矣且崇高莫大乎富貴誠能有之以無有則聖人所為濟世也亦何患之有其於寵也亦若斯而已矣故貴以身為天下若可寄天下河曰言人君貴其身而賤人欲為天下主者則可以立不可以久也弼曰無物以易其身故曰貴也此乃可以託天下也愛以身為天下若可託天下明皇曰此章首標寵辱之戒後以託寄結成者夫寵辱若驚未忘寵辱貴愛以為未忘貴愛故以辱校寵則辱不如寵以貴方愛則貴不如愛驚寵辱者尚有寵辱介懷存貴愛者未為兼忘天下故初則使驚寵如辱後欲令寵辱俱忘假寄託之近名辨兼忘之極致忘寵辱則無所復驚忘身則無為患本忘天下則無寄託之近名河曰言人君能愛其身非為己也乃欲為萬民之父母以此得為天下主者乃可以託其身於萬民之上長無咎也弼曰無物可以損其身故曰愛也如此乃可以寄天下也不以寵辱榮患損易其身然後乃可以天下傳之也雱曰聖人無身故土苴足以堯舜有身而為之則纍矣苟未及乎無身則唯尊生重本不以物易己者如可以寄託天下貴者不辱其身愛者不危其身子州支父王子搜之徒是也若此二人者豈榮其寵纍其貴乎一本作可以託天下矣可以寄天下矣此王弼取南華為定非是視之不見章第十四視之不見名曰夷明皇曰此明道也夷平易也道非色故視不可見以其於無色之中能色故詔曰夷河曰無色曰夷言無采色不可得視而見之雱曰道至於萬法平等無有高下之處非目所睹聽之不聞名曰希明皇曰希者聲之微也道非聲故聽之不聞以其於無聲之中獨能和焉故好曰希河曰無聲曰希言一無音聲不可得聽而聞之雱曰物相感觸乃有聲響大道不與物鄰用心求之其去已遠故曰希則經所謂大音也搏之不得名曰徴明皇曰摶執持也微妙也道無形故執持不得以其於無形之中而能物焉故詔曰微河曰無形曰微言一無形體不可摶持而得之此三者不可致詰河曰三者謂夷希微也不可致詰者夫無色無聲無形口不能言書不能傳當受之靜求之以神不可詰問而得之也故混而烏一明皇曰三者將以詰道道非聲色形法故詰不可得但得希夷微爾道非希夷微故復混而為一河曰混合也故合於三名之而為一弼曰無狀無象無聲無響故能無所不通無所不往不得知更以我耳目體不知為名故不可致詰混而為一也雱曰三者本一體而人所以求之者或以視或以聽或以摶故隨事強名雖然所用求者與夫所欲求者未嘗不一也唯了吾一則與彼一吻然為一矣其上不皎河曰言一在天上不皎皎光明其下不昧明皇曰在上必明在下者必昧唯道於上非上在上亦不明於下非下在下亦不昧河曰言一在天下不昧昧有所暗冥雱曰凡物有質則具陰陽上皎下昧理必然也唯道無物故混然而成此言道之定體莊子曰失吾道者上見光而下為土繩繩兮不可名河曰繩繩者動行無窮極也不可名者非一色也不可以青黃白黑别非一聲也不可以宫啇角徵羽聽非一形也不可以長短大小度之也復歸於無物明皇曰繩繩者運動不絶之意不皎不昧運動無窮生物之功名目不得非物能物故常生物而未始有物妙本湛然故云復歸於無物河曰物質也復當歸之於無質雱曰道有常度其理可信故曰繩繩雖繩而實無定體故不可名要其極也未始有物至矣不可加矣是謂無狀之狀河曰言一無形狀而能為物作形狀也雱曰有而不可見無物之象河曰一無物質而為萬物設形象也弼曰欲言無邪而物由以成欲言有邪而不見其形故曰無狀之狀無物之象也雱曰有而不可得是謂惚恍明皇曰是謂無形狀之狀無物質之象不可名有不可名無無有難名故謂之惚恍河曰一忽忽恍恍若存若亡不可見之也弼曰不可得而定也雱曰忽者有之疑於無恍者無之疑於有道之為物非有非無不可定名迎之不見其首河曰一無端末不可預待也除情去欲一自歸之也隨之不見其後明皇曰無始故迎之不見其首無後故隨之不見其後河曰言一無影迹不可得而著雱曰物有定體乃分前後道既無形敦為首尾此言道之運用故可迎隨雖曰迎隨而迎隨在物道未嘗異執古之道以御今之有明皇曰執古無為之道以御今有為之事則還反淳朴也河曰聖人執守古道主一以御物知今當有一也弼曰有有其事雱曰古之道謂古今常一之道唯其古今常一故可御世故之萬變能知古始雱曰推而上之至於無初之初乃知物無所從來則道之情得矣是謂道紀明皇曰能知古始所行是謂道化之綱紀河曰人能知上古本始有一是謂知道綱紀也弼曰無形無名者萬物之宗也雖今古不同時移俗易故莫不由乎此以成其治者也故可執古之道以御今之有上古雖遠其道存焉故雖在今可以知古始也雱曰道之紀要古今不變者是則莊子所謂無端之紀也道德真經集注卷之二
