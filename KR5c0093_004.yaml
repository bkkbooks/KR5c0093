body:
  text: 明皇河上公王弼王雱注希言自然章第二十三希言自然明皇曰希言者忘言也不云忘言而云希者明因言以詮道不可都忘悟道則言忘故云希爾若能因言悟道不滯於言則合自然矣河曰希言者謂愛言也愛言者自然之道弼曰聽之不聞名曰希下章言道之出言淡兮其無味也視之不足見聽之不足聞然則無味不足聽之言乃是自然之至言也雱曰希與上篇聽之不聞者同自然者不因物而然也希不與物並而無所交感獨出於萬法之上故曰自然故飄風不終朝驟雨不終日明皇曰風雨飄驟則暴卒而害物言疾執滯則失道而生迷河曰飄風疾風也驟雨暴雨也言疾不能長暴不能久也雱曰風雨者陰陽交感所為飄驟者交感之過所以不能久孰為此者天地河曰孰誰也誰為此飄風暴雨者乎天地所為天地尚不能久河曰不終於朝暮也而况於人乎眀皇曰天地至大欲為暴卒則傷於物尚不能久以况於人執言滯教則害於道欲求了悟其可得乎河曰天地至神合為飄風暴雨尚不能使終朝至暮何况人欲為暴卒乎弼曰言暴疾美興不長也故從事於道者明皇曰故從事於道之人當不執滯言教河曰從為也人為事當如道安靜不當如飄風驟雨道者同於道明皇曰體道忘言則同於道矣河曰道者謂好道人也同於道者所為與道同弼曰從事謂舉動從事於道者也道以無形無為成濟萬物故從事於道者以無為為君不言為教綿綿若存而物得其真與道同體故曰同於道雱曰一本無下道者二字德者同於德明皇曰德者道用之名人能體道忘功則其所施為同於道用矣河曰德謂好德人也同於德者所為與德同也弼曰得少也少則德故曰得也行得則與得同體故曰同於得也失者同於失明皇曰執言滯教無由了悟不悟則迷道故自同於失矣河曰失謂任己失人也同於失者所謂與失同也弼曰失纍多也纍多則失故曰失也行失則失與失同體故曰同於失也雱曰一本德作得同於道者道亦得之河曰與道同者道亦樂得之也同於德者德亦得之河曰與德同者德亦樂得之也同於失者失亦得之明皇曰方諸挹水陽燧引火類族辨物斷焉可知河曰與失同者失亦樂失之也弼曰言隨行其所故同而應之雱曰凡人之生不待物而有所謂獨化者是也不待物而有則固希而自然矣而失性者妄有我體而從事於道故屈己以從道然則道為之主而吾所謂其君者反臣於道矣故從事於道者有此道德失之三等而同歸於失此由不冥於希而立己待物離一為二而交感生患也信不足河曰君信不足於下下則應君以不足也有不信明皇曰執言滯教不能了悟是於信不足也自同於失失亦樂失是有不信也河曰此言物類相歸同聲相應雲從龍風從虎水流濕火就燥自然之類也弼曰忠信不足於下焉有不信也雱曰降乎希則失性命之常於信為不足上於信不足則下必至乎不信此又明修己治人皆嘗用希跂者不立章第二十四跂者不立河曰跂進也謂貪權慕名進取功榮也則不可久立身行道也弼曰物尚進則失安故曰企者不立跨者不行明皇曰跂舉踵而望也跨以跨夾物也以喻自見求明明終不得何異夫跂求久立跨求行履乎河曰自以為貴而跨於人衆共蔽之使不得行雱曰不適其形之常故失性之用自見者不明明皇曰靈才揚己動而見尤故不明河曰人自見其形容以為好自見所行以為應道殊不自知其形醜操行之鄙自是者不彰明皇曰是己非人直為怨府故不彰河曰自以為是而非人衆共蔽之使不得彰明自伐者無功明皇曰專固伐取物所不與故無功河曰所為而自伐取其功美即失有功於人也自矜者不長明皇曰矜衒行能人所鄙薄故不長河曰好自矜大者不可以長久其在道也曰餘食贅行河曰贅貪也使此自矜伐之人在治國之道曰賦斂餘祿食為貪行弼曰其唯於道而論之若郤至之行盛饌之餘也本雖美更可穢也本雖有功而自伐之故更為疣贅者也雱曰皆在分外物或惡之河曰此人在位動欲傷害故物無有不畏惡也故有道者不處也明皇曰自見等行於道而論是曰殘餘之食疣贅之行凡物尚或惡之故有道之人不處斯事矣河曰言有道之人不居其國也有物混成章第二十五有物混成先天地生明皇曰將欲明道立名之由故云有物言有物混然而成含孕一切尋其生化乃在天地之先生河曰謂道無形混然而成萬物乃在天地之前弼曰混然不可得而知而萬物由之以成故曰混成也不知其誰之子故先天地生雱曰道之中體混然而成其視天地亦由一物耳而此特云先天地者老氏將斂天下之散亂迷錯而復之性本故且舉混成而已蓋由萬殊而觀則此為道之全而由道本以觀則雖混成者猶散殊也目之為物則明更有物物之妙耳寂兮寥兮雱曰混成無象獨立而不改河曰寂者無音聲寥者空無形獨立者無匹雙不改者君子常弼曰寂寥無形體也無物之匹故曰獨立也返化終始不失其常故曰不改也雱曰混成之體常而不易周行而不殆河曰道通行地無所不入在陽不燋記陰不竊無不貫穿不危殆雱曰混成之用也萬物由我以生死我常制其命敦能危之可以為天下母明皇曰有物之體寂寥虛靜妙本湛然常寂故獨立而不改應用遍於群有故周行而不危殆而萬物資以生成彼其茂養之德故可以為天下母河曰道育養萬物精氣如母之養子弼曰周行無所不至而免殆能生全大形也故可以為天地母也吾不知其名弼曰名以定形混成無形不可得而定故曰不知其名也字之曰道河曰我不見道之形容不知當何以名之見萬物皆從道所生故字之曰道也弼曰夫名以定形字以稱可言道取於無物而不由也是混成之中可言之稱最大也强之名曰大明皇曰吾見有物生成隱無名氏故以道生表其德字之曰道以包含目其道而名曰大河曰不知其名强曰大者高而無上羅而無外無不包容故曰大也弼曰吾所以字之曰道者取其可言之稱最大也責其字定之所由則繫於大大有繫則必有分有分則失其極矣故曰强為之名曰大雱曰道譬萬物則無乎不周可謂大矣雖然大名既立全體已虧大曰逝河曰其為大非若天常在上非若地常在下乃復逝去無常處所也弼曰逝行也不守一大體而已周行無所不至故曰逝也雱曰大則有用逝者周行攖物功用著矣逝曰遠河曰言遠者窮乎無窮布氣天地無所不通也雱曰道之為用無所不極可謂遠矣而去本亦遠矣此謂混成而已若道之至則非遠非近也遠曰反明皇曰妙用無方强名不得故自大而求之則逝而往矣自往而求之則遠不及矣若能了悟則反在於身心而證之矣河曰言其遠不越絶乃復在人身也弼曰遠極也周無所不窮極不偏於一所故曰遠也不隨於所適其志獨立故曰返也雱曰有為有形復歸於無事無物往來不窮終則有始也故道大天大地大王亦大明皇曰因其所大而明之得一者天地王也天大能覆地大能載王大能法地則天行道故云亦大河曰道大者包羅諸天地無所不容也天大者無所不蓋也地大者無所不載也王大者無所不制也弼曰天地之性人為貴而王是人之主也雖不職大亦復為大與三匹故曰王亦大也雱曰天地能體道故皆大王者在帝皇之下人道之至處凡老氏之說言道之中體未盡絶際姑盡性而已王以歸往為名能盡人之性則人歸之矣猶百谷之宗江海也盡性則體道故示大域中有四大弼曰四大道天地王也凡物有稱有名則非其極也言道則有所由有所由然後謂之為道然則是道稱中之大也不若無自之大也無稱不可得而名曰域也道天地王皆在乎無稱之內故曰域中有四大者也雱曰道之中體因物而名故未離域中而王處一焉明皇曰王者人靈之主萬物繫其興亡將欲申其鑒戒故云而王居其一欲警王令有所法謂下文也河曰八極之內有四大王居一也弼曰處人主之大也雱曰一本云王居其一焉人法地河曰人當法地安靜和柔也種之得五穀掘之得甘泉勞而不怨也有功而不置也雱曰言王舉人之盡性者此復言人者明王德止於人事人性自具王德也地法天河曰天湛泊不動施而不求報生長萬物無所收取天法道河曰道清靜不言陰行精氣萬物自成也道法自然明皇曰人謂王也為王者先當法地安靜既爾又當法天運用生成既生成已又當法道清靜無為令物自化人君能爾者即令道法自然之性河曰道長生自然無所法也弼曰法謂法則也人不違地乃得全安法地也地不違天乃得全載法天也天不違道乃能全覆法道也道不違自然方乃得其性法自然者在方而法方在圓而法圓於自然無所違也自然者無稱之言窮極之辭也用智不及無知而形魄不及精象精象不及無形有儀不如無儀故道相法也道法自然天故資焉天法於道地故則焉地法於天人故象焉所以為主其一者主也雱曰自然在此道之先而猶非道之極致假物而言則此四者如以次相法而至論則四者各不知其所始非有先後莊子曰季真之莫為接子之或使在物一曲佛氏曰非因非緣亦非自然自然者在有物之上而出非物之下此說在莊佛之下而老氏不為未聖者教適其時而言不悖理故也使學者止於自然以為定論則失理遠矣不可不察也重為輕根章第二十六重烏輕根明皇曰重者制輕故重為根河曰人君不重則不尊治身不重則失神草木之華輕故零落根重故長存也靜為躁君明皇曰靜者制動故靜為君河曰人君不靜則失神治身不靜則身危龍靜故能變化虎躁故夭虧也弼曰凡物輕不能載重小不能鎮大不行者使行不動者制動是以重必為輕根靜必為躁君也是以君子終曰行不離輜重明皇曰輜車也重者所載之物也輕躁者貴重靜亦由行者之守輜重故失輜重則遭凍餒好輕躁則生禍亂河曰輜靜也聖人終日行道不離其靜與重也弼曰以重為本不離雱曰行以輕為速而必籍輜重以自給遠而違之則必因於中道矣雖有榮觀燕處超然明皇曰人君者守重靜故雖有榮觀當須燕爾安處超然不顧河曰榮觀謂宫闕燕處后妃所居也超然遠避而不處也弼曰不以經心之也雱曰雖有榮觀在前必得燕處之處乃能安身此明躁靜之義如何萬乘之主河曰如何者疾時主傷痛之辭萬乘之主謂王者而以身輕天下眀皇曰如何者傷嘆之辭也天下者大寶之位也言人君如何以身從欲輕用其身令亡其位乎河曰王者至尊而以其身行輕躁乎疾時王奢恣輕淫也雱曰人主以天下為根不可以一身故輕之輕則失臣河曰王者輕淫則失其臣治身而淫則失其精躁則失君明皇曰君輕易則人離散故失臣臣躁求則主不齒故失君河曰王者行躁疾則失其君位治身躁疾則失其精神也弼曰輕不真重也失本為喪身也失君謂失君位也雱曰臣一作本善行章第二十七善行無轍迹明皇曰於諸法中失了真性行無行相故云善行如此則心與道冥故無轍迹可尋求也河曰善行道者求之於身不下堂不出門故無轍迹弼曰順自然而行不造不始故物得至而無轍迹也雱曰體神則周行而無迹且聖人不得已而有行則常不使迹著於世恐民之遷其德耳莊子所謂行而無迹者是善言無瑕謫明皇曰能了言教不為滯執遣象求意理證言忘故於言教中無瑕疵謫過河曰善言謂擇言而出則無瑕疵非過於天下弼曰順物之性不别不折故無取謫可得其門也雱曰巵言日出出不以心故言滿天下而實未嘗言何瑕謫之有善計不用籌算明皇曰能了諸法本無二門一以貫之不生他見故無勞用文自非天下計無計相非善而何河曰善以道計專者則守一不移所計不多則不用善策而可知也弼曰因是乎數不假形也雱曰一生二二生三自此以往巧曆不能計唯冥於一相不墮諸數則身外無物物來即了何假籌算乎一本作善計無籌策善閉無關揵而不可開明皇曰兼忘言行不入異門心無逐乎境無起心之纍雖無關揵其可開乎雱曰藏於不得遁而閉之以無外則閉外無物敦能開之易所謂退藏於密者類此夫如是則神不能窺其迹况得其門而入哉善結無繩約而不可解明皇曰體了真性本以虛忘若能虛忘則心與道合雖無繩索約束其可解而散乎河曰善以道結事者乃可結其心不如繩索可得解也弼曰因物自然不設不施故不用關揵繩約而不可開解也此五者皆言不造不施因物之性不以形制物也雱曰以己信結天下之信孰能解之是以聖人常善救人河曰聖人所以常教人忠孝者欲以救人性命故無棄人河曰使貴賤各得其所也弼曰聖人不立形名以檢於物不造進向以殊棄不肖輔萬物之自然而不為始故曰無棄人也不尚賢能則民不爭不貴難得之貨則民不為盜不見可欲則民心不亂常使民心無欲無惑則無棄人心常善救物河曰聖人所以教民順四時以救萬物之殘傷故無棄物明皇曰是以聖人常用此五善之教以教之故無棄者河曰聖人不賤石而貴玉視之如一雱曰聖人體盡無窮以神為用故能有此五善然後能贍足一切使小以成小大以成大各遂其宜也夫五善存乎其身而因餘以為人而其效至於人物無棄可謂至德也已蓋聖人所為救人亦不使遷其性而已故雖有言行而泯然無迹且常定于一不以計數亂其心以至於閉之結之莫非在宥其唯則聖人所以救人之道簡矣蓋持之在身而實所以救人也一本無常善救物已下八字是謂襲明明皇曰密用曰襲五善之行在於忘遣忘遣則無迹故云密用密用則悟了故謂之明河曰聖人善救人物謂襲明大道也雱曰襲如楊襲之襲聖人之在天下不敢自見其明明見則事物畢彰民必離本非善救之道矣如上五事皆襲明也故善人不善人之師河曰人之行善者聖人即以為人師弼曰舉善以師不善故謂之師矣不善人善人之資明皇曰師法也資取也善人可師法不善人可取以役使也河曰資用也人行不善聖人猶教導使為善得以給用也弼曰資取也善人以善齊不善以善棄不善也故不善人善人之所取也雱曰善人有不善人然後善救之功著故曰資不貴其師河曰獨無輔也不愛其資明皇曰此章深旨教以兼忘若存師資未為極致今明所以貴師為存學相學相既空自無所貴所以愛資為存教相於教忘教故不愛資貴愛兩忘而道自化河曰無所使也雱曰聖人吉凶與民同患故强立師資之名假為善救之德要而極之則道通為一孰為師資然則非但我不愛資而已又能使天下忘我也所以能至於天下忘我者亦以五善而已雖智大迷河曰雖自以為智言此人乃大迷惑弼曰雖有其智自任其智不因物於其道必失故曰雖智大迷雱曰智者有知有知則能見有物之理而不知無物之妙故道妙至此智者大迷是謂要妙明皇曰師資兩忘是謂玄德凡俗不悟以為大迷故聖人云雖知凡俗以為大迷以道觀之是謂要妙河曰能通此意是謂知微妙要道知其雄章第二十八知其雄守其雌雱曰雄動雌靜靜則不離於真但靜而已則非道之全故至人以雌為常而常知雄也為天下溪河曰雄以喻尊雌以喻卑人雖自知尊顯當復守之以卑微去雄之强梁就雌之柔和如是則天下歸之如水流入深溪也雱曰溪以下而資納流通守雌則能以虛靜受一切法而不滯於物故曰為天下溪此盡性者為天下溪常德不離河曰人能謙下如深溪則德常在不復離於己雱曰常德分定而不遷道之在我者也不離者一於性分內而不外復歸於嬰兒明皇曰雄者忠於用牡故知其雄則當守其雌謙德物歸是為天下溪谷則真常之德不離其身抱道含和復歸於嬰兒之行矣河曰復當歸志於嬰兒蠢然而無所知也弼曰雄先之屬雌後之屬也知為天下之先者必後也是以聖人後其身而身先也溪不求物而物自歸之嬰兒不用智而合自然之智雱曰嬰兒含和守一欲慮不萌性之本真渾而未散德厚之至乃同於初若然者可名於大矣孟子曰大人不失其赤子之心知其白守其黑雱曰黑者北方之色靜不足以言之聖人建一切法非守黑則無以為本相彼春夏發於玄冬此其驗也為天下式河曰白以喻昭昭黑以喻默默人雖自知昭昭明白當復守之以默默如暗昧無所見如是則可為天下法式則德常在弼曰式模則也烏天下式雱曰至人以聖為天下法聖者體之中故也常德不忒河曰人能為天下法則德常在於己不復差忒弼曰忒差也雱曰經於事業者遠大則疑於有忒而適時應物如天運寒暑時之自然而心無積怒故不差忒也復歸於無極明皇曰能守雌靜常德不離德雖明白當如暗昧如此則為天下法式常德應用曾不差違德用不窮故復歸於無極忒差也河曰德不差忒則長生久壽歸身於無窮極也弼曰不可窮也雱曰大而化之之謂聖化則日襌而無窮故無窮者聖之體也從體起用還歸其本知其榮守其辱雱曰聖人至此等切相去未歸本德之至極未如是所以體神也古之道術有殘形壞衣自處污下以高教者義同於此為天下谷河曰榮以喻尊貴辱以喻污濁如己之有榮貴當守之以污濁如是則天下歸之如水流入深谷也雱曰谷一虛一盈而能應一切故象神神者充塞無外有之不得用之不窮者是蓋守辱精也精故能神唯精可以入神烏天下谷常德乃足河曰足止也人能為天下谷德乃止於己雱曰降神一等則於性為不足故道至體神乃真盡性復歸於朴明皇曰德雖尊榮常守卑辱物感斯應如谷報聲虛受不窮常德圓足則復歸於道矣朴道也河曰復當歸身於質朴不復為文飾弼曰此三者言常反終後乃德全其所處也下章反者道之動也功不可取常處其母也雱曰朴以喻性之質性能成萬法而不主一器故曰朴去神至矣而未嘗離朴也蓋至人從性起用大於守氣聖於制法神於體神要其極也復歸乎性而已朴散則為器河曰萬物之朴散則為器用也若道散則為神明流為日月分為五行也雱曰既歸於朴朴復為器終則有始道之常也聖人用之則烏官長明皇曰含德內融則復於朴常德應用則散而為器既涉形器必有精粗故聖人用之則為群材之官長矣河曰聖人升用則為百官之元長也弼曰朴真也真散則百行出殊類生若器也聖人因其分散故為之立官長以善為師不善為資移風易俗復歸於一也雱曰帝王體朴以治散而知政則但為官長而已故大制不割明皇曰聖人用道大制群生暄然似春蒙澤不謝動植咸遂曾不割傷河曰聖人用之則以大道制御天下無所傷割治身則以大道制情欲不害精神也弼曰大制者以天下之心為心故無割也雱曰以道為制者因道之勢而適其自然故雖制而無宰割之迹此篇白黑榮辱之句義甚奧遠言不勝盡讀者其致意焉將欲章第二十九將欲取天下河曰欲為天下主也而烏之者河曰欲以有為治民弼曰為造為也吾見其不得已明皇曰天下者大寶之位也有之者必待曆數在躬若暴亂之人將欲以力取而為之主者老君戒云吾見其不得已河曰我見其不得天道人心已明矣天道惡煩濁人心惡多欲雱曰至人體神合變與物為一雖兼制天下而未常有有故能從容無為而業無不濟糠粃土苴將陶鑄帝王若夫塊然有己以己遇物則雖六尺之身運轉妨滯若將不容而乃况天下之大歟取者取物是其有我為者造作是其有為有己有為之人方且存乎憂患之間而何暇治人乎天下神器弼曰神無形無方也器合成也無形以合故謂之神器也雱曰唯體盡無窮其應無方者能用之以無為不可為也河曰器物也人乃天下之神物也神物好安靜不可以有為治雱曰有意於為則有己有物矣為者敗之明皇曰大寶之位是天地神明之器謂為神器故不可以力為也故曰為者敗之此戒姦亂之臣河曰以有為治之則取其質性執者失之明皇曰曆數在躬已得君位而欲執有斯位陵虛神主天道禍淫亦當令失之此戒帝王也河曰强執教之人則失其情實生於詐僞也弼曰萬物以自然為性故可因而不可為也可通而不可執也物有常性而造為之故必敗也物有往來而執之故必失矣凡物或行或隨河曰上所行下必隨之也或歔或吹河曰歔溫也吹寒也有所溫必有所寒也或强或羸河曰有所强大必有所羸弱也或載或隳明皇曰欲明為則敗執則失故物或行之於前或隨之於後或詬之使暖或吹之使寒扶之則强折之則弱有道則載事無德則隳廢河曰載安也隳危也有所安必有所危明人君不可以有為治國與治身也雱曰聖人心超有無不物於物故陰陽交代而我法不遷茍為有有則物與為敵萬變糾錯不可勝圖矣故獨行於前而不知隨者在後如形影之不舍歔之欲溫而不知吹者之已至如寒暑之相生知强而已則羸者有時而來知載而已則隳者應手而至此皆造化之大情朝暮之常態而有有者不知由己不了故有此患而更與為競夫如是則雖介然一物之微而憂患之大已充塞天壤安能操神器而不纍乎是以聖人去甚去奢去泰明皇曰聖人睹或物之行隨知執者之必失故去其過分爾河曰甚謂貪淫聲色奢謂服飾飲食泰謂宫室臺榭去此三者處中和行無為則天下自化弼曰凡此諸或言物事逆順反覆不施為執割也聖人達自然之至暢萬物之情故因而不為順而不施除其所以迷去其所以惑故心不亂而物性自得之也雱曰聖人心合於無以酬萬變方其為也不以經懷如鏡應形適可而止分外之事理所不為彼有有者妄見諸相矜己樂能為之不已故事輒過分此由不知行隨歔吹强羸載隳之反復故爾道德真經集注卷之四
