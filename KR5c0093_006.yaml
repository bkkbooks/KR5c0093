front:
  text: 道德眞經集註卷之六靡六
  hash: sha256:002fa1ef67af12b9f904e09086d0c828c2e6526cec0fc33970b2411815e4373d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0093_HFL_006-001a, image: hfl/0396/0396-118.png}
body:
  text: 明皇河上公王弼王雱註德經雱曰德者得也物生乎道而名得於道故謂之性得其性而不失則德之全也德未嘗異道而有其德者嘗至於自私而失道彼眞人者不然性命道德之實渾乎其爲一而四者之名應世而殊號吾莫知其異亦莫知其同也是德之玄者也雖然德者得也能無失乎哉唯以無得爲德而德乎不德則可謂至矣是體道者也非有德者也上德不德章第三十八上德不德河曰上德謂太古無名號之君德大無上故言上德也不德者言其不以德教民因循自然養人性命其德不見故言不德也是以有德河曰言其德合於天地和氣流行民得以全也雱曰全德之人體道盡常德外無復餘物故無德名下德不失德河曰下德謂號謚之君德不及上德故言下德也不失德者其德可見其功可稱也是以無德明皇曰德者道之用也莊子曰物得以生謂之德時有淳醨故德有上下上古淳樸德用不彰無德可稱故云不德而淳德不散無爲化清故云是以有德逮德下衰功用稍著心雖體道跡涉有爲執德可稱故云不失跡涉於有此上爲麤故云是以無德河曰以有名號及其身雱曰德至則無德下德之人適今於德而已無德之德則非至人所謂德也經曰同於德者德亦得之上德無爲河曰謂法道安靜無所故爲也而無以爲明皇曰知無爲而無爲者非至也無以無爲而無爲者至矣故上德之無爲非徇無爲之美但含孕淳樸適自無爲故云而無以爲此心跡俱無爲也河曰言無名號雱曰上德無爲然亦無所事爲而德自足也下德爲之河曰言爲教令施政事也而有以爲明皇曰下德爲之者謂心雖無爲以功用彰著跡涉於有爲故云爲之言下德無爲而有所以爲此心無爲而跡有爲也河曰言以爲己取名號也雱曰下德之人不修則不至是以既不至於無爲而又勢當有爲也所謂上德者兼下德之事方其有爲同於下德然未嘗離乎上德也上仁烏之河曰上德謂行仁之君其仁無上故言上仁也爲之者爲仁恩而無以爲明皇曰仁者兼愛之名下德衰而上仁見所以爲兼愛之仁故云爲之行仁而忘仁亦欲求無爲故云而無以爲此則心有爲而跡無爲也且上仁稱無爲者據跡欲無爲而方上義爾未可以語下德之有爲也河曰功成事立無以執爲雱曰仁乃善之長德之别名既别於德則是爲之也然聖人之仁盡性而足不事於作故無以爲上義爲之河曰爲義以斷割也而有以爲明皇曰義者裁非之謂謂裁非之義故云爲之有以裁非斷割令得其宜故云而有以爲此則心迹俱有爲也河曰動作以爲己殺人以成威賊下以自奉也雱曰仁有不足乃經以義上禮烏之河曰謂上禮之君其禮無上故言上禮爲之者言爲禮制度序威儀而莫之應河曰言禮華盛實衰飾偽煩多動則離道不可應也則攘臂而仍之明皇曰六紀不和則爲禮以救之故云爲之禮尚往來不來非禮行禮於彼而彼不應則攘臂而怒以相仍引河曰言煩多不可應上下忿爭故攘臂相仍引雱曰禮所以定上下别親疏審隆殺也種種分别得失始彰純誠已虧乃制其外外貌既嚴責望深矣雖名止邪之具兹實爭亂之端竊嘗原禮於物爲火於時當夏夏者萬物去本盛末之時觀四時之有夏則禮者聖人所不免也方期去末歸本則以禮爲非亦所不免也聖人之教時而已矣何常之有而歸本之言於學者爲要矣故失道而後德河曰言道衰而德化生也失德而後仁河曰言德衰而仁愛見也失仁而後義河曰言仁衰而分義明也失義而後禮明皇曰失道者失上德也上德合道故云失道夫道德仁義者時俗夷險之名也故道衰而德見德失而仁存仁亡而義立義喪而禮救斯皆適時之用爾故論禮於淳樸之代非狂則悖忘禮於澆醨之日非愚則誣若能解而更張者當退禮而行義退義而行仁退仁而行德忘德而合道人反淳樸則上德之無爲也夫禮者忠信之薄河曰言禮廢本治末忠信日以衰薄而亂之首也明皇曰制禮者爲忠信衰薄而以禮爲救亂之首爾用禮者在安上理人豈玉帛云乎哉河曰禮者賤質而貴文故正直日以少邪亂日以生雱曰太古之道降爲帝德帝德又降乃有王者王者始任禮以治自王者之後天下之俗可見矣然則亂首之言豈其妄歟前識者道之華河曰不知而言知爲前識此人失道之實得道之華而愚之始也明皇曰識者人性識也謂在人性識之前而制此檢外之禮雖欲愚時實喪淳樸故云道之華禮以救亂所貴同和而失禮意者則將矜其玉帛者其民詭如此之人性其愚昩之始河曰言前識之人愚闇之倡始雱曰智藏於賢人之德本華乃草木之精發見於外者也雖足以美一時之觀而華盛則本衰矣智者亦德性之精也固當深藏於本而乃發露乎外以爲前識夫事有常運至則應耳而奚以豫識其兆爲哉種種分别以示聰明世俗睹其有先幾之明而聖人以爲眞愚者之始孔子曰不逆詐不億不信亦惡夫爲華而已是以大丈夫處其厚河曰大丈夫謂得道之君也處其厚者處身於敦樸不處其薄河曰不處身違道爲世煩亂也居其實河曰處忠信也不居其華明皇曰有爲者道之薄禮義者德之華故聖人處無爲之事其厚也不處其薄矣退禮義之行其華也自居其實矣河曰不尚言也故去彼取此明皇與河註同河曰去彼華薄取此厚實弼曰德者得也常得而無喪利而無害故以德爲名焉何以得德由乎道也何以盡德以無爲用以無爲用則莫不載也故物無焉則無物不經有焉則不足以免其生是以天地雖廣以無爲心聖王雖大以虚爲主故曰以復而視則天地之心見至日而思之則先王之主睹也故滅其私而無其身則四海莫不瞻遠近莫不至殊其已而有心則一體不能自全肌骨不能相容是以上德之人唯道是用不德其德無執無用故能有德而無不爲不求而得不爲而成故雖有德而無德名也下德求而得之爲而成之則立善以治物故德名有焉求而得之必有失焉爲而成之必有敗焉善名生則有不善應焉故下德爲之而有以爲也無以爲者無所偏爲也凡不能無爲而爲之者皆下德也仁義禮節是也將明德之上下輒舉下德以對上德至于無以爲極下德之量上仁是也是及於無以爲而猶爲之焉爲之而無以爲故有爲爲之患矣本在無爲母在無名棄本捨母而適其子功雖大焉必有不濟名雖美焉僞亦必生不能不爲而成不興而治則乃爲之故有弘普博施仁愛之者而愛之無所偏私故上仁爲之而無以爲也愛不能兼則有折抗正直而義理之者忿枉祐直助彼功此物事而有以心爲矣故上義爲之而有以爲也直不能售則有斿飾修又禮敬之者尚好修敬校責往來則不對之間忿怒生焉故上禮爲之而莫之應則攘臂而仍之夫大之極也其唯道乎自此已往豈足尊哉故雖德盛業大富有萬物猶各有其德而未能自周也故天不能爲載地不能爲覆人不能爲瞻萬物雖貴以無爲用不能捨無以爲體也不能捨無以爲體也失其爲大矣所謂失道而後德也以無爲用則德其母故能己不勞焉而物無不理下此已往則失用之母不能無爲而貴博施不能博施而貴正直不能正直而貴飾敬所謂失德而後仁失仁而後義失義而後禮也夫禮也所始首於忠信不篤通簡不暢責備於表機微爭制夫仁義發於内爲之猶僞况務外飾而可乆乎故失禮者忠信之薄而亂之首也前識者前人而識也即下德之倫也竭其聰明以爲前識役其智力以營庶事雖得其情姦巧彌密雖豐其譽愈喪篤實勞而事昏務而治薉雖竭聖智而民愈害舍己任物則無爲而泰守夫素樸則不順典制聽彼所獲棄此所守識道之華而愚之首故苟得其爲功之母則萬物作焉而不辭也萬事存焉而不勞也用不以形御不以名故仁義可顯禮敬可彰也夫載之以大道鎮之以無名則物無所尚志無所營各任其貞事用其誠則仁德厚焉行義正焉禮敬清焉棄其所載舍其所生用其成形役其聰明則仁失誠焉義其競焉禮其爭焉故仁德之厚非用仁之所能也行義之正非用義之所成也禮敬之清非用禮之所濟也載之以道統之以母故顯之而無所尚彰之而無所競用夫無名故名以篤焉用夫無形故形以成焉守母以存其子崇本以舉其末則形名俱有而邪不生大美配天而華不作故母不可遠本不可失仁義母之所生非可以爲母形器匠之所成非可以爲匠也捨其母而用其子棄其本而適其末名則有所分形則有所止雖極其大必有不周雖盛其美必有患憂功在爲之豈足處也雱曰自拔於常流之中而思比德於至聖非眞大丈夫孰能如此昔之得一章第三十九昔之得一者明皇曰一者道之和謂沖氣也以其妙用在物爲一故謂之一爾河曰昔往也一無爲道之子也弼曰昔始也一數之始而物之極也各是一物之生所以爲主也物各得此一以成既成而舍一以居成居成則失其母故皆裂發歇竭蹶也天得一以清地得一以寧河曰言天得一故能垂象清明地得一故能安靜不摇動神得一以靈河曰言神得一故能變化無形雱曰神謂鬼神之神靈者神之散也谷得一以盈河曰言谷得一故能盈滿而不絶也雱曰一之爲一無乎不遍故谷虚而能應者一存乎中也萬物得一以生河曰言萬物皆須道以生成也侯王得一以爲天下貞河曰言侯王得一故能爲天下平正其致之一也明皇曰物得道用因用立名道存則名立用失則實喪矣故天清地寧神靈谷盈皆資妙用以致之故云其致之河曰致誡也謂下五事也弼曰各以其一致此清寧靈貞盈生雱曰一者不二在彼在此其所謂一其體常一無有别一故惟一可以致一不可以他致一也一之爲義天下之至精唯精故能神神則盡之矣而神之爲德常在一也天無以清將恐裂河曰言天當有陰陽施張晝夜更用不可但欲清眀無已時將恐分裂不爲天弼曰用一以致清耳非用清以清也守一則清不失用清則恐裂也故爲功之母不可舍也是以皆無用其功恐喪其本也地無以寧將恐發河曰言地當有高下剛柔氣節五行不可但欲安靜無已時將恐發泄不爲地神無以靈將恐歇河曰言神當有王相囚死休廢不可但欲靈無已時將恐虚歇不爲神也谷無以盈將恐竭河曰言谷當有盈縮虚實不可但欲盈滿無已時將恐枯竭不爲谷萬物無以生將恐滅河曰言萬物當隨時生死不可但欲生無已時將恐滅亡不爲物也侯王無以烏貞而貴高將恐蹶明皇曰得一者不可矜其用故誡云天無以其清而矜之將恐分裂地無以其寧而矜之將恐發泄神矜則靈歇谷矜則盈竭物矜則生滅侯王矜其貴則將顛蹶矣聖教垂代本爲生靈雖遠舉天地之清寧而會歸只在於侯王守雌用道耳故下文云河曰言侯王當屈己以下人汲汲求賢不可但欲貴高於人將恐顛蹶失其位也雱曰一之爲一無乎不在欲言其理詞不勝窮且以人形言之凡人初生精爲之本因精集神體象斯具精之既喪形斃神離或形其理無二也一本無爲貞而三宇故貴以賤烏本河曰言必欲尊貴當以薄賤爲本若禹稷躬稼舜陶河濱周公下白屋也高以下烏基明皇曰侯王貴高兆民非下爲國者以人爲本基當勞謙以聚之令樂其愷悌之化不有離散河曰言必欲尊貴當以下爲本基由築墻造功因卑成高下不堅固後必傾危雱曰水於五行其數爲一而趨下不爭乃陰陽之情也知此道者雖居貴高而不忘基本故居位也安猶體神而存精則神常存也是以侯王自稱孤寡不轂一本作轂河曰孤寡喻孤獨不轂喻不能如車轂爲衆輻所凑此其以賤烏本邪河曰言侯王至尊貴能以孤寡自稱此非以賤爲本乎以曉人非乎明皇曰孤寡不轂則凡情所惡侯王自稱以謙爲本非乎者明是以賤爲本爾河曰嗟嘆之辭雱曰一於數至少而爲萬物本故知本在於賤知賤乃貴也故致數譽無譽御本作數輿無輿弼本作數譽無譽明皇曰數與則無與輪轅爲與本數貴則無貴賤下爲貴本元爲與本當存元以定與賤爲貴本當守賤以安貴將戒侯王以賤爲本故致此數與之談也河曰致就也言人就車數之爲輻爲輪爲轂爲衡爲曰尊無有名爲車者故成爲車以喻侯王不以尊號自名故能成其貴雱曰知一者以賤爲本而内韜至貴故世不得而貴亦不得而賤苟爲己而數致稱譽豈眞譽乎一本譽作輿非不欲琭琭如玉落落如石明皇曰琭琭玉貌落落石貌以賤爲大河曰琭琭喻少落落喻多玉少故見貴石多故見賤言不欲如玉爲人所貴如石爲人所賤當處其中也弼曰清不能爲清盈不能爲盈皆有其母以存其形故清不足貴盈不足多貴在其母而母無貴形貴乃以賤爲本高乃以下爲基故致數譽乃無譽也玉石琭琭落落體盡於形故不欲也雱曰玉石體堅而一定不能曲變非所謂一也若夫萬變而常一則眞一矣故玉琭琭貴而已矣不能賤也石落落賤而已矣不能貴也老氏既明一義恐不悟者執一不變堅如玉石則失一之理矣夫唯體一者一貴一賤其德如水方圓枉直應物無窮而不離於一故不得而貴賤以一無貴賤故也此篇義最奥密難言今粗明綱領而已蓋道生一一則德之全體於物則幾於道者是也上篇序德經之大旨次以此篇則論德之者亦猶終以小國寡民而更有信言不美耳反者道之動章第四十反者道之動明皇曰此明權也反者取其反經合義反經合義者是聖人之行權行權者是道之運動故云反者道之動河曰反本也本者道之所以動動生萬物背之則亡也弼曰高以下爲基貴以賤爲本有以無爲用此其反也動皆之其所無則物通矣故曰反者道之動也雱曰反本則靜靜乃能動譬如秋冬能起春夏也弱者道之用明皇曰此明實也弱者取其柔弱雌靜柔弱雌靜者是聖人之處實處實者是道之常用故云弱者道之用河曰柔弱者道之所常用故能長久弼曰柔弱同通不可窮極雱曰道之用無所不克可謂健矣而獨揵不能自健必以弱爲之本此相生之情故下文原其本以明之天下之物生於有一本作萬物河曰萬物皆從天地生天地有形位故言生於有也有生於無明皇曰夫實之於權由無之生有故行權者貴反於實用有者必資於無然至道沖寂離於名稱諸法性空不相因待若能兩忘權實雙泯有無數輿無輿可謂超出矣河曰天地神明蜎飛蠕動皆從道生道無形故言生於無此言本勝於華弱勝於强謙虚勝盈滿也弼曰天下之物皆以有爲生有之所始以無爲本將欲全有必反於無也雱曰無以生有有復爲無反復相生萬物一致上士聞道章第四十一上士聞道勤而行之明皇曰了悟故勤行河曰上士聞道自勤苦竭力而行之弼曰有志也雱曰士學者也故尚志無志則終不可以語道矣中士聞道若存若亡明皇曰中士可上可下故疑疑則若存若亡河曰中士聞道治身以長存治國以未平欣然而存之退見財色榮譽或於情欲而復亡之也雱曰人聞夫子之道而悦者是也下士聞道大笑之明皇曰迷而不信故笑河曰下士貪狠多欲見道柔弱謂之恐懼見道質樸謂之鄙陋故大笑之雱曰道大故似不肖淺見者所不識故笑誠如下文所云豈流俗能睹乎不笑不足以爲道明皇曰不爲下士所笑不足以爲玄妙至道河曰不爲下士所笑不足以名爲道雱曰孑然有體以投世俗耳目者豈道也哉故建言有之明皇曰建立也將欲立言明此三士於道不同河曰建設也設言以有道當如下句弼曰建由立也明道若昧河曰明道之人若闇昩無所見弼曰光而不耀雱曰大明若晦察察於美惡而有其明非明乎道也夷道若纇明皇曰上士勤行於明若昩於進若退於夷若纇故中士疑而下士大笑之河曰夷平也大道之人不自别殊若多比纇也弼曰纇㘨也大夷之道因物之性不執乎以割物其平不見乃更反若纇㘨也雱曰莊子曰以不平平其平也已進道若退河曰進取道者若退不及弼曰後其身而身先外其身而身存雱曰孟子曰其進銳者其退速故進道當因時任理以直養之不可躁於有成故若退也彼揠苗者異乎此矣上德若谷明皇曰虚沿而容物河曰上德之人若深谷不恥垢濁也弼曰不德其德無所懷也雱曰上德不德而其用不窮谷虚而能應者也大白若辱明皇曰純潔而含垢河曰夫潔白之人若污辱不自彰顯弼曰知其白守其黑大白然後乃得雱曰知其白守其黑孔子曰涅而不淄涅故似辱廣德若不足明皇曰大成而執謙河曰德行廣大之人若愚頑不足也弼曰廣德不盈廓然無形不可滿也雱曰塊然有餘者豈廣德哉建德若偷明皇曰立功而不衒河曰建設道德之人若可偷引使空虚也弼曰偷匹也建德者因物自然不立不施故若偷匹雱曰偷苟且也區區欲速務有所建豈足以爲德唯因時任理視若偷隋者其建大莊子曰不得已而後起質眞若渝明皇曰淳一而和光河曰質樸之人若五色有渝淺不明弼曰質眞者不矜其眞故渝雱曰體性抱神以遊乎世俗之間者萬變從俗而其眞常眞故物莫知其眞彼漢陰丈人孑孑以眞爲己任而别乎世俗乃子貢之徒所驚而聖人以爲假修渾沌者豈所謂質眞乎大方無隅明皇曰不小立圭角河曰大方正之人無妄曲廉隅弼曰方而不割故無隅也雱曰大方道之體也若有四隅則形盡於所見其小乆矣大器晩成明皇曰且無近功河曰大器之人若九鼎瑚璉不可卒成也弼曰大器成天下不持全别故必晩成也雱曰帝王之功不如霸者之速效大音希聲明皇曰不飾小說河曰大音猶雷霆待時而動喻常愛氣希言也弼曰聽之不聞名曰希不可得聞之音也有聲則有分有分則不宫而啇矣分則不能統衆故有聲者非大音也雱曰道盈於無外而其體常寂諸物不能感觸其聲常聲而世莫得聞也莊子曰無聲之中獨聞和焉希聲之謂乎大象無形明皇曰故能應萬類河曰大法象之人質樸無形容弼曰有形則有分有分者不温則炎不炎則寒故象而形者非大象雱曰能賦萬物之形而其體廓然不可得而有此道之全體由其有物故曰大象道隱無名明皇曰功用不彰無名氏也河曰道潛隱使人無能指名也雱曰自希聲而下皆道之大全所由言者異故曰大音也大象也能體大音大象以爲道則其道至矣夫唯道之至思慮之所不及在有也爲實在無也爲空處處皆然無乎不在故欲爲之名而不可狀無名之中常有此物欲見而不得故曰隱也夫惟道善貸且成明皇曰雖隱無名氏而實善以沖和妙用資貸萬物且成熟之河曰成就也言道善禀貸人精氣且成就之也弼曰凡此諸善皆是道之所成也在象則爲大象而大象無形在音則爲大音而大音希聲物以之成而不見其形故隱而無名也貸之非唯供其乏而已一貸之則足以永終其德故曰善貸也成之不加機匠之裁無物而不濟其形故曰善成雱曰道能供萬物之求而成就之然物之所得復歸其本故道雖贍足萬物而吾未嘗費貸之爲言應彼之乏而終以見還者也竊嘗論此篇曰道不遠人而世莫能睹者不明故也故首之以眀道大道甚夷而惟明者能由之以進故次曰夷道也進道也進於道而復乎性命之常則不德之德也故次之以上德上德者自得其德而不同乎庶物者也故不染而白以其白自異於物則安能若谷乎故次之以若辱不辱而潔則是伯夷之隘也則安能廣乎故若辱而後曰廣德上德而能廣則是與人爲徒而可以爲君師矣故曰建德若偷偷者不汲汲乎有建者也建德則有所立而離本近偽矣故又要在乎不易吾眞故次之以質眞其序至此則道之在我者體既具矣故曰大方無隅有大方以爲體則所以應無方之傳而可以緒餘爲人矣故曰大器大器者業也至人以其糠粃土苴爲器而器未嘗不大也孔子以管仲爲小器則帝王之功其大器乎道雖爲此而要其終則未嘗爲也未嘗有也故曰大音也大象也然則既盡之矣故能與道爲一而供萬物之求成萬物之性也嗚呼是道也不可以識識而况於以言言乎而余論之者亦其粗而已矣道生一章第四十二道生一河曰道始所生者一一生二河曰一生陰與陽也二生三明皇曰一者沖氣也言道動出沖和妙氣於生物之理未足又生陽氣陽氣不能獨生又生陰氣積沖氣之一故云一生二積陽氣之二故云二生三河曰陰陽生和清濁三氣分爲天地人也三生萬物明皇曰陰陽含孕沖氣調和然後萬物阜成故云三生萬物河曰天地共生萬物也天施地化人長養之也雱曰道兼陰陽有陰有陽有陰陽之中此三物者始應一二三之數而物之類莫不由此以出入故其情與形至纖至悉而考其法象咸類是矣知此者是知萬物之本也知其本則其於末也何有至人所用居今日而知萬世之後者或在是也萬物負陰而抱陽河曰萬物無不負陰而向陽回心而就日沖氣以烏和明皇曰萬物得陰陽沖氣生成之故故負抱陰陽含養沖氣以爲柔和也河曰萬物中皆有元氣得以和柔若胸中有藏骨中有髓草木中有空虚與氣通故得乆生也雱曰由之以生故無不負抱之者觀吾之形則其法見矣陰陽適中乃和凡此以眀物皆係陰陽之屬爲數所定當與之消息也人之所惡唯孤寡不穀而玉公以爲稱明皇曰萬物皆以沖和之氣爲本而沖氣和柔守本者當須謙卑柔弱故王公至尊而稱孤寡不轂者以謙柔爲本故也河曰孤寡不轂者不神之名而王公以爲稱者處謙卑法虚空和柔雱曰陰極生陽陽極生陰陰陽之情也故高則傾窪則盈侯王居極尊之位其勢至危故取人之所惡自名以適陰陽之和也故下文云故物或損之而益益之而損明皇曰自損者人益之自益者人損之故朝宗者善於下謙弱者生之柄孤寡之稱不亦宜乎河曰夫增高者崩貪富者致患弼曰萬物萬形其歸一也何由致一由於無也因無乃一一可謂無已謂之一豈得無言乎有言有一非二如何有一有二子生乎三從無之有數盡乎斯過此以往非道之流故萬物之生吾知其主雖有主形沖氣一焉百姓有心異國殊風而得一者王侯主焉以一爲主一何可令先多愈遠損則近之損之至盡乃得其極既謂之一猶乃至三况本不一而道可近乎損之而益豈虚言也雱曰澤下而肥山聳而瘦午過必昃虧至乃盈凡類屬陰陽數由一二者理極則反物物皆然至人以此適盈虛之時順消息之理常以謙沖自牧豈或强亢致菑者乎人之所教河曰謂衆人所以教去弱爲强去柔爲剛亦我義教之明皇曰老君云人君所欲立教教人者當以吾此柔弱非虚之義以教之河曰言我教衆人使去强爲弱去剛爲柔弼曰我之非强使人從之也而用夫自然舉其至理順之必吉違之必凶故人相教違之必自取其凶也亦如我之教人勿違之也强梁者不得其死明皇曰强梁之人動與物亢求益而損物或擊之故不得其死河曰强梁者謂不信玄妙背叛道德不從經教尚勢任力也不得其死者爲天所絶兵刃所伐王法所殺不得以壽命而死也吾將以爲教父明皇曰吾見强梁者亡柔弱者全故以此柔弱之教爲衆教之父也河曰父始也老子以强梁之人爲教戒之始也弼曰强梁則必不得其死人相教爲强梁則必如我之教人不當爲强梁也舉其强梁不得其死以教即吉云順吾教之必吉也故得其違教之徒適可以爲教父也雱曰識陰陽之情則物物有理皆可以師强梁殞身物之至惡苟識理者睹之足以鑒消息之理以爲教父不亦宜乎天下之至柔章第四十三天下之至柔馳騁天下之至堅明皇曰天下之至柔者正性也若馳騁代務染雜塵境情欲充塞則爲天下之至堅矣河曰至柔者水也至堅者金石也水能貫堅入剛無所不通弼曰氣無所不入水無所不出雱曰聖人所以執柔而御群剛觀於物則水是也無有入於無間河曰無有謂道也道無形質故能出入無間通神群生也雱曰有纎物則動爲窒閡安能入無間乎觀於境則至虚是也此聖人所以體無而應群有是以知無爲之有益明皇曰無有者不染塵境令心中一無所有無間者道性清靜妙體混成一無間隙夫不爲可欲所亂令心境俱靜一無所有則心與道合入無間矣故聖人云吾見身心清靜則能合道是知有爲之教不如無爲之有益耳河曰吾見道無爲而萬物自化成是以知無爲之有益於人也弼曰虚無柔弱無所不通無有不可窮至柔不可折以此推之故知無爲之有益也不言之教河曰法道不言帥之以身無爲之益河曰法道無爲治身則有益精神治國則有益萬民不勞煩也天下希及之明皇曰言天下衆教少能及之者河曰天下謂人主也希能及道無爲之治身治國也雱曰不言之教無爲之益不可以象告不可以言傳唯體無盡道者足以知之不亦希乎名與身章第四十四名與身孰親明皇曰名者實之賔代人徇名以亡身設問誰親欲令去功與名而全其眞河曰名遂則身退也弼曰尚名好高其身必疏身與貨孰多明皇曰徇名者將以求財財得而亡身設問孰多欲令擲玉毀珠以全其和河曰財多則害身也弼曰貪貨無厭其身必少雱曰莊子云足乎内外之分辨乎榮辱之境余嘗有言内外兩境雖眞僞不侔貴賤懸絶而常更相爲輕重不可不察者也失性之人忘其不貲之有而貪逐外物矜攬無窮自以爲得而不知所取者塵穢臭腐非可已畜之物而所耗失沉陷者乃吾之所以爲我者也其爲親疏多寡之計亦己愚甚可不哀乎蓋知無待於外而唯内之務始可與語道故顔子之賢而孔子之所稱乃在乎樂陋巷之簞瓢然則君子之所養蓋可知矣今之士非乏聰明之資而志徇其外外重而内輕察其天機已在肝膈之上面目之間去本遠矣而猶欲語古人之至論則亦見其勞而無功也觀老子此言若將無謂而乃學者之至戒修身之要務故余因廣其意而詳說之得與亡孰病明皇曰問得名貨與亡名貨敦者病其身河曰好得利則病於行也弼曰得多利而亡其身何者爲病也雱曰得則有有有所不足有而疲神耗精以守之其病大矣是故甚愛必大費河曰甚愛色費精神甚愛財遇禍患所愛者少所亡者多故言大費多藏必厚亡明皇曰甚愛名者必勞神非大費乎多財貨者必累身非厚亡乎弼曰甚愛不與物通多藏不與物散求之者多攻之者衆爲物所病故大費厚亡也雱曰此必至之理而世俗之所未悟知足不辱河曰知足之人給利去欲不辱於身雱曰我貴在我何辱之有知止不殆河曰知可止則財利不累於身聲色不亂於耳目則身不危殆也雱曰無求於外故常安也可以長乆明皇曰知足者不甚愛知止者不多藏既無辱殆故可長久河曰人能知止足則福禄在己治身者神不勞治國者民不擾故可長乆道徳眞經集註卷之六
