body:
  text: 明皇河上公王弼王雱注大成若缺章第四十五大成若缺河曰謂道德大成之君若缺者滅名藏譽如毁缺不備也其用不弊河曰其用心如是則無弊盡時弼曰學行大成常如玷缺謙則受益故其材用無困弊之時雱曰若缺者乃真大成小成孑然成體所以於道為不成莊子曰名成者虧大盈若沖河曰謂道德大盈滿之君也如沖者貴不敢驕也富不敢奢也其用不窮明皇曰祿位盈滿常若沖虛儉不傷財故所用不窮匱河曰其用心如是則無窮盡時也弼曰大盈充足隨物而與無所愛矜故若沖也雱曰盈則竭矣安得不窮之用乎大直若屈明皇曰直而不回故若屈河曰大直謂修道法度正直如一也如屈者不與俗人爭如可屈折弼曰隨物而直直不在一故若屈也雱曰於理直者曲以應變不自有其直故莫見其直大巧若拙明皇曰巧不蕩於分外故若拙河曰大巧謂多才術也亦不敢見其能弼曰大巧因自然以成器不造為異端故若拙也雱曰傳物於自成則外無巧功而實至巧也刻雕衆形者非其驗乎大辨若訥明皇曰不飾小説故若訥河曰大辨者智無疑如訥者口無辭弼曰大辨因物而言己無所造故若訥也雱曰巧諭諸物乃有辨名至理不繁故若訥也躁勝寒河曰勝極也春夏陽氣躁疾於上萬物盛大極則寒寒則零落死亡也言人不當剛躁也靜勝熱河曰秋冬萬物靜於黃泉之下極則熱熱者生之源淸靜為天下正明皇曰於躁勝者則寒寒薄也於靜勝者則熱熱和也故若屈者大直清靜者為正矣河曰能清靜則為天下長持正則無終已時也弼曰躁然後能勝寒靜無為以勝熱以此推之則清靜為天下正也靜則全物之真躁則犯物之性故唯清靜乃得如上諸大也雱曰躁者以末勝性靜者以本勝事以本勝事乃能如上諸大以末勝性是動皆小爾故知清靜為至正也天下有道章第四十六天下有道河曰謂人主有道也却走馬以糞明皇曰天下有道之主無為化行既不貪求故無交戰屏却走馬之事人得糞除田園河曰糞者糞田也兵甲不用却走馬以治農田治身者却陽精以糞其身弼曰天下有道知足知止無求於外各修其內而已故却走馬以治田糞也雱曰以道治天下者物各遂其性故無戰逐之事而唯本業之修也天下無道河曰謂人主無道也戎馬生於郊明皇曰天下無道之君縱欲攻取故兵戎士馬寄生於郊境之上矣河曰戰伐不止戎馬生於郊境之上久不還也弼曰貪欲無厭不修其內各求於外故戎馬生於郊也雱曰郊近邑之地罪莫大於可欲明皇曰心見可欲為罪大矣河曰好淫色也雱曰可欲者善也善名既立則離道已遠爭端超矣故雖無罪而罪實在焉禍莫大於不知足明皇曰求取不已為禍大矣雱曰外求無厭失性生禍咎莫大於欲得明皇曰災咎之大莫大於欲所欲必令皆得皆得則禍深故云咎也河曰欲得人物利且貪也雱曰各求其得則必獲咎於衆故知足之足河曰守真根也常足矣明皇曰物足者非知足心足者乃知足心若知足此足則常足矣河曰無欲心也雱曰各盡其性分則何不足之有不出户章第四十七不出户知天下河曰聖人不出户以知天下者以己身知人身以己家知人家所以見天下也不窺牖見天道明皇曰垂拱無為不出教令於户外是知理天下之道人事和則天象順故不煩窺牖而天道可知河曰天道與人道同天人相通精氣相貫人君清靜天氣自正人君多欲天氣煩濁吉凶利害皆由於己弼曰事有宗而物有主途雖殊而其歸同也慮雖百而其致一也道有大常理有大致執古之道可以御今雖處於今可以知古始故不出户窺牖而可知也雱曰天下之衆天道之微其要同於性今之極唯盡性者膠目塞耳而無所不達茍唯見而後識識而後知者是得其萬殊之形而昧於一致之理然則所謂識知者乃耳目之末用而非心術之要妙矣彼自謂博而不知其寡之至也彼自謂智而不知其愚之極也其出彌遠其知彌少明皇曰若不能無為假使出令彌遠其知理天下之道彌少河曰謂去其家觀人家去其身觀人身所觀益遠所見益少也弼曰無在於一而求之於衆也道視之不可見聽之不可聞摶之不可得若其知之不須出户若其不知出愈遠愈迷也雱曰無極之理盡於一塵纎慮不萌萬緣已現學道之要豈不在兹而彼乃遠出以求亦已昧矣彌遠彌少不其然歟是以聖人不行而知明皇曰不出户故云不行無為淳朴而知為理之道河曰聖人不上天不入淵能知天地以心知之不見而名明皇曰不窺牖故云不見人和天順故能名其大平河曰上好道下好德上好武下好力聖人原小知大察內知外弼曰得物之致故雖不行而慮可知也識物之宗故雖不見而是非之理可得而名也雱曰窮理知本之人已足與於此若夫體盡無窮無所不極者其視四表洞徹無硋萬殊之變不離目前則又妙矣此何足言邪不烏而成明皇曰不為言教而天下化成河曰上無所為則下無事家給人足萬物自化就也弼曰明物之性因之而已故雖不為而使之成矣雱曰天何言哉四時行焉百物生焉體道者天而已矣為學曰益章第四十八烏學日益河曰學謂政教禮樂之學也日益者情欲文飾日以益多弼曰務欲進其所能益其所習雱曰方其窮理之時物物而通之凡以求吾真非以為博也故曰益而無害至乎窮理已上則以損為益矣為道曰損明皇曰為學者日益見聞為道者日損功行益見聞為修學之漸損功行為悟道之門是故因益以積功忘功而體道矣河曰道謂自然之道也曰損者情欲文飾日以消損弼曰務欲反虛無也雱曰見理之後物物知非不期乎損而所有漸銷矣觀乎天道則益損相生亦恆物之大情也損之又損河曰損情欲又損之所以漸去雱曰極乎至虛而虛尚非有則其損可知以至於無為河曰當恬淡如嬰兒無所造為也無為而無不為明皇曰為學者積功行為道者忘損之雖損功行尚有欲損之心兼忘此心則至於泊然無為方彼鏡象而無不應故無不為也河曰情欲斷絶德與道合則無所不施無所不為也弼曰有為則有所失故無為乃無所不為也雱曰唯體盡空虛者唯能滋發萬化而酬酢不窮豈若一偏之士滯乎幽寂植若稿木者哉故取天下者常以無事明皇曰無為無事天下歸懷治天下常當以無事不當煩勞也弼曰動常因也雱曰無事之處乃聖人之真應時有為道則虧矣故聖人雖有有為之迹而所以聖而能服天下者常在於無事之處及其有事弼曰自己造也不足以取天下明皇曰有事則煩勞煩勞則凋弊故不足以取天下河曰及其好有事則政教煩民不安故不足以治天下也弼曰失統本也雱曰有事則有心有心則民亦有其心雖欲取之其去遠矣原此篇蓋無事者道德之極致為天下者事業之極致學而日損以至於無為故能與於此聖人無常心章第四十九聖人無常心河曰聖人重改更真因循若自無心以百姓心烏心明皇曰聖人之心物感而應應在於感故無常心心雖無常唯在化善是常以化百姓心為心河曰百姓心之所便因而從心弼曰動常因也雱曰聖人寂然盡性體盡真空凡所思為應物而有譬如火性周乎無方因陽遂而為用故能不持一物而贍足無窮也書曰自我民聰明善者吾亦善之河曰百姓為善聖人因而善之不善者吾亦善之河曰百姓雖有不善者聖人化之使善也弼曰各因其用則善不失也雱曰善惡生乎妄見妄見生乎自私公於大道則雖目睹善惡而心無殊想矣故聖人因世之情強立毀譽而心知善惡本自非相故不善之善非憐而怒之乃不覺有異也得善矣河曰百姓德化聖人為善弼曰無棄人也雱曰忘善惡之善真善也信者吾信之河曰百姓為信聖人因而信之不信者吾亦信之河曰百姓為不信聖人化之使信也雱曰萬法雖殊等為實相信與不信生乎自私得信矣明皇曰欲善信者吾因而善信之不善信者吾亦以善信教之令百姓感吾德而善信之河曰百姓德化聖人為信雱曰知一切相無非妄者故能視不善猶善知一切相無非實者故能視不信猶信當妄知實當實知妄此聖智所以異於衆人聖人之在天下惵惵明皇本作惵惵弼本作歙歙河曰聖人在天下怵怵常恐怖富貴不敢驕奢為天下渾心明皇曰聖人在理天下化引百姓常惵惵用心令德善信而聖心凝寂德照圓明渾同用心皆為天下故為天下渾其心河曰言聖人為天下百姓渾濁其心若愚暗不通也雱曰惵惵恐懼之意聖人雖體盡空虛不立一物而及其應世未嘗不隨時齋戒蓋有而為之則雖聖不敢易也聖人以天下為心所以建立萬法天下以聖人為心所以歸復大道心者能覺知分别而聖人務使人復於無知故曰渾心也一本惵惵作歙歙歙歙收斂之意亦通一本作渾其心百姓皆注其耳目明皇曰百姓化聖德為善故傾注耳目以觀聽聖人河曰注用也百姓皆用其耳目為聖人視聽也弼曰各用聰明雱曰仰而法之聖人匕匕白孩之明皇曰聖人念彼蒼生猶如慈母故凡視百姓皆如嬰孩河曰聖人愛念百姓如嬰孩赤子長養之而不責望其報弼曰皆使和而無欲如嬰兒也夫天地設位聖人成能人謀鬼謀百姓與能能者與之資者取之能大則大資貴則貴物有其宗事有其主如此則可冕旒垂目而不懼於欺黈纊塞耳而無戚於慢又何為勞一身之聰明以察百姓之情哉夫以明察物物亦競以其明應之以不信察物物亦競以不信應之夫天下之心不必同其所應不敢異則莫肯用其情矣甚矣害之大也莫大於用其明矣夫在智則人與之訟在力則人與之爭智不出於人而立乎訟地則窮矣力不出於人而立乎爭地則危矣未有能使人無用智者未有能使人無用其智力於己者也如此則己以一敵人而人以千萬敵己也若乃多其法網煩其刑罰塞其徑路攻其幽宅則萬物失其自然百姓喪其手足鳥亂於上魚亂於下是以聖人之於天下歙歙焉心無所主也為天下渾心焉意無所適莫也無所察焉百姓何避無所求焉百姓何應無避無應則莫不用其情矣人無為舍其所能而為其所否能舍其所長而為其所短如此則言者言其所知行者行其所能百姓各皆注其耳目焉吾皆孩之而已雱曰無知之民動皆非理聖人憐而誘之如父母於赤子恂恂然適其志氣而無忿疾之心非夫體道忘物而仁侔天地者其敦能如此出生入死章第五十出生入死明皇曰了悟則出生迷執則入死此標也河曰出生謂情欲出五內魂定魄靜故生入死謂情欲入於胸臆精神勞惑故死弼曰出生地入死地雱曰由陰陽之機而為所遷者莫不然由妄有其生故也生之徒十有三死之徒十有三明皇曰泛論衆生當生安生得生理處死順死得死理如此者大泛十中有三爾河曰言生死之類各有十三謂九竅四關也其生也目不妄視耳不妄聽鼻不妄香臭口不妄言舌不妄味手不妄持足不妄行精不妄搖於其死也反是雱曰天下之為道術者或見乎陽之動而憑其強陽或見乎陰之靜而止乎枯稿皆非道德之正而與死生為徒者也人之生動之死地亦十有三明皇曰徇生太厚以養傷生既心矜此生故動往死地此則生理既失死理亦虧如此之輩亦十中有三人爾河曰人之求生動作反之十三死地雱曰貪生失理故動皆傷性蓋天下除無知常民之外或徇道而為道術或徇欲而為咎惡皆由有其生而自生故不免於死生也夫何故河曰問何故動之死地也以其生生之厚明皇曰設問所以動之死地夫緣何故但以其求生此生大厚之故也河曰所以動之死地者以其求生活之事太厚違道忤天妄行失紀雱曰至人不知死不知生故亦莫能死亦莫能生故曰未嘗死未嘗生也彼偏乎陰陽而與生死為徒者及徇欲為咎動之死地者凡是三類所見則殊而原其所以迷大道之至正而不免於生死者猶妄有其生而矜生過厚故耳或曰彼為道而至乎枯稿者豈生生之厚乎曰吾之所以為我不死不生湛爾常一唯當息妄而彼乃執其所見更為枯稿故雖志趨空寂而據其此志則是有我之尤者也蓋聞善攝生者河曰攝養也陸行不遇兕虎河曰自然遠避害不干也入軍不彼甲兵河曰不好戰以殺人兕無所投其角虎無所措其爪兵無所容其刃明皇曰善攝衛生理之人心照清靜無妄為之意則凡是外物不可加害陸行不求遇兕虎入軍不彼帶甲兵此不求害物也則物無害心故無投角措爪容刃之所也河曰養生之人虎兕無由傷兵刃無從加之也夫何故河曰問虎兕兵甲何故不害之以其無死地明皇曰夫何故兕虎甲兵無容措之所乎以其順化無私不以死為死則物不得害其生故云無死地也河曰以其不犯十三之死地言神明營護之此物不敢害弼曰十有三猶云十分有三分取其生道全生之極十分有三耳取死之道全死之極十分亦有三耳而民生生之厚更之無生之地焉善攝生者無以生為生故無死地也器之害者莫甚乎戈兵獸之害者莫甚乎兕虎而令兵戈無所容其鋒刃虎兕無所措其爪角斯誠不以欲纍其身者也向死地之有乎夫蚖蟺以淵為淺而鑿穴其中鷹鸇以山為卑而增巢其上矰繳不能及網罟不能到可謂處於無死地矣然而卒以甘餌乃入於無生之地豈弗生生之厚乎故物苟不以求離其本不以欲渝其真雖入軍而不害陸行而不可犯也赤子之可則而貴信矣雱曰無死地者由其無生彼無生者湛然常生而不自生故未嘗死未嘗生道至乎此則雖其形有襌而神未嘗變安得死乎此中國之神聖而西方之佛也若然者變化無常水火不能焦濡斫撻不能創病乘虛觸實往無不通則物欲有之而不得况能傷之哉或曰然則何以謂之攝生曰降此一等便為死生所有故攝生必至於此然後生常存也是比於含德之厚者又為至矣道生之章第五十一道生之明皇曰妙本動用降和氣河曰道生萬物德畜之明皇曰物得以生養萬類河曰德一也一生布氣而畜養物形之明皇曰乾知坤作兆形位河曰一為萬物設形象也勢成之明皇曰寒暑之勢各成遂河曰一為萬物作寒暑之勢以成之弼曰物生而後畜畜而後形形而後成何由而生道也何得而畜德也何由而形物也何使而成勢也唯因也故能無物而不形唯勢也故能無物而不成凡物之所以生功之所以成皆有所由則莫不由乎道也故推而極之亦志道也隨其所因故各有道焉雱曰此四者皆道也以其各得其道故但為德為德則畜之而已然畜之所以為德也及乎得其得而成形則物而已矣物有其形則遠近相取剛柔相交各因其勢而成狀故德者道之分物者德之器勢者物之理明乎道德則形勢不足知而應酢無難矣是以萬物莫不尊道而貴德明皇曰萬物由道德以生畜故尊貴之河曰道德所為無不盡驚動而尊教弼曰道者物之所由也德者物所得也由之乃得故不得不失尊之則害不得不貴也雱曰道尊而德卑德貴而物賤尊者如君父貴者如金玉此尊貴之異也道之尊德之貴夫莫之爵而常自然明皇王弼二本命並作爵明皇曰言道德之尊貴非假爵命但生成之功彼物而常自然貴爾河曰道一不命召萬物而常自然應之如影響雱曰命於天則為天子命於天子則為諸侯有所受命則出命者能賤之矣唯道萬物之先而制其命孰能假之故常自然也故道生之德畜之長之育之成之熟之養之覆之明皇曰是以莫不尊道而貴德河曰道之於萬物非但生之而已乃復長養成熟覆育全其性命人君治國治身亦當如是也弼曰謂成其質各得其庇蔭不傷其體矣雱曰一本云德畜之生而不有河曰道生萬物不有所取以為利也為而不恃河曰道所施為不恃望其報也弼曰為而不有長而不宰河曰道長養萬物不宰割以為利用也是謂玄德明皇曰具如載營魄章所釋彼章言人修如道此章明道用同人河曰道之所行恩德玄暗不可得見弼曰有德而不知其主也出乎幽冥故謂之玄德也雱曰道以不生故能生生及其生生亦德而已天下有始章第五十二天下有始以為天下母明皇曰始者沖氣也言此妙氣生成萬物有茂養之德故可為天下母河曰始有道也道為天下萬物母也弼曰善始之則善養畜之矣故天下有始則可以為天下母矣雱曰有名萬物之母則道是也始與母本同一體當其生生故但謂之母既得其母以知其子眀皇曰萬物既得沖氣茂養以知其身即是沖氣之子河曰子一也既知道已當復知一也雱曰萬物由道以出道為之母故謂之子得道則萬物之理不待識而知既知其子復守其母河曰已知一當復守道反無為雱曰至人雖殫窮物理而知理無實相故雖知之而不逐理而離道故曰復守其母也沒身不殆明皇曰既知身是沖氣之子當守此沖和妙氣不令離散則終沒其身長無危殆河曰不危殆也弼曰母本也子末也得本以知末不舍本以逐末也雱曰夫見理之後逐理不返則妄作為凶失道遠矣故知子守母乃常不殆也故下文云塞其兊河曰兊目也目不妄視也閉其門河曰門口也使口不妄言弼曰兊事欲之所由生門事欲之所由從也雱曰兊悅也人悅則形開故為兊兊則物入之矣夫所以悅而至於形開者何也由不守其道而妄物理之美故悅而隨之以出也門者精神所出也外見諸理形開以受之而復出精神與之為精則擾擾萬緒自此始矣故當塞兊閉門常守其母也終身不勤明皇曰兊愛悅也目悅色耳悅聲六根各有所悅縱則生患是故塞之不縱六根愛悅則禍患之門閉矣故終身不勤勞矣河曰人當塞目不妄視閉口不妄言則終身不勤矣弼曰無事永逸故終身不勤也雱曰塞兊閉門以外應物則酬酢萬變而用常有餘開其兊河曰開目視情欲也濟其事河曰濟益也益情欲之事終身不救明皇曰開張六根縱其視聽以成濟其愛悅之事則常有禍患故終身不救河曰禍亂成也弼曰不閉其原而濟其事故雖終身不救雱曰兊開物入而復費神用以濟其事則以內徇外逐物往矣一溺此流誰能救之哉見小曰明明皇曰人能於事微小則見而改行可謂明矣河曰萌牙未動禍亂未見為小昭然獨見為明雱曰守道則其見者微逐理則所知者博守柔曰強明皇曰守柔弱則人不能加可謂強矣河曰守柔弱日以強大也弼曰為治之功不在大見大不明見小乃明守強不強守柔乃強也雱曰柔者本也憑強陽以為強則逐物而不返唯守柔故勝物而不傷用其光河曰用其目光於外視時出之利害弼曰顯道以去民復歸其明明皇曰見小則明守柔則強若矜明用強將失守柔見小之義故當用光外照復歸守內明則長無患纍矣河曰復當反其光明於內無使精神泄也弼曰不明察也雱曰聖人之光則火性是也火性周乎虛空而光託薪以為體照用既罷還歸於空初不自明因薪示明而已聖人之光由物顯照物既無常照亦隨已故雖應酢無窮而初不費我也非天下之至神其敦能與於此無遺身殃河曰內視存神不為漏矣是謂襲常明皇曰遺與也言還守內明則無與身為殃咎者如此是謂密用真常之道河曰人能行此是謂習修常道也弼曰道之常也雱曰儻有其明則是有我相我相既立物物為殃故能明上文所謂乃終無殃也外此道者皆生滅法唯體此義乃始常住襲者體之而自不顯之謂也道德真經集注卷之七
