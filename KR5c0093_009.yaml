  text: 道德真經集注卷之九恃二
  hash: sha256:8c71a9612b4145dfe4fe66548ef328b75be4fb35e0106bcddc292ab878e7d10e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0093_HFL_009-001a, image: hfl/0397/0397-070.png}
body:
  text: 明皇河上公王弼王雱注大國者下流章第六十一大國者下流河曰治大國當如居下流不逆細微弼曰江海居大而處下則百川流之大國居大而處下則天下流之故曰大國下流也雱曰如江海之於百谷天下之交明皇曰下流者謙德也大國當下流開納則天下之人交至也河曰大國天下士民之所交會也弼曰天下之所歸會者也天下之牝河曰牝者陰類也柔謙和而不愠也弼曰靜而不求物自歸之雱曰當以雌靜受物一本天下之交字牝常以靜勝牡河曰女所以屈於男陰勝陽以安靜下先求之也以靜為下明皇曰天下之人交至者歸於謙德則如牝以雌靜常為牡動所求由以靜為下河曰陰道以安靜為謙下弼曰以其靜故能為下也牝雌也雄躁動貪欲雌常以靜故能勝雄也以其靜復能為下故物歸之也雱曰一本云以其靜為之下故大國以下小國弼曰大國以下猶云以大國下小國則取小國河曰能謙下之則常有之弼曰小國則附之小國以下大國則取大國明皇曰大取小以為臣妾小取大以為援助河曰此言國無大小能執謙畜人則無過失也弼曰大國納之也故或下以取或下而取明皇曰以者大取小而者小取大河曰下者謂大國以下小國小國以下大國更以義相取弼曰言唯修卑下然後乃各得其所雱曰天性非能下人以好為之者非欲取人但天性自下人而人自歸之者大國不過欲兼畜人河曰大國不失下則兼并小國而牧畜之小國不過欲入事人明皇曰大國執謙德而下小國者不過欲兼畜小國為臣妾小國贄貢賦以下大國者不過欲入事大國為援助河曰使為臣僕兩者各得其所欲故大者宜為下明皇曰一求臣妾一求援助是兩者各得其所欲然大國者常戒於滿盈故特云大者宜為下河曰大國小國各欲得其所大國又宜為謙下弼曰小國修下自全而已不能令天下歸之大國修下則天下歸之故曰各得其所欲則大者宜為下也雱曰均之有取大國以下小國則為樂天樂天者道也小國以下大國則為畏天畏樂天者勢也道者萬物之奧章第六十二道者萬物之奧明皇曰萬物皆資妙本以生成是萬物取給之所故興言云為萬物之奧奧內也河曰奧藏也道為萬物之藏無所不容也弼曰奧猶愛也可得庇蔭之辭雱曰大道深密能庇覆萬物而萬物之所伏藏善人之寶明皇曰善人知守道者昌失道者亡故常寶貴之而無患纍也河曰善人以道為身寶不敢違弼曰寶以為用也雱曰善人之所寶聖人則體之矣一本作所寶不善人之所保明皇曰保任也不善之人不能寶貴至道及有患難即欲以身保任於道自求免爾河曰道者不善人之所保倚也遭患逢急猶自知悔卑下弼曰保以全也美言可以市河曰美言者獨可於市耳大市交易而退不相宜善言美語求者欲疾得買者欲疾售也尊行可以加於人明皇曰甘美其言可以求市尊高其行可以加人以况聖人以甘美法味之言尊高清靜之行以化不善之人亦如市賈之售相率而從善矣故下文云河曰加别也人有尊貴之行可以别異於凡人未足以尊道弼曰言道無所不先物無有貴於此也雖有珍寶璧馬無以正之美言之則可以奪衆貨之賈故曰美言可以市也尊行之則千里之外應之故曰可以加於人也雱曰美言尊行道之末流而猶足以市且加於人况道者乎一本無於字人之不善何棄之有明皇曰不善之人亦在化之而已何棄遺之有乎河曰人雖不善當以道化之蓋三皇之前何有棄民德化淳也弼曰不善當保道以免倣雱曰市以利合者也人性忌其上而不可加者也苟有美言尊行則雖利者可與交而加人而人不忌矣然則有道者其於化人何所不服哉故於人之不善無所棄也故立天子置三公明皇曰共教不善之人河曰欲使教化不善之人弼曰言以尊行道也雖有拱璧以先駟馬不如坐進此道明皇曰三公輔佐雖以合拱之璧先導駟乘之馬以獻之猶不如坐進此無為之道於吾以化人爾河曰雖有美璧先駟馬而至故不如坐進此道弼曰此道上之所云也言故立天子置三公尊其位重其人所以為道也物無有貴於此者故雖有拱抱寶璧以先駟馬而進之不如坐而進此道也雱曰天子三公以化民為己任有道則天下將自賔璧馬所以招賢招賢為政之大者也雖得賢而己不能進道則民猶不服故未若不求乎外而進道之要也古之所以貴此道者何也明皇曰何問辭也不曰求以得河曰古之所以貴此道者不曰遠行求索近得之於身有罪以免耶河曰有罪謂遭亂世暗君安行刑誅修道則可以解死免於衆耶也雱曰求以得故善人寶之有罪以免故不善人保之故為天下貴明皇曰道在於悟不在於求不如財帛故可日日求而得之故云不日求以得既悟則自無罪纍豈待有罪方求免邪可以為天下貴爾河曰道德洞遠無不覆濟全身治國恬然無為故可為天下貴也弼曰以求則得求以免則得免無所而不施故為天下貴也為無為章第六十三為無為河曰因成修故無所造作雱曰為道也事無事河曰預設備除煩省事也雱曰事道也味無味河曰深思遠慮味道意也弼曰以無為為居以不言為教以恬淡為味治之極也雱曰味道也此三事者皆為道之常為此道者雖以無為為常而不敢以無故輕乎有物但遇物以道而及乎有物則不敢忽也故下文云大小多少河曰陳其戒令也欲大反小欲多反少自然之道也雱曰畏事之小如大真事之少如多莊子曰不忽於人怨以德明皇曰於為無為於事無事於味無味者假令大之與小多之與少既不越分則無與為怨者逐境生心違分傷性則無大無小皆為怨懟今既守分全和故是報怨以德河曰修道行善絶禍於未生也弼曰小怨則不足以報大怨則天下之所欲誅順天下之所同者德也雱曰以直報怨者事也以德報怨者德也事則吉凶與民同患故已上諸法一不可廢若夫德則不見有物安得怨乎如上三事體道者也方其體道故當如此爾舉怨而以德則知無所不用德圖難於其易河曰欲同難事當於易時未及成也為大於其細明皇曰肆情縱欲者於為無不難於事無不大今欲圖度其難營為其大當須於性未散而分未越則是於其易細也河曰欲為大事必作於小禍亂從小來也雱曰任德者雖以無為常而及乎事物之際常齊戒以臨之書曰兢兢業業一日二日萬機莊子曰有而為易乎昊天不宜天下之禍常生於所忽戒乎其易與細則終無尤矣天下之難事必作於易河曰從易生難天下之大事必作於細明皇曰明上文所以預圖為也河曰從細至著雱曰易則發於所忽細則從微至著故聖人終不為大河曰處謙虛也故能成其大明皇曰因云大事必作於細將眀聖人所以能成其大者以不為其難事大事故能成其尊大爾河曰天下共歸之也雱曰聖人常修細務以成大功功業既成所謂大人也詩曰小難盡廢則中國微矣此亦明大治之在積小也夫輕諾必寡信河曰不重言也多易必多難明皇曰輕諾許人必寡於信動作多易後必多難河曰不慎患也是以聖人猶難之河曰聖人動作舉事猶進退重難之欲塞其源弼曰以聖人之才猶尚難於細易况非聖人之才而欲忽於此乎故曰猶難之也故終無難矣明皇曰難為輕諾多易故終無難大之事河曰聖人終身無患難之事猶避害深也雱曰聖人非但慎微可不生事常以事為憚而不輕易於有為故終無難也其安易持章第六十四其安易持河曰治身治國安靜者易守持也其未兆易謀明皇曰言人正性安靜之時將欲執持令不散亂次雖欲起心尚未形兆謀杜絶之使令不起並甚易爾河曰情欲禍患未有形兆時易謀止也雱曰戒在事物之先所謂為之於未有其脆易泮河曰禍亂未動於朝情欲未見於色如脆弱易破除雱曰一本泮作破其微易散明皇曰欲心初染尚自危脆能絶之者脆則易破禍患初超形兆尚微將欲防之微則易散爾河曰其未彰著微小易散去也弼曰雖失無入有以其微脆之故未足以興大功故易也此四者皆說慎終也不可以無之故而不持不可以微之故而弗散也無而弗持則生有焉微而不散則生大焉故慮終之患如始之禍則無敗事雱曰救於已然之始所謂治於未亂為之於未有明皇曰覆上易持易謀也所以易者為營為於未有形兆爾河曰欲有為當於未有萌芽之時塞其端也弼曰謂其安未兆也治之於未亂明皇曰覆上易破易散也所以易者為除理之於未成禍亂爾河曰治身治國於未亂之時當塞閉其門也弼曰謂閉微脆也合抱之木生於毫末河曰從小成大雱曰長也九層之臺起於纍土河曰從卑立高雱曰積也千里之行始於足下明皇曰此二者喻其不早良圖使後成患河曰從近至遠雱曰進也此三者皆自近及遠從微至著物化之理也故聖人不敢造事物之端以開天下誠恐因而寖大去本日遠貽患將來也故曰化而欲作吾將鎮以無名之朴然則聖人之慮患也不亦早乎烏者敗之河曰有為於事廢於自然有為於義廢於仁有為於色廢於精神也執者失之明皇曰凡情不能因任營為分外為者求遂理必敗之於事不能忘遣動成執著執著求得理必失之河曰執利遇患執道全身堅持不得推讓反還弼曰當以慎終除微慎微除亂而以施為治之刑名執之反生事原巧辟滋作故敗失也雱曰真常無所有所則違為之執之皆屬意作吾有此意民意日生夫然豈所謂持其安而謀其未兆者是以聖人無為故無敗河曰聖人不為華文不為色利不為殘賊故無敗壞也無執故無失河曰聖人有德以教愚有財以與貧無所執藏故無所失於人也雱曰吾不敗常失性則天下亦盡其常性矣故民之從事常於幾成而敗之明皇曰人之始從事於善者常於近成而自敗之河曰從為也民人為事常於功德幾成而貪位好名奢泰盈滿而自敗也弼曰不慎終也雱曰事有常運時至即成莊子曰美成在久而民愚無知昧於此理躁而欲速以人助天故事已幾成而每至自敗此則以人勝天以故滅命以事勝道之過也慎終如始則無敗事矣明皇曰慎其終末常如始從善之心則必無過敗之事河曰終當如始不當懈怠雱曰事常自為不假人力如種苗者但當深其根去其害則秋至而成理可待也是以聖人欲不欲河曰聖人欲人所不欲人欲彰顯聖人欲伏光人欲文飾聖人欲質朴人欲色聖人欲於德也雱曰不欲之欲非無欲也欲在於不欲耳故不貴難得之貨而已不貴難得之貨明皇曰難得之貨為性分所無者今聖人於欲不欲不營為於分外故常全其自然是不貴難得之貨河曰聖人不眩為服不賤石而貴玉弼曰好欲雖微爭尚為之興難得之貨雖細貪盜為之超也雱曰聖人所謂無為無執者故未至於釋然都忘也但不於性分之外更生一切耳且民飽食暖衣性所不免欲此而已不為有欲而離性之後更貴難得之貨此乃愚人迷妄失本已遠故也故聖人常欲不欲以救其迷而反之性學不學河曰聖人學人所不能學人學智詐聖人學自然人學治世聖人學治身守道真也雱曰不學之學非無學也所學在於不學耳以復衆人之所過故也以復衆人之所過河曰衆人學問反過本為末過實為華復之者使反本也弼曰不學而能者自然也喻於不學者過也故學不學以復衆人之所過雱曰衆人逐末多事聖人以不學之學救其過而反之道以輔萬物之自然河曰教人反本實者欲以輔助萬物自然之性也而不敢為明皇曰聖人不求過分之學是於學不學將以歸復衆人過分之學以輔其自然之性故不敢為俗學與多欲也雱曰輔自然者莊子所謂反以相天是也為之則以人滅天矣故不敢為然則萬物安乎性命之常而事物無所兆矣夫豈有脆之可泮微之可散者哉古之善為道者章第六十五古之善為道者河曰說古之善以道治身及治國者非以明民河曰不以道教民明智巧詐也將以愚之明皇曰人君善為道者非以其道明示於人將導之以和使歸復於朴令如愚爾河曰將以道德教民使朴質不詐僞弼曰明謂多見巧詐蔽其朴也愚謂無知守真須自然也雱曰所惡夫愚者不明乎理而扺冒法禁今則不然反常復朴無事巧僞而已詩曰不識不知順常之則民之難治以其智多明皇曰君將明道以臨下人必役智以應上智多則詐興是以難理河曰以其智多故為巧僞弼曰多智巧詐故難治也雱曰智則難知故以智治國國之賊明皇曰以用也人君任用多智之臣使令理國智多必作法法作則奸生故是國之賊河曰使智慧之人治國之政事必遠道德妄作威福為國之賊弼曰智猶治也以智而治國所以謂之賊者故謂之智也民之難治以其多智也當務塞兊閉門令無知無欲而以智術動民邪心既動復以巧術防民之僞民知其術防隨而避之思惟密巧奸僞益滋故曰以智治國國之賊也雱曰任察以治則民爭出於智詐矣莊子曰開人者賊生此之謂也不以智治國國之福明皇曰若不用巧智之臣但取純德之士使偃息蕃魏弄丸解難自然智詐日薄淳朴日興人和年豐故是國之福也河曰不使智慧之人治國之政事則民守正直不為邪飾上下相親君臣同力故為國之福也雱曰君人在乎法天法天在乎體道釋道而智非其任矣若夫至人無思無為而天下復朴者福可勝言哉莊子曰閉天者德生此之謂也知此兩者亦楷式明皇曰役智詐則害於人任純德則福於國人君能知此兩者委任純德之臣是以為君楷模法式河曰兩者謂智與不智者智者能為賊不智者能為福是治身治國之法式也雱曰楷一本作稽能知楷式是謂玄德明皇曰人君常知所委任是謂深玄至德矣河曰玄天也能知治身及治國之法式是謂與天同德也玄德深矣遠矣河曰玄德之人深不可測遠不可極也弼曰楷同也今古之所同則不可廢能知楷式是謂玄德玄德深矣遠矣與物反矣河曰玄德之人與萬物反異萬物欲益己玄德施與人也弼曰反其真也雱曰物事也任德者與事相反而事卒以之治比本末之說也世人所見者淺近徇末而昧於本故但見事而不知德也然後乃至大順明皇曰玄德深遠能與物反歸復其本令物乃至大順於自然之性也河曰玄德與萬物反異故能至大順順天理也雱曰方其任德之時若反於事而事終以治反近情而順大勢故也一本作乃復至於大順江海為百谷王章第六十六江海所以能為百谷王者以其善下之也河曰江海以卑故衆流歸之若民歸就王故能為百谷王明皇曰江海所以能令百川委輸歸王者以其善能卑下之故百川朝宗矣河曰以卑下故能為百谷王也雱曰王者歸往之義能不物物乃歸矣是以聖人欲上人河曰欲在民上以其言下之河曰法江海處謙虛欲先人河曰欲在民之前也以其身後之河曰先人而後己也是以聖人處上而人不重河曰聖人在民上為主不以尊貴謔下故民戴而不為重處前而人不害明皇曰謙為德柄尊用益光以言謙下之百姓欣戴故處其上而人不以為重以身退後之百姓子來故處其前而人不以為害也河曰聖人在民前不以光明蔽後民親之若父母無有欲害之心也雱曰一本有也字是以天下樂推而不厭明皇曰以是不重不害之故故天下之人樂推崇為之主而不厭倦河曰聖人恩深愛厚視民如赤子故天下樂推進以為主無有厭也雱曰聖人豈計利而為此哉亦德而已矣德下之則形上矣德後之則形先矣故常為天下貴也以其不爭河曰天下無厭聖人時是由聖人不與人爭先後也故天下莫能與之爭明皇曰聖人謙退不與物爭天下共推誰與爭者河曰言人皆爭自為無與吾爭無為天下皆謂章第六十七天下皆謂我道大似不肖明皇曰肖似也老君云天下之人皆謂我道大無所象似我則答云河曰老君言天下謂我德大我則佯愚似不肖夫唯大故似不肖河曰唯獨名德大者為身害故佯愚似若不肖無所分别無所割截不賤人而自貴若肖久矣河曰肖善也謂辨惠也若大辨惠之人身高自貴行察察之政所從來久矣其細也夫明皇曰夫唯我道至大故無所象似若如代間諸法有所象似則不得稱大久已微細也夫河曰言辨惠者唯如小人也非長者弼曰久矣其細猶曰其細久矣肖則失其所以為大矣故夫曰若肖久矣其細也雱曰肖者有所似道為萬物祖故體道者物當似我我豈似物乎蓋有所似則是象彼則彼必大而我小矣我有三寶雱曰凡此三寶皆俗情所謂小而乃至人之所以為大也寶而持之明皇曰我道雖大無所象似然有此三行甚可珍貴能常保倚執持可以理身理國也河曰老子言我有三寶抱持而保倚一曰慈河曰愛百姓若赤子雱曰慈主於愛愛物仁也而獨稱慈者仁則廣德以覆下於末為盛矣老子方語其本故不曰仁而曰慈慈者父道仁之本而不假為者也二曰儉河曰賦斂若取之於己也雱曰儉之為德寡欲也貴本也愛物也一言而三善至者其儉乎若孔子曰禮與其奢也寧儉蓋聖人制禮將以為儉而方其為禮也不得獨儉非禮則無末非老子則不知本本乎本乎聖人之道於是為至乎三曰不敢烏天下先明皇曰慈則廣救儉則足用不敢為天下先故樂推而不厭河曰執謙退不為倡始也雱曰於易則謙是也天地人神皆以謙為貴故聖人寶之夫慈故能勇明皇曰慈仁敏故勇於救濟也河曰以為仁故能勇於忠孝也弼曰夫慈以陳則勝以守則固故能勇也雱曰慈者不爭而勝勇莫大焉儉故能廣明皇曰節儉愛費財用有餘故功施益廣也河曰天子身能節儉故民日用廣矣弼曰節儉愛費天下不匱故能廣也雱曰區區以奢侈自廣者其狹甚矣唯無以末傷本無以外滅內者至廣也不敢為天下先河曰不為天下首先故能成器長明皇曰慈儉之德謙益光推先與人人必不厭故能成神器之長河曰成器長謂得道人也我能為道人之長也弼曰唯後外其身為物所歸然後乃能立成器為天下利為物之長也雱曰此聖人之行故但為器長而已若道之長則未嘗在物後也今舍其慈且勇河曰今世人舍慈仁但為勇武也弼曰且猶取也舍其儉且廣河曰舍其儉約但為奢華舍其後且先河曰舍其後己但為人先死矣明皇曰今舍慈且勇勇則害物舍儉且廣廣則傷財舍後且先先則人怨傷財害物聚怨於人是必死之道故云死矣河曰所行如此動入死地雱曰以人滅天以事勝道借使幸免蓋失所以生矣三寶皆天德而本者也夫慈以陳則正弼曰相慜而不避於難故正也雱曰正如正兵之正正兵之言師整而不動也愛民如子則民愛之如父不令而齊矣彼倒戈攻于後以此者上不慈故也一本作以戰則勝以守則固明皇曰用慈以戰利在全衆用慈以守利在安人各保安全故能勝固矣河曰夫慈人者百姓親附并心一意故以戰則勝敵以守衛則堅固雱曰戰守主於殺伐而尚以慈為德則餘事可知天將救之以慈衛之明皇曰以慈守豈但人和天道孔眀亦將救衛戰勝天救也守固天衛也是皆以慈故故云天將救之以慈衛之河曰天將救助善人必與慈人之性使能自營助也雱曰三寶皆以慈為心言天救衛之者以其慈也善為士章第六十八善為士者不武明皇曰士事也善以道為理國之事者尚德故云不武河曰言貴道德不貴武力弼曰士卒之帥也武尚先陵人也雱曰士非成德之稱故士之為言察也武也獄師曰士取其察卒帥曰士取其武夫以武為事者德在乎不武所以為之本也故武者不失為士而非德士也為士之善其以德乎善戰者不怒明皇曰事不得已必須應敵以慈則善故不憑怒河曰善以道戰者禁邪於胸心絶禍於未萌無所誅怒也弼曰後而不先應而不唱故不在怒雱曰武王一怒而安天下者其事而已德則未嘗怒也善勝敵者不爭明皇曰師克在和和則善勝全勝之善故不交爭河曰善以道勝敵者附近以仁來遠以德不與敵爭而敵自服也弼曰不與爭也雱曰不爭之德有時而爭爭之者事也德則未嘗爭也善用人者烏之下明皇曰說以使人令盡其力必先下之是為善用是謂不爭之德河曰謂上為之下也是乃不與人爭之道德也雱曰是德也非事也此言德經也故常言德它皆如此是謂用人之力河曰能身為人下是謂用人臣之力弼曰用人而不為之下則力不為用也雱曰天下皆助之故不用力而勝强也是謂配天河曰能行此者德配天也雱曰不徇事而得德故能盡性盡性則人道備故可以配天古之極明皇曰善勝是不爭之德為下是用人之力能如此者可以配天稱帝是古之至極要道也河曰是乃古之極要道也雱曰一本此有也字古之極者大中之道也道德真經集注卷之九
