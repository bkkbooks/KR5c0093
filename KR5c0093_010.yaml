body:
  text: 明皇河上公王弼王雱注用兵有言章第六十九用兵有言明皇曰老君傷時王殘人於兵故託古以陳戒有言者謂下句河曰陳用兵之道老子疾時用兵故託此設其義也吾不敢為主河曰主先也不敢先舉兵而為客河曰客者和而不倡用兵當承天而後動雱曰造攻自嗚條為兵主者也朕載自亳為客者也不敢進寸而退尺明皇曰主有動作則生事而貪無營為則以慈自守自守則全勝生事則敗亡進雖少不能無事退雖多不失謙讓故不敢進於寸而退於尺河曰侵人境界利人財寶為進閉門守城為退雱曰不勇於殺伐是謂行無行明皇曰為客退尺不與物爭雖行應敵與無行同矣河曰彼遂不止為天下賊雖行誅之不行執也弼曰彼遂不止雱曰至仁之兵有征無戰與無行同攘無臂明皇曰攘臂所以表怒善戰不怒故若無臂可攘河曰雖欲大怒若無臂可攘也仍無敵明皇曰仍引也引敵者欲爭不爭故若無敵可引河曰雖欲仍引之心若無敵可仍也弼曰行謂行陳也言以謙退哀慈不敢為物先用戰猶行無行攘無臂執無兵仍無敵也言無與之抗也執無兵明皇曰執兵所以表殺今以慈為主故雖執兵與無兵同河曰雖欲執持之若無兵刃可持用也何者傷彼之民罹罪於天遭不道之君愍忍喪之痛也雱曰雖有戰之名前無敵者故與不戰同禍莫大於輕敵河曰夫禍亂之害莫大於欺輕敵人侵取不休輕戰貪財輕敵則幾喪吾寶明皇曰為禍之大莫大於輕侮敵人輕侮敵人者則殆喪吾以慈之寶河曰幾近也寶身也欺輕敵人近喪身也弼曰言吾哀慈謙退非欲以取强無敵於天下也不得已而卒至於無敵斯乃吾之所以為大禍也寶三寶也故曰幾亡吾寶雱曰兵凶器也仁人之兵雖所向無前而不敢輕敵輕敵則喪其慈喪慈則有不勝也故抗兵相加河曰兩敵戰也哀者勝矣明皇曰抗舉也兩國舉兵以相加則慈哀於人者勝河曰哀者慈仁士卒不遠於死弼曰抗舉也若當也哀者必相惜而不趣利避害故必勝雱曰哀憐之心慈也慈故能勇所以勝一本作相若亦通若之言兵力相敵也竊嘗論之書曰威克厥愛允濟又曰朂哉夫子尚桓桓亦何哀之有而老子之言兵獨常如此者論兵之道也彼則兵之事也聖人豈異意哉而不同者時而已矣吾言甚易知章第七十吾言甚易知甚易行明皇曰老君云吾所說言契理故易知簡事故易行河曰老子言吾所言省而易知約而易行也而天下莫能知莫能行明皇曰天下之人滯言而不悟煩事而不約故莫能知莫能行河曰人惡柔弱好剛强也弼曰可不出户窺牖而知故曰甚易知也無為而成故曰甚易行也惑於躁欲故曰莫之能知也迷於榮利故曰莫之能行也雱曰聖人順性命之至以為教言不煩而簡事不奇而常反身則知率性則合苟欲知之行之不亦甚易乎凡天下之難事皆起於舍本逐末與妄為構故內外交亂奇物滋出而智不能勝也夫唯異此則一辭可盡雖甚易知甚易行而莫能知莫能行者用心於末而務奇與難故爾一本作人莫之能知能行言有宗事有君明皇曰言者在理理得而言忘故言以無言為宗事者在功功成而不宰故事以無事為君也河曰我所言有宗祖根本事有君臣上下世人不知者非我之無德心與我反弼曰宗萬物之宗也君萬事之主也雱曰言以理為歸事以道為主知理與道則言與事雖多無難知者也夫唯無知是以不吾知也明皇曰夫唯俗人無了悟之知是以不知我無言無事之教河曰夫唯世人也是我德之暗不見於外窮微極妙故無知也弼曰以其言有宗事有君之故故有知之人不得不知之也雱曰所知非至理則所謂知者非知也自以為知而不知聖人則可謂知乎知我者希則我貴矣明皇曰了知我忘知之意者希少則我不言之教者至貴河曰希少也唯達道者乃能知我故為貴也弼曰唯深故知之者希也知我益希我亦無匹故曰知我者希則我貴也雱曰道大則知者少歷萬世而知者一人是旦暮遇之也一本作則我者貴是以聖人被褐懷玉明皇曰彼褐者晦其外懷玉者明其內故知我者希爾河曰彼褐者薄外懷玉者厚內匿寶藏德不以示人也弼曰彼褐者同其塵懷玉者寶其真也聖人之所以難知以其同塵而不殊懷玉而不渝故難知而為貴也雱曰豈辨以相示乎知不知章第七十一知不知尚矣河曰知道言不知是乃德之上雱曰不識不知真知之極不知知病矣明皇曰了法性空本非知法於知忘知是德之上不知知法本性是空於知强知是行之病河曰不知道言知是乃德之病弼曰不知知之不足任則病也雱曰道不可知且不足知而彼乃昭然有知是未嘗知道也未嘗知道而自以為知則是妄見一切耳其病大矣夫唯病病是以不病明皇曰夫唯能病强知之病是以不為强知所病河曰夫唯能病若衆人有强知之病是以不自病聖人之不病以其病病河曰聖人無此强知之病者以其常若衆人有此病也是以不病明皇曰唯聖人所以不病者以其病衆生强知之病是以不病河曰以此非人也故不自病夫聖人懷通達之知托於不知者欲使天下質朴忠正各守純性小人不知道意而妄行强知之事以自顯著內傷精神滅壽消年也弼曰病病者知所以為病雱曰病而不自知病者終莫悟矣民不畏威章第七十二民不畏威則大威至矣明皇曰有威而可畏謂之威言人於小有畏拙於慎微則至於大可畏河曰威害也人不畏小害則大害至謂死亡也畏之者當愛精神承天順地也雱曰民朴而生厚則畏威上失其道多乎有為以小其道塞其生故民巧僞雕薄而威不能服也夫如是則天誅所加禍亂將起故曰大威至無狹其所居明皇曰神所居者心也無狹者除情去欲使虛而生白河曰謂心居神當寬柔不當急狹也無厭其所生明皇曰身所生者神也無厭者少思寡欲使不勞倦河曰人所以生者為有精神託空虛喜清靜飲食不節忽道念色邪僻滿腹為伐本厭神弼曰清靜無為謂之居謙後不盈謂之生雖其清靜行其躁欲棄其謙後任其威權則物擾而民僻威不能復制良民不能堪其威則上下大潰矣天誅將至故曰民不畏威則大威至無狹其所居無厭其所生言威力不可任也雱曰民性本自廣大流通而世教下衰不能使之復朴乃蹙其居之廣而使狹厭其生之通而使塞夫唯狹其居故民不淳而僞唯厭其生故民不厚而薄狹聖人不然使民逍遙乎天下之廣居而各遂其浩然之性則其有干威者乎莊子曰狶韋氏之國黃帝之囿堯舜之宫湯武之室此明世世下衰漸狹其居也彼聖人豈有優劣乎而居乃漸狹者所遭之時則然也夫唯不厭弼曰不自厭也是以不厭明皇曰夫唯人不厭神是以神亦不厭人河曰夫唯獨不厭精神之人洗心濁垢恬怡無欲則精神居之不厭也弼曰不自厭是以天下莫之厭雱曰上不自厭其生而盡性故民亦得盡性也莊子曰不厭其天此之謂也厭者天厭之厭是以聖人自知河曰自知已之得失不自見河曰不自顯見德美於外故之於內弼曰不自見其所知以耀光行藏也自愛河曰自愛其身以保精氣不自貴明皇曰自知其身防可畏之事自愛其身無厭神之咎不自見其能以犯患不自貴其身以聚怨也河曰不自貴高榮名於世弼曰自貴則物狹厭居生雱曰自見則矜我自貴則賤物此所以自狹其居自厭其生亦以狹民之居厭民之生也自知則明乎性而不為妄自愛則保其身而不為非夫然則豈至於干天之威也故去彼取此明皇曰去彼見貴取此知愛河曰去彼自見自貴取此自知自愛勇於敢章第七十三勇於敢則殺河曰勇敢有為則殺身也弼曰必不得其死也勇於不敢則活明皇曰敢謂果敢言人勇於果敢從事則失於謙柔退讓必害於身故云則殺不敢者則可以活身矣河曰勇於不敢有為則活其身弼曰必濟命也雱曰勇敢者任氣生事輕死以徇其所為以事為道者也勇不敢者迫而後動不先物以爭功以道為事者也此兩者河曰謂敢與不敢也或利或害河曰活身為利殺身為害弼曰俱勇而所施者異利害不同故曰或利或害也雱曰人之所利天實害之故曰天之君子人之小人人以為小人則固流俗之所後也而天實先之天之所惡河曰惡有為也孰知其故明皇曰兩者敢與不敢也或有也能知不敢者有利敢者有害當須勇於不敢此勇敢之人動有灾害乃天之所惡孰能知其故哉河曰誰能知天意之故而不犯雱曰下愚小智但見衆人之所利而不知天所惡也故下文明天道之所以然當視以為法是以聖人猶難之明皇曰聖人猶難為勇敢之事河曰言聖人之明德猶難者勇敢况無聖人之德而欲行之乎雱曰聖人與天合德尚不敢輕諾多易也天之道不爭而善勝明皇曰此下言天道謙虛以戒人事勇敢天不與物爭四時盈虛物無違者故善於勝河曰天不與人爭貴賤而人自畏之弼曰夫唯不爭故天下莫能與之爭雱曰天為群物之父豈與赤子為敵乎此所以善勝也不言而善應明皇曰天何言哉福善禍淫曾無差忒故云善應河曰天不言萬物自動以應時弼曰順則吉逆則凶不言而臨應也雱曰天何言哉四時行焉百物生焉福善禍淫酬酢萬變無一不至不召而自來明皇曰天道不召物所從已物不能違自來順天爾河曰天不呼召萬物皆負陰而向陽弼曰處下則物自歸雱曰見召於人臣子之道天為君父敦能制之運至則來非有召也坦然而善謀明皇曰天道玄遠繟然寬大垂象示變人可則之故云善謀也河曰繟寬也天道雖寬博善謀慮人事修善行惡各蒙其報也弼曰垂象而見吉凶先事而設誡安而不忘危未兆而謀之故日坦然而善謀也雱曰常易故坦然知險故善謀一本作繟然天網恢恢疏而不失明皇曰天之網羅雖恢恢疏遠刑淫賞善毫分不失河曰天所網羅恢恢其大雖疏遠司察人善惡無有所失雱曰天任理而不任意其禍福也付之自為如木有華還當結實豈或開而結之哉而無一不如法者今世之人多疑禍福之應誡以小智自私任意而不知理故但見一曲而不覩夫大致也故知此道也則世間善惡禍福隨其器之大小各有遲速之度要當報之無有免者且聖人為政尚貴悶悶誠使天道之大而察察其意則其報復也豈能周乎民常不畏章第七十四民常不畏死河曰治國者刑罰酷深民不聊生故不畏死也治身者嗜欲傷神貪財殺身民不知畏之也奈何以死懼之明皇曰縱放情欲動之死地習以為常常無畏者人君當以清靜化之奈何更立刑法以誅殺恐懼之乎河曰人君當寬刑罰教民去情欲奈何設刑法以死懼之雱曰上失其道俗雕民困民無所賴生以扺冒法禁而上猶以死懼之然則所殺雖多亂終不止則秦以下是也若使民常畏死河曰當除己之所殘剋教民去利欲也而為奇者吾得執而殺之孰敢明皇曰若使民人皆從清靜之化不敢溺情縱欲常畏於死而獨為奇詐者假令吾勢得執殺此奇詐之人孰敢即殺故下文云河曰以道教民而民不從反為奇巧乃應王法執而殺之誰敢有犯者老子傷時王不先道德化之而先刑罰弼曰詭異亂群謂之奇也雱曰好生之德洽于民心而民重死然後刑行而物服矣常有司殺者殺明皇曰如此奇詐之人天網不失是常有天之司殺者殺之河曰司殺者天居高臨下司察人過天網恢恢疏而不失也而代司殺是代大匠斫明皇曰人君好自執殺必不得天理是猶拙夫代大匠斫木河曰天道至明司殺有常猶春生夏長秋收冬藏斗杓運移以節度行之人君欲代殺之是猶拙夫代大匠斫木勞而無功也雱曰君尊臣卑各有常分君以無為而任道臣以有為而治事道之與事相去遠矣故典獄則有司殺治木則有大匠君不與焉仰成而已世皆知代斫之非而不悟代殺之失莊子曰上亦有為也下亦有為也是上與下同德傳曰舜何為哉恭己正南面而已道實兼事故君得兼臣然君而事事失其所以為君矣臣之事事而殺伐尤為非道故深言之蓋經稱不以兵强天下而猶曰以道佐主者誠以以道為主則豈暇議彼哉一本而作夫夫代大匠斫希有不傷其手矣明皇曰拙夫代斫豈但傷材亦自傷其手人君任刑代彼司殺豈唯殘害百姓抑亦自喪天和也河曰人君行刑罰猶拙人代大匠斫則方圓不得其理還自傷代天殺者夫紀綱不得其紀綱還受其殃也弼曰為逆順者之所惡忿也不仁者人之所疾也故曰常有司殺也雱曰代斫傷手而已代殺乃失其道也一本無有字民之飢章第七十五民之飢以其上食稅之多也河曰人民所以飢寒者以其君上稅食下太多是以飢明皇曰天下之民所以飢之不足者以其君上食用賦稅之太多故爾河曰民皆化上為貪叛道違德故飢雱曰張官職祿制禮用財將以富民也而費多增稅末盛本衰適使之飢而已一本無也字民之難治以其上之有為也河曰民之不可治者以君上多欲好有為也是以難治明皇曰天下之人所以難理化者以其君上之有為則多難多難則詐興是以難理河曰是以其民化上有為情僞難治雱曰任察生事將以治民而人困俗雕巧僞彌出愈難治矣觀上古與後世即其驗也人之輕死以其求生之厚也河曰人民輕犯死者以其求生活之道太厚貪利以自危是以輕死明皇曰天下之人所以輕其死者以其違分求生太厚之故是以輕死河曰以求生太厚之故輕入死地也雱曰生者不有其生則生常全既過於厚則求欲無已觸刑陷險視死輕矣此三者皆以其求害其所以求蓋明無為之理唯無以生為者是賢於貴生也明皇曰自然之分足則生全若養過其分則生亡矣故夫唯無以厚其生為者是賢於矜貴其生河曰夫唯獨無以生為務者爵祿不干於意財利不入於身天子不得臣諸侯不得使則賢於貴生也弼曰言民之所以僻治之所以亂皆由上不由其下也民從上也疑此非老子之所作雱曰厚生必至於輕死唯無以生為乃常全矣貴生者但賢於輕死未若無以生為之至也此篇三事但明其一則餘二可知也人之生章第七十六人之生也柔弱河曰人生含和氣抱精神故柔弱也其死也堅强河曰人死和氣竭精神亡故堅强也草木之生也柔脆河曰和氣存也其死也枯稿河曰和氣去也故堅强者死之徒也柔弱者生之徒也明皇曰生之柔弱和氣全也死之堅强和氣散也欲眀守柔弱者全生保年為强梁者喪身失性河曰以其上二事觀之知堅强者死柔弱者生也是以兵强則不勝明皇曰見哀者勝故知恃强者必敗河曰强大之兵輕戰樂殺毒流怨結衆弱為一强故不勝弼曰强兵以暴於天下者物之所惡也故必不得勝雱曰善勝者積小不勝以為大勝今此以强為德則其事必弱也木强則共明皇曰本强大故處於下枝條柔弱共生於上蓋取其柔弱者在上强梁者在下故下文云河曰木强大枝葉共生其上也弼曰物所加也雱曰伐而共之故堅强居下弼曰大之本也柔弱處上河曰興物造功大木處下小物處上大道抑强扶弱自然之效弼曰枝條是也雱曰竊嘗論之陰陽道也陰先而陽後天地物也天尊而地卑故語德則柔弱足以勝剛强計事則剛强足以制柔弱世之人覩事而不明乎德故所謂强者常至於與死為徒也一本作强大處下天之道章第七十七天之道其猶張弓乎明皇曰天道玄遠非喻不明故舉張弓以彰其用河曰天道暗昧舉物類以為喻也高者抑之下者舉之有餘者損之不足者與之明皇曰張弓如此乃能命中是猶天道虧盈益謙欲令人君法天字人故示抑高舉下之道河曰言張弓和調之如是乃可用夫抑高舉下損强益弱天之道也天之道損有餘補不足河曰天道損有餘而益謙常以中和為上也雱曰天道任理故均一本補作與人之道則不然河曰人道則與天道反也弼曰與天地合德乃能包之如天之道如人之量則各有其身不得相均如唯無身無私乎自然然後乃能與天地合德損不足以奉有餘明皇曰天道平施裒多益寡人則違天翻損不足河曰世俗之人損貧以奉富奪弱以益强也雱曰人道任情故不均孰能損有餘而奉不足於天下者其唯道乎明皇曰誰能以已之有餘奉與天下之不足乎獨有道者能爾河曰言誰能居有餘之位自省爵祿以奉天下不足者乎唯有道之君能行也雱曰有道者與天合道一本云孰能以有餘奉天下唯有道者是以聖人為而不恃明皇曰聖人法天稱物均施施平於物而不恃其功河曰聖人為德施不恃其報也功成不居明皇曰推功於物不處其成河曰功成事就不處其位雱曰一本居作處字其不欲見賢耶河曰不欲使人知已之賢匿功不居榮名畏天損有餘也雱曰恃為處功則見賢見賢則有餘是招損之道也一本無邪字天下柔弱章第七十八天下莫柔弱於水河曰圓中則圓方中則方擁之則止决則行而攻堅彊者莫之能先河曰水能懷山襄陵磨鐵消銅莫能勝水而成功也其無以易之也河曰夫攻堅强無以易於水雱曰水方圓曲直隨物萬變而初不易已此所以終能勝物也夫玉石堅强矣而持以攻物有時而碎者以其可易耳一本云天下柔弱莫過於水弱之勝彊河曰水能滅火陰能消陽柔能勝剛河曰舌柔齒剛齒先舌亡天下莫不知河曰知柔弱者長久剛强者折傷也而莫之能行明皇曰柔弱之道勝於剛强天下未有不知者知有此道不能行也河曰耻謙卑好强梁雱曰得一者寡一本作故柔勝剛弱勝强是以聖人言河曰謂下事也受國之垢是謂社稷主河曰君能受國之垢濁者若江海不逆小流則能長保其社稷為一國君主也雱曰垢未若不祥之甚故但為社稷主受國之不祥是謂天下王明皇曰引萬方之罪是受國之垢濁稱孤寡不穀是受國之不祥其德如此則社稷有奉故天下之人歸往矣河曰君能引過自與代民受不祥之殃則可以王有天下雱曰聖人所以能柔弱者體水以為德也受垢不祥其納污受辱之義乎此可謂智者道爾正言若反明皇曰受國之垢為社稷主受國不祥為天下王是必正言初若反俗故云正言若反河曰此乃正直之言世人不知以為反言雱曰反於小知之近情而合於大道之至正和大怨章第七十九和大怨者明皇曰與身為怨對之大者情欲也和謂調和也此言人君欲以言教調和百姓使無情欲故曰和大怨河曰殺人者死傷人者刑以相和報必有餘怨明皇曰立教化人不能無迹斯迹之弊還與為怨故曰必有餘怨河曰任刑者夫人情必有怨及於良人也弼曰不明理其契以致大怨已至而德以和之其傷不復故必有餘怨也雱曰上禮為之而莫之應則攘臂而仍之天下始有怨矣既不能反常復本而方乃以聯合歡則怨必彌起安可以為善明皇曰既有餘怨則不可以為善河曰言一人呼嗟則失天心安可以和怨為善也雱曰意若為善而不善之本也是以聖人執左契河曰古者聖人執左契合符信也無文書法律刻契合符以為信也弼曰左契者防怨之所由生也而不責於人明皇曰左契者心也心為陽藏與前境契合故謂之左契爾聖人知立教則必有迹有迹則是餘怨故執持此心使令清靜下人化之則無情欲不煩誅責自契無為河曰但刻契之信下責人以他事也雱曰左契取於人右契取人左無事而右主權故古者分契之法如此也聖人執左契不從事於物而物自來合吾應其合者爾所謂感而遂通天下之故也然則聖人常受天下之責而無責人之心是以終無怨莊子曰以得為在人以失為在已湯曰萬方有罪罪在朕躬此之謂也記曰獻牛馬者操右契蓋獻者并劵以進是知左契乃受責者之所執史記曰操右劵以責事故有德司契河曰有德之君司察契信而已弼曰有德之人念思其契不令怨生而後責於人也雱曰下從事於物而應物之合者無德司徹明皇曰司主也徹通也言有德之君主司心契則人自化無德之主則將立法以通於人為法之弊故未為善河曰無德之君背其契信司人所失弼曰徹司人之過也雱曰徹通也物物求通其塞多矣天道無親常與善人明皇曰司契則清靜立法則凋殘皇天無親唯德是輔故人君者常思化淳於無為不可立法而生事河曰天道無有親疏唯與善人則與司契者也雱曰唯天無親但善則與之明天與聖人同道也小國寡民章第八十小國寡民河曰聖人雖治大國猶以為小儉約不奢泰民雖衆猶若寡少不敢勞之也弼曰國既小民又寡尚可使反古况國大民衆乎故舉小國而言也雱曰小制國寡聚民則淳厚蓋國大民衆則利害相摩巧僞日生觀都邑與聚落之民質詐殊俗則其驗也使民有什伯之器而不用也明皇曰什仵也伯長也此章明人含淳和無所求及適有人材器堪為什仵伯長者亦無所用之矣河曰使民各長部曲什伯貴賤不相犯也器謂農人之器而不用徵召奪民良時也弼曰言使民雖有什伯之器而無所用之當何患不足也雱曰十人所共謂之什器百人所共謂之百器清靜之治務使民各遂其生理而不妄興作終無連群聚衆之事故雖器有什伯而不用也使民重死河曰君能為民興利除害各得其所則民重死而貪生也而不遠徙明皇曰少思寡欲不輕用其生敦本無求故不遠遷徙也河曰政令不煩則民安其業故不遠遷徙離其常處弼曰使民不用惟身是寶不貪貨賂故各安其居重死而不遠徙也雱曰樂生遂性故重死安土無求故不遠徙無道之世質薄事多而利欲勝乎好生末盛本衰而貪求在乎分外故觸刑陷險如履平地而車轍足迹交於四方此亦亂之極也雖有舟輿無所乘之河曰清靜無為不作煩華不好出入遊娛也雖有甲兵無所陳之河曰無怨惡於天下雱曰民自足於性分之內則無遠遊交戰之患使民復結繩而用之明皇曰舟輿所以利遷徙甲兵所以徇攻戰兩者無欲故無所乘陳反朴還淳復歸于三皇結繩之用矣河曰去文反質信無欺也雱曰事簡民淳故無用文契甘其食明皇曰不貪滋味故所食常甘河曰甘其蔬食不思食百牲也美其服明皇曰不事文繡故所服皆美河曰美其惡衣不貴五色雱曰甘食美服無事而富也安其俗明皇曰不飾棟宇故所居則安河曰安其茅茨不好文飾之屋樂其業明皇曰不澆淳朴故其俗可樂河曰樂其質朴之俗不轉移也鄰國相望雞犬之聲相聞明皇曰言其近河曰相去近也雱曰人遂其生故繁息而樂使民至老死不相往來明皇曰無求之至河曰其無情欲弼曰無所求欲雱曰近而不交無求於外也此盡性之治故民亦盡其性竊嘗考論語孟子之終篇皆稱堯舜禹湯聖人之事業蓋以為舉是書而加之政則其效可以為比也老子大聖人也而所遇之變適當反本盡性之時故獨明道德之意以收斂事物之散而一之於朴誠舉其書以加之政則化民成俗此篇其效也故經之義終焉楊子雲為法言亦終乎唐虞之言蓋有法乎孔孟與此書也然子雲之說誠得施於天下亦何足以與乎聖人之業可謂有其意矣而言之過也一本無使字信言不美章第八十一信言不美明皇曰信言者聖教也信實之言不韵於俗故不美河曰信言者如其實不美者朴且質也弼曰實在質也雱曰信言要於道道之出言淡乎無味何美之有美言不信明皇曰美言者代教也甘美之言動合於俗故不信河曰滋美之言者孳孳華詞不信者飾僞多空虛也弼曰本在朴也雱曰離道而語事物故雖足以美淺聞之聽而非至論也且言者風波也何以美為善者不辨明皇曰善者在行無辨說河曰善者以道修身不綵文也雱曰言近指遠不假繁辭辨者不善明皇曰巧滯辨說故不善河曰辨者巧言也不善者舌致患也土有玉掘其山水有珠濁其淵辨口多言亡其身雱曰言以明道而已要不煩何用多說孔子曰辭達而已知者不博河曰知者謂知道之士不博者守一元也弼曰極在一也雱曰極當在乎至微何事於博博者不知明皇曰知者了悟也博者多聞也河曰博者多見聞不知者失真要也雱曰溺乎事物之衆而不能反約愚之甚者安在乎有知聖人無積明皇曰積者執言滯教有所積聚也聖人了言忘言悟教遺教一無執滯故云不積弼曰無私自有唯善是與任物而已雱曰聖道運乎無方而我常無滯故以至無而供萬物之求積而有之則所得鮮矣安能大而化之乎此明知者不博既以為人己愈有河曰既以為人施設德化已愈有德弼曰物所尊也雱曰為人者施於事業以治天下也因其勢而利之則吾道不虧而事業彌廣矣一本為作與非既以與人己愈多明皇曰此明法性無盡言聖人雖不積滯言教然以法味誘導凡愚盡以與人於聖人清靜之性曾無减耗唯益明了故云愈有愈多有明自性多明外益河曰既以財賄布施與人而財益多如日月之光無有盡時也弼曰物所歸也雱曰與人者授之以道也授人以道如天生物吾未嘗費而物日以夥既云無積故又明其能贍足萬物蓋唯無積乃所以能足也天之道利而不害河曰天生萬物愛育之令長大無所傷害也弼曰動常生成之也雱曰天者群物之宗常以慈畜萬物豈有害之之意此明信言不美夫天理常夷美於此則害於彼矣聖人之道為而不爭明皇曰舉天道利物不害者將明聖人之道施為弘益常以與人故不爭也河曰聖人法天所施為化成事就不與下爭功名故能全其聖功也弼曰順天之利不相傷也雱曰一氣自運萬物必遂聖人體大運以有為行遲速於常度豈有心於爭乎夫唯如此故於立言垂法亦因時乘理適可而已非為辨也然而終以此句者誠欲體道德之說莫尚於為而不爭老子經意終於第八十篇此篇總序其作經之意亦由南華盡於莊子之死而更有天下一篇兼明道術之是非以自積著書之迹道德真經集注卷之十釋音櫰而羊切蹶居月切昧音妹貸吐代切螫失亦切攫俱縛切懹子壘又子委切嗄一邁切蒂常音難乃旦切脆七歲切辟音避繟音固恢苦回切斫陟角切賂音路愈任與切純杜本切後序老氏之書傳於世也久矣其言微其旨遠而莫能極學者非明白洞達窮道德性命之理未易測其津涯也夫老氏豈欲為甚高之論以取惑於世蓋至道之極窈冥昏默雖聖人猶且不能名方道術既散之際苟不示其髣佛明其大略則天下後世有愚而不靈者蕩然無所適茫然無所守不知大道之本原而為倒置之民也於是不得已强而為之言以明夫道大焉彌滿六合而無外小焉入乎纖介而無間其玄則為衆妙之門其粗則治家治國治天下無乎不在昔之為注者有三曰河上公曰明皇曰王弼夫三家之說其間不能無去取然各有所長要其歸宿莫非究大道之本近世王雱深於道德性命之學而老氏之書復訓厥旨明微燭隱自成一家之說則八十一章愈顯於世然世之學者以老氏為虛無無用之文少嘗加意陳言鄙論自以為得殊不知大道之本由老氏而後明老氏之經由數家而後知非俗學者所易聞也太守張公深達夫道德性命之理以文章作人以經術訓多士常患夫執經者不知道乃命黌舍之學者參其四說無復加損刊集以行於時而廣其教俾夫承學之士知老氏之書非徒為虛誕之辭極深研精皆足以造乎至理其真以治身其緒餘土苴為天下國家則學者豈曰小補之哉迥承教下風幸得以親炙故只請以書歲月且不泯其傳時元符元年十月一日前權英州軍事判官梁迥謹序
