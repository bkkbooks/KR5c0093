front:
  text: 道德眞經集註卷之三靡三
  hash: sha256:5ff5954fb4de6eed580764b62613ed19cdbb1068ac5c860df6381f355f762999
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0093_HFL_003-001a, image: hfl/0395/0395-128.png}
body:
  text: 明皇河上公王弼王雱註古之善爲士章第十五古之善爲士者河曰謂得道之君也微妙玄通河曰玄天也言其志節玄妙精與天通也深不可識明皇曰士事也言古之善以道爲事者於彼微言妙道無不玄鑒通照而德容深邃不可識知河曰道德深遠不可識知内視若盲反聽若聾莫知所長雱曰士者事道之名微而妙玄而通有此道而退藏於密密者性本之内故無迹可見當時爲士者異於此矣故稱古之善爲士者夫唯不可識故强烏之容明皇曰夫唯德量難識故强爲容狀以明之謂下文也河曰謂下句也豫兮若冬涉川明皇曰豫閑豫也善士於代閑豫如涉冬川衆人貪著故畏懼今我不染故閑豫也河曰舉事輒加重慎與與兮若冬涉川心難之也弼曰冬之涉川豫然若欲度若不欲度其情不可得見之貌雱曰豫者先事而戒之謂至人無心於物迫而後動冬涉者臨事逡巡若不得已也莊子曰不從事於務猶兮若畏四鄰明皇曰猶豫疑難也上言善士不染故閑豫及觀行事甚疑難如今代人懼鄰戒河曰其進退猶猶如拘制若人犯法畏四鄰知之也弼曰四鄰合攻中央之主猶然不知所趣向也上德之人其端兆不可睹德趣不可見亦猶此也雱曰可以無戒而猶戒曰猶至人靜密幽深不出性宅故常如畏鄰斂行而不縱也儼若客河曰如容由至人儼然無所造作也雱曰不以事爲己任故其容寂涣若冰將釋明皇曰雖則儼然若容無所造爲而不凝滯於物涣然若春冰之釋散也河曰敦者解散釋者消亡除情去欲日以空虚雱曰人生之始同於大空凝爲我體如水有冰故爲道有冰解凍釋者事至於此其容已不滯於一體涣然將釋矣切嘗原之人性如水爲造化所凝故結而不通彼釋者反本而已矣敦兮其若樸明皇曰雖涣然冰釋曾不自矜而能敦厚若質樸而無所分别河曰敦者質厚樸者形未分内守精神外無文采也雱曰材未爲器謂之樸喻性之全體由冰釋之後乃能存天性之全而不雕於人僞故若樸也曠兮其若谷明皇曰其德量曠然寬廣無不含容若彼容谷河曰曠者寬大谷者空虚不有德功名無所不包也雱曰性全不虧而不自有其全故曠然空虚如谷之受且應也渾兮其若濁明皇曰和光渾迹若濁而清河曰渾者守本眞濁者不照然也與衆合同不自尊弼曰凡此諸若皆言其容象不可得而形名也雱曰水性本清而濁者混於物空人不自潔於物故渾然若濁者也孰能濁以靜之徐清明皇曰孰誰也誰能於彼澤濁以靜澄止之令徐自清乎河曰孰誰也誰能如水之濁以而靜之徐徐自清也雱曰澄性者與澄水同加工則動而彌濁唯靜以俟之則徐自清矣有道之士所以物莫能濁者以其靜之徐清孰能安以動之徐生明皇曰誰能安靜於此清以乆更求勝法運動修行令清靜之性不滯於法而徐動出也生猶動出河曰誰能安靜以乆徐徐以長生也弼曰夫晦以理物則得明濁以靜物則得清安以動物則得生此自然之道也孰能者言其難也徐者詳慎也雱曰歸於寂定感而遂通故徐徐以生終則有始也動之徐生則變動不居非物能止夫誰能安之爲此者信陰陽之理乘自然之運而無心其間故皆曰徐言濁則知安之清言安則知動之濁與上篇徼妙之文同保此道者不欲盈明皇曰欲保此徐清徐生之道當須無所執滯若執清求生是謂盈滿將失此道故云不欲盈河曰保此徐生之道不欲奢泰盈溢雱曰不盈之盈乃大盈也如見道之後盈而有之則是自有此道違道遠矣夫惟不盈是以能敝不新成明皇曰夫唯不盈滿之人故能以新證之行爲敝薄不以其新成而滯著也河曰夫唯不盈滿之人能守敝不爲新成敝者匿光榮也新成者貴功名雱曰道本無體非器所盛用則有餘求之不得故有道者未嘗盈而其用不窮也得道者未嘗盈則成道者未嘗新也道之爲用通萬物而不敝以其無敝無新不成不敗故也敝生於新敗生於成士雖成道而常若敝敗矣苟得道之初矜其新成則與道異意非大成也經曰大成若缺其用不敝此篇句句有序以至於成成而若敝則盡之矣致虚極章第十六致虚極河曰得道之人損情去欲五内清靜至於虚極守靜篤明皇曰虚極者妙本也言人受生皆禀虚極妙本及形有受納則妙本離散今欲令虚極妙本必致於身當須絶棄塵境染滯守此雌靜篤厚則虚極之道自致於身矣河曰守清靜行篤厚弼曰言致虚物之極篤守靜物之眞正也雱曰致虚欲極守靜欲篤欲觀物理者必先致一也學者之事實則妨道動則達性故爾萬物並作河曰作生也萬物並生也弼曰動作生長雱曰萬物由虚靜岀生還歸於虚靜春生秋死之變可見矣吾以觀其復明皇曰老君云何以知守雌靜則能致虚極乎但觀萬物動作云爲及其歸復常在於靜故知爾河曰言吾以觀見萬物無不皆歸其本也人當念重本也弼曰以虚靜觀其反復凡有起於虚動起於靜故萬物雖並動作卒復歸於虚靜是物之極篤也雱曰虚靜則明明則見理見理非以有爲將觀復性之情也夫物芸芸河曰芸芸者華葉盛各復歸其根明皇曰又云所以萬物歸復常在於靜者爲華葉芸芸生性皆歸復其根故本有作芸芸者芸芸動作也言夫物芸芸動作者及其歸復皆在根本爾河曰言萬物無不枯落各復反其根而更生也弼曰各反其所始也雱曰復復性起用復還性根動植雖殊理歸一致歸根曰靜河曰浮謂根也根安靜柔弱謙卑處下故不復死也靜曰復命明皇曰華葉芸芸者生性歸根則靜止矣人能歸根至靜可謂復所禀之性命河曰言安靜者是爲復還性命使不死也雱曰有生曰性性禀於命命者在生之先道之全體也易曰窮理盡性以至於命觀復窮理也歸根盡性也復命至於命也至於命極矣而不離於性也復命曰常河曰復命使不死乃道之所常行也弼曰歸根則靜故曰靜靜則復命故曰復命也復命則得性命之常故曰常也雱曰出生則入有入有則系數然則密移之變頃刻不停唯復命則湛然常寂物莫能遷矣知常曰明明皇曰守靜復命可謂有常知守常者更益明了河曰能知道之所常極則爲明雱曰所知非常則非眞知也聖人所貴夫明者自見而已不知常妄作凶明皇曰不恒其德或承祭之羞失常妄作窮凶必矣河曰不知道之所常行妄作巧詐則失神明故凶也弼曰常之爲物不偏不彰無皦昩之狀温凉之象故曰知常曰明也唯此復乃能包通萬物無所不容失此以往則邪入乎分則物離分故曰不知常則妄作凶也雱曰不會於性命之極則種種色相皆以爲實因生妄情與接爲摇窮萬世而不悟陰陽之禍慘孰甚焉知常容明皇曰知守眞常則心境虚靜如彼空谷無不含容河曰能知道之所常行則去情忘欲無所不包容也弼曰無所不包通也雱曰知常則達乎無疵何所不容容乃公明皇曰含容應物無心既無私邪故爲公正河曰無所不包容則公政無私弼曰無所不包通則乃至于蕩然公平也雱曰無物我之殊何私之有公乃王明皇曰能公正無私者則爲物所歸往河曰公政無私則可以爲天下王弼曰蕩然公平則乃至于無所不周普也雱曰内公則外王王乃天明皇曰萬物樂推如天之覆則與天合德河曰能王德合神明乃與天通弼曰無所不周普則乃至于同乎天也雱曰王者人道之至極極人之道乃通於天天乃道明皇曰王德如天乃能行道河曰德與天通則與道合同也弼曰與天合德體道大通則乃至于極虚無也雱曰因有道乃與天侔侔天乃所以盡道道則莫知其天乎人乎道乃乆明皇曰道行天下乃可以乆享福祚矣河曰與道合同乃能長乆弼曰窮極虚無得物之常則乃至于窮極也雱曰所謂常也殁身不殆明皇曰同天行道則終没其身長無危殆之事矣河曰能公能王通天合道四者統備道德弘遠無殃無咎乃與天地俱没不危殆也弼曰無之爲物水火不能害金石不能殘用之於心則兕虎無所投其爪角兵戈無所容其鋒刃何危殆之有乎雱曰天地並生萬物爲一孰能危之太上章第十七太上下知有之明皇曰大上者淳古之君也下知者臣下知上有君尊之如天而無施教有爲之迹故人無德而稱焉河曰太上謂大君無名之君也下知有之者下知上有君而不臣事質樸也弼曰太上謂大人也大人在上故曰太上大人在上居無爲之事行不言之教萬物作焉而不爲始故下知有之而已雱曰因三皇之出無爲而治使民各遂而不知其然豈得而親譽之乎其次親而譽之明皇曰逮德下衰君行善教仁見故親之功高故譽之河曰其德可見恩惠可稱故親愛而譽之弼曰不能以無爲居事不言爲教立善施化使下得親而譽之也雱曰政有明效則百姓戴恩懷德毁譽之名彰雖足以爲治一時而上己離道德之全下己失性命之正亂自此始矣此仁義之治其次畏之河曰設刑法以治之弼曰不能復以恩仁令物而賴威權也雱曰此法制之治其次侮之明皇曰德又下衰君多弊政則驅以刑罰故畏之懷情相欺明不能察故侮之河曰禁多令煩不可歸誠故欺侮之弼曰不能法以正齊民而以智治國下知避之其令不從故曰侮之也雱曰失德無政則民侮之一本作畏之侮之無其次二字信不足焉河曰君信不足於下下則有巧詐民有不信焉明皇曰畏之侮之者皆由君信不足故令下有不信之人河曰君信不足於下下則應之以不信而欺其君也弼曰言從上也夫御體失性則疾病生輔物失眞則疵釁作信不足焉則有不信此自然之道也己處不足非智之所濟也雱曰孟子曰有諸己之謂信經曰其中有信人盡其性則不失天命之常故曰信也上離道而治則非性之質而失其常矣故於信爲不足上於信不足則下必至於偷薄詐僞故曰有不信也下有不信亂之大者猶兮其貴言明皇曰親之譽之者由君有德教之言故貴其言而親譽之河曰說太上之君舉事猶貴聖於言恐離道失自然雱曰猶豫之猶猶者不决貴者不輕也莊子曰言者風波也聖人出言常若有所疑不敢輕發言且不敢輕而况於爲乎民之難治以其上之有爲也是以聖人猶難之一本無兮字非功成事遂河曰謂天下太平也百姓皆謂我自然明皇曰功成而不執事遂而無爲百姓日用而不知謂我自然而成遂則太上下知也河曰百姓不知君上之德淳厚反以爲已自當然也弼曰自然其端兆不可得而見也其意趣不可得而睹也無物可以易其言言必有應故曰猶兮其貴言也居無爲之事行不言之教不以形立物故功成事遂而百姓不知其所以然也雱曰遷善遠罪而莫知爲之者是也大道廢章第十八大道廢有仁義明皇曰澆淳散樸大道不行曰仁與義小成遂作濡沬生於不足周弊超於有爲然則聖人救世之心未嘗異而夷險之迹不得一爾河曰大道之時家有孝子户有忠信仁義不見也大道廢不用惡逆生乃有仁義可傳道弼曰失無爲之事更以施慧立善道進物也智惠出有大僞明皇曰用智惠者將立法也法出而姦生則有大僞矣河曰智惠之君賤德而貴言賤質而費文下則應之以爲大偽姦詐弼曰行術用明以察姦偽趣睹形見物知避之故智惠出則大僞生也六親不和有孝慈明皇曰父子夫婦兄弟六親也疏戚無倫不和也乆親各子有孝慈也皆由失道故有偏名河曰六親絶親戚不和乃有孝慈相收養也雱曰至德之世民盡其性六親非不孝慈而孝慈以爲常故無孝慈之名今尚孝慈之行而尊之者更由六親有不和故也國家昏亂有忠臣明皇曰大平之時上下交足何異名乎昏亂之日見危致命有忠臣矣河曰政令不行上下相怨耶俑爭權乃有忠臣匡救其君也弼曰甚美之名生於大惡所謂美惡内門六親父子兄弟夫婦也若六親自和國家自治則孝慈忠臣不知其所在矣魚忘於江湖之道則相濡之德生也雱曰明治則人無不忠敦爲忠臣絶聖棄智章第十九絶聖河曰絶聖制作反初守元五帝盡象倉頡作書不如三皇結繩無文棄智河曰棄智惠反無爲民利百倍明皇曰絶聖人言教之迹則化無爲棄凡夫智詐之用則人淳樸淳樸則巧僞不作無爲則矜徇不行人挹天和物無天性是有百倍之利河曰農事無私雱曰民之性質純粹無疵以其失眞沉僞故强立聖智以爲君師而民因聖智之迹更逐而不反離本愈遠矣故有一時之小補而終使民喪其不貲之樸絶而棄之則民復於無事其利可勝計哉絶仁棄義河曰絶仁之見恩惠棄義之尚筆信民復孝慈明皇曰絶兼愛之仁棄裁制之義則人復於大孝慈矣河曰德化淳也雱曰至德之世父子相親而足今更生仁義則名實交糾得失紛然民性亂矣蓋盛於末者本必衰天之道也孝慈仁義之本也或曰孔孟明堯舜之道專以仁義而子以老氏爲正何如曰夏以出生爲功而秋以收斂爲德一則使之榮華而去本一則使之彫悴而反根道歲也聖人時也明乎道則孔老相爲終始矣絶巧棄利河曰絶巧者詐僞亂眞也棄利者塞貪路閉權門也盜賊無有眀皇曰人矜偏能之巧必有爭利之心故絶巧則人不爭棄和則人自足足則不爲盜賊矣雱曰巧利勝則民欲侈而本業衰必至於爲盜上三事皆以末傷本者此三者河曰謂上三事所棄絶也以烏文不足河曰以爲文不足者文不足以教民雱曰文於質爲末末勝則不足民所以失性一本云文而未足非故令有所屬明皇曰此三者俱令絶棄未示修行故以爲此文不足至教更令有所著謂下文也河曰當如下句雱曰令屬其性於下四事見素抱樸河曰見素者當抱素守眞不尚文飾也抱樸者當見其質樸以示故可法則雱曰不見物而見自性也素者性之質人生而靜不染諸物故無文而素蓋秋之時萬物復靜其色爲白天理固然樸者性之全以樸爲本以器爲末少私寡欲明皇曰見眞素抱淳樸少私邪寡貪欲河曰少私者正無私也寡欲者當知足也弼曰聖智才之善也仁義人之善也巧利用之善也而直云云絶文甚不足不令有所屬無以見其指故曰此三者以爲文而未足故令人有所屬屬之於素樸寡欲雱曰私欲皆有己之所爲有己則有物有則外重外重則失本矣絶學無憂章第二十絶學河曰絶學不眞不合道文無憂明皇曰絶仁爲俗學則淳樸不散少私寡欲故無憂也河曰除浮華則無憂患也雱曰學所以求復命見至於命則不見有物無所用學矣爲道至此則避絶吉凶敦能憂之孔子曰樂天知命憂之大者有知有樂則非體道也唯之與阿相去幾何河曰同爲應對而相去幾何疾時賤質而貴文善之與惡相去何若明皇曰唯則恭應阿則慢應同出於口故云相去幾何而恭應則善慢應則惡以喻俗學絶之則無憂不絶則生患只在心識迴照豈復相去遠哉河曰善者稱譽惡者諫爭能相去何如疾時惡忠直用邪佞也雱曰道體本一已降於全復分陰陽擾擾起矣種種分别皆屬妄心照以道眞理同夢幻且唯之與阿同出於口元無異狀而世之人以唯爲恭以阿爲慢是非喜怒因此生情反求唯阿所以異者竟何謂也善惡之殊亦若此矣人之所畏不可不畏明皇曰凡人所畏者慢與惡也善士所畏者俗學與有爲也皆當絶之故不可不畏河曰人爲道人也人所畏者畏不絶學之君也不可不畏近令色殺仁賢弼曰下篇云爲學者日益爲道者日損然則學者求益所能而進其智者也若將無欲而足何求於益不知而中何求於進夫燕雀有匹鳩鴿有仇寒鄉之民必知旃裘自然已足益之則憂故續鳧之足何異截鶴之脛畏譽而進何異異刑唯阿美惡相去何若故人之所畏吾亦畏焉未敢恃之以爲用也雱曰至人不見一物善惡無所分而不廢世人善惡諸法但於其中灑然不累耳自相去何若已上所以明心之無累而無累者本不自異於世故種種分别與民同之所謂吉凶與民同患也聖人絶累忘形亦可患乎而易有吉凶之象者因民情而已莊子曰不忽於人道既兼忘宜若忽人事而實無忽也荒兮其未央哉明皇曰若不畏絶俗學則衆生正性荒廢其未有央止之時河曰或言世俗人荒亂欲進學爲文未央止也弼曰嘆與俗相返之遠也雱曰萬化相推終則有始生生無盡豈有央乎而世人欲物物爲之美惡不亦惑乎唯聖人能知萬古一時而無得失於其間也衆人熙熙河曰熙熙淫放多情欲也如享太牢河曰如飢思大牢之具意無足時也如春登臺明皇曰衆人俗學有爲熙熙逐境如臨享太牢春臺登望動生貪欲河曰春陰陽交通萬物感動登臺觀之意志淫淫然弼曰衆人迷於美進惑於榮利欲進心競故熙熙若享太牢如春登臺也雱曰造化無極事物日生唯聖人能一古今而無變衆人則隨化而遷一見美惡樂得其生自以爲美春者萬物奮張離靜而動去本逐末之時臺者可以遠覽諸境之地物不明乎至理者皆逐物生情其狀如此我獨怕兮其未兆河曰我獨怕然安靜未有情欲之形兆也如嬰兒之未孩明皇曰我獨怕然安靜於其情欲略無形兆如彼嬰兒未能孩孺也河曰如小兒未能答偶人時也弼曰言我廓然無形之可名無兆之可舉如嬰兒未能孩也雱曰性體怕然不萌智慮含和守一同於嬰兒古本作廓兮非也怕與泊同怕者不流之義廓者虚大之名文義考之理當從怕乘乘兮若無所歸明皇曰至人無心運動隨物無所取與若行者之無所歸乘乘運動貌河曰我乘乘如窮鄙無所歸就弼曰若無所宅雱曰乘乘者乘萬物之變而不自私故若無所歸蓋唯變所適無所嚮著故也一本作儡儡兮無所歸非也衆人皆有餘明皇曰耽嗜塵務矜誇巧智自爲有餘以示光大河曰衆人餘財以爲奢餘智以爲詐雱曰矜覽庶物故常有餘而我獨若遺明皇曰常若不足有所遺忘河曰我獨如遺棄似不足也弼曰衆人無不有懷有志盈溢胸心故曰皆有餘也我獨廓然無爲無欲若遺失之也雱曰超然自喪不有其有我愚人之心也哉河曰不與俗人相隨守一不移如愚人之心也弼曰絶愚人之心無所别析意無所好欲猶然其情不可睹我頽然若此也純純兮明皇曰我豈愚人之心遺忘若此哉但我心純純故若遺爾河曰無所分别弼曰無所别析不可爲名雱曰純純兮似愚而眞智之極一本純純作沌沌俗人昭昭明皇曰矜巧智也河曰明且達也弼曰耀其光也我獨若昏明皇曰自韜晦也河曰如闇昩也雱曰物我兼忘不主分别故若昏俗人察察明皇曰立法制也河曰察察急且疾也弼曰分别别析也雱曰推昭昭之意加之政則察察矣我獨悶悶明皇曰唯寬大也河曰悶悶無所割截雱曰推若昏之意加之政則寬大悶悶然矣悶悶謂不取日前小快澹兮其若海河曰我獨忽忽如江海之流莫知其所窮極也弼曰情不可睹雱曰自怕兮未兆而下有諸事物及此又歸於性本湛然深廣如海之積水水性全矣一本作忽若晦非是飂兮似無所止明皇曰容貌忽然若昏晦而心寂兮絶於俗學似無所止著河曰我獨漂漂若飛若揚無所止也志意在神域也弼曰無所繫繫雱曰澹兮若海以言性體此則言其用飂然無所不通而無所繫著非用而何一本作寂非衆人皆有以明皇曰衆人於代間皆有所以逐境俗學之意河曰以有爲也弼曰以用也皆欲有所施用也雱曰物於物則爲物用物物而不物於物則用物而物莫能用而我獨頑河曰我獨無爲似鄙明皇曰頑者無分别鄙者陋不足而心實了悟外若不足故云似爾河曰鄙似若不逮也弼曰無所欲爲悶悶昏昏若無所識故曰頑且鄙也雱曰物莫能入可謂頑矣見若不睹可謂鄙矣一本且作似亦通我獨異於人明皇曰人有情欲我無愛染人與道反我與道同河曰我獨與人異也而貴求食於母明皇曰求食於母者貴如嬰兒無營谷爾故上文云如嬰兒之未孩下經云含德之厚比於赤子如此所以獨異於人也先無求於兩字今所加也且聖人說經本無避諱今代爲教則有嫌疑暢理故義不可移臨文則句須穩便便今存古是所庶幾又司馬遷云老子說五千餘言則明理諸而息言不必以五千爲定格弼曰食母生之本也人者皆棄生民之本貴未飾之華故曰我獨欲異於人雱曰不外逐物而取養於道道者萬物之母也一本無求於兩宇亦通孔德之容章第二十一孔德之容河曰孔大也有大德之人無所不容能受垢濁處謙卑也唯道是從明皇曰孔甚也從順也設問甚有德之人容狀若何言此有德人所行唯虚極之道是順河曰唯獨也大德之人不隨世俗所行獨從於道也弼曰孔空也唯以空爲德然後乃能動作從道雱曰道之在我之謂德德至則與道爲一道不可容因德而顯德者無我從道而已道之爲物唯恍唯惚明皇曰此眀孔德所從之道不有不無沖用難名故云恍惚河曰道之於萬物獨恍惚往來於其無所定也雱曰道兼陰陽陰陽之微若無若有謂之恍惚忽兮恍其中有像河曰道唯恍惚無形之中獨爲萬物法像雱曰一陰一陽乃成象一本作忽兮恍兮恍兮忽其中有物明皇曰物者即上道之爲物也自有而歸無還復至道故云其中有物也河曰道唯恍忽其中有一經營造化因氣立質弼曰以無形始物不繫成物萬物以始以成而不知其所以然故曰恍兮惚兮惚兮恍兮其中有象也雱曰一陽一陰乃成物恍惚者陰陽之妙故能變化以成象物一本作恍兮忽兮窈兮冥兮其中有精明皇曰惚恍有無窈冥不測生成之用精妙甚存河曰道唯窈冥無形其中有精實神明相薄陰陽交會也弼曰窈冥深遠之欺深遠不可得而見然而萬物由之其可得見以定其眞故曰窈兮冥兮其中有精也雱曰精者物生之始前稱象物道之具體道體既具乃生萬類萬類之所出在深妙不測之際故云窈兮冥兮其精甚眞河曰言道精氣神妙甚眞也非有飾也雱曰精者形生之始精無不眞而更云甚眞者由物有失理喪精沉於人偽故也其中有信明皇曰窈冥之情本無假雜物感必應應用不差故云有信河曰道匿功藏名其信在中也弼曰信信驗也物反窈冥則眞精之極得萬物之性定故曰其精甚眞其中有信也雱曰窈冥之精萬物作類而物之生者各正性命度數法象一有儀則可以前知無或差舛此之謂信莊子曰未形者有分自古及今其名不去明皇曰言道自古及今生成萬物物得道用因用立名生成之用既今古是同應用之名故古今不去河曰自從也從古至今道常在不去弼曰至眞之極不可得名無名則是其名也自古及今無不由此而成故曰自今及古其名不去也雱曰常道常名未常變易以閲衆甫明皇曰閲度閲也甫本始也言至道應用度閲衆物本始各遂生成之用也河曰閲禀也甫始也言道禀與萬物始生從道受氣弼曰衆甫物之始也以無名說萬物始也雱曰甫美也莊子曰神奇復爲臭腐臭腐復爲神奇夫萬物之美遷易不常唯道常住故能遍閲之閲如閲人多矣之閲吾何以知衆甫之然哉河曰我何以知從道受氣以此眀皇曰以此今萬物皆禀道妙用生成故爾河曰此今也以今萬物皆得道精氣而生動作起居非道不然弼曰此上之所云也言吾何以知萬物之始皆始於無哉以此知之也雱曰道常住而衆美不常故能閲其萬變聖人所以能知衆美之不常者亦以體道之常住故也曲則全章第二十二曲則全明皇曰曲己以應務則全河曰曲己從衆不自專則全也弼曰不自見其明則全也雱曰至人沖虚其行如水無心於物而順物之變不與物迕孰能傷之故常全也此篇大㫖與莊子養生生相類枉則直明皇曰枉己以申人則直河曰枉屈己而申人久久自得直也弼曰不自是則其是彰也雱曰於形枉者於理爲直有我者執我之直以遇物而不知物變之無窮其直乃枉也唯順物之枉而不自有其直則理直於中矣一本直作正窪則盈明皇曰執謙德則常盈河曰地窪下水流之人謙下德歸之也弼曰不自伐則其功有也雱曰澤以窪下故衆水鍾焉弊則新眀皇曰守弊薄則曰新河曰自受弊薄後己先人天下敬之久久自新也弼曰不自矜則其德長也雱曰非秋冬之雕敝則無春夏之榮華少則得明皇曰抱一不離則無失河曰自受取少則得多也天道祐謙神明託虚雱曰道在乎微性存乎樸得者得其本故不多也欲體上四事唯得一者能之多則惑明皇曰有多爲則惑亂河曰財多者惑於所守學多者惑於所聞弼曰自然之道亦猶樹也轉多轉遠其根轉少轉得其本多則遠其眞故曰惑也少則得其本故曰得也雱曰棄本逐末妄見多岐是以聖人抱一烏天下式明皇曰聖人抱守淳一故可爲天下法式河曰抱守法式也聖人守一乃知萬事故能爲天下法式也弼曰一少之極也式猶則之也雱曰抱一者不離於精夫唯抱一不二乃體道盡性物我玄同故能應而不窮也此句上文言道之理聖人抱一乃能見此理故行如下文云不自見故明明皇曰人能不自見其德常曲己以應務則其德全自明河曰聖人不以其視千里之外也乃因天下之目以視故能明達也雱曰自見則有己有己則敝於己故不能曲以應變不自是故彰明皇曰人能不自以爲是而枉己以申人則其是直自彰矣河曰聖人不自以爲是而非人故能彰顯於世雱曰無己是則能枉以應理不期彰而自彰矣不自伐故有功明皇曰人能不自伐取則其功歸己矣河曰伐取也聖人德化流行不自取其美故有功於天下也雱曰伐功生乎滿假知窪之爲盈則豈有滿假之累不自矜故長明皇曰人能長守弊薄不自矜衒則人推其長河曰矜大也聖人不自貴大故能乆不危雱曰矜者耀其榮之謂耀其榮則弊矣唯能居弊乃所以新夫唯不爭故天下莫能與之爭明皇曰不與物爭誰與爭者河曰此言天下賢與不肖無能與不爭者爭也雱曰唯沖虚不實無心於物物欲有之而不得而况能與之爭乎此篇之義要在忘我故結之以不爭而終始以曲則全也古之所謂曲則全者豈虛言哉河曰傳古言曲從則全身正言非虚妄也誠全而歸之眀皇曰古有曲全之言豈虚妄哉實能曲者則必全理而歸之河曰誠實也能行曲從者實其肌體歸之於父母無有傷害也雱曰曲者虚己而應理縁物爲變而不與物迕凡上諸說要在於是全而歸之者庖丁善刀而藏之之意竊原此篇養生之旨也聖人之於生不期自養而養生者莫善焉所謂不自見不自是不自伐不自矜者非克己以期全也不知其然而自然耳若睹夫曲枉窪弊之利而爲之則賢人之事學者之德於道爲未盡矣道徳眞經集註卷之三
