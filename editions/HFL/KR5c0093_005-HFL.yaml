  text: 道德眞經集註卷之五靡五
  hash: sha256:8c38db7019605a2c0b90dca02faa816a2e2d0aad4ab2c9149fd04608163ff910
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0093_HFL_005-001a, image: hfl/0396/0396-064.png}
body:
  text: 明皇河上公王弼王雱註以道佐人主章第三十以道佐人主者河曰謂人主能以道自輔佐也不以兵强天下河曰以道自佐之主不以兵革順天伍德敵人自服弼曰以道佐人主尚不可以兵强於天下况人主躬於道者乎雱曰體道而有天下者萬物將自賔何暇言此故但稱佐人主者聖人以德强國以兵輔德其事好還明皇曰人臣能以道輔佐人主者當柔服以德不用兵甲之威取强於天下何則兵者凶器戰者危事抗兵加彼彼必應之其事既好還報則勝負之數未可量也河曰其舉事好還自責不怨於人也弼曰爲治者務欲立功生事而有道者務欲還反無爲故云其事好還也雱曰還謂不往而務復也與事天治人莫如嗇同意師之所處荆棘生焉河曰農事廢田不修大軍之後必有凶年明皇曰軍師所處戰則妨農農事不修故生荆棘兵氣感害水旱繼之農廢於前災隨其後必有凶荒之年河曰天應之以惡氣即害五穀五榖盡傷人也弼曰言師凶害之物也無有所濟心有所傷賊害人民殘荒田畝故曰荆棘生也雱曰殺戮之慘傷天地之和氣善者果而已矣河曰善兵者當果敢而已不休不敢以取强焉河曰不以果敢取强大之名也弼曰果猶濟也言善用師者趣以濟難而己矣不以兵力取强於天下矣雱曰果成也趣成事而已兵猶天之霜雪凡所以成物蓋物非威不成故天與聖人皆以威輔德也豈敢恃衆求强以利歸己乎果而勿矜河曰當果敢謙卑勿自矜大也果而勿伐河曰當果敢推讓勿自伐取其美也果而勿驕明皇曰善輔相者果於止敵蓋在於安人和衆必不敢求勝取强故雖果於止敵敵不爲冦慎勿矜功伐取以自驕盈驕則敗亡故爲深戒河曰驕欺也果敢勿以驕欺人弼曰吾不以師道爲尚不得已而用何矜驕之有也雱曰此三者生於有我而好勝唯無意於勝者爲可以用兵果而不得己河曰當果敢至誠不當迫不得已也果而勿强明皇曰前敵來侵不得休止故用兵以止之如是則果在於應敵非果以取强也河曰果敢勿以爲强兵堅甲以侵陵人也弼曰言用兵雖趣功果濟難然時故不得已當復用者但當以除暴亂不遂用果以爲强也雱曰凡上四事是勿强之道物壯則老河曰草木壯極則枯落人壯極則衰老也言强者不可以久雱曰盛極則衰物理必然古有當此禍者秦是也是謂非道雱曰體道者兼萬變而不居一物故無壯老之意非道早己明皇曰物之用壯由兵之恃强物壯則衰兵强則敗是謂不合於道當須早止不爲雱曰壯武力暴興也喻以兵强於天下者也飄風不終朝驟雨不終日故暴興必不道早已也夫佳兵章第三十一夫佳兵者不祥之器河曰祥善也兵者驚精神濁和氣不善人之器也不當修飾之物或惡之河曰兵動則有所害故萬物無有不惡之故有道者不處明皇曰佳者好也兵者謀略也凡人修辭立誠不能以道德藏器而以兵謀韜略爲好謀略之用只在於攻取殺伐故爲不善之器凡物尚或惡之是以有道之人不處身於此爾河曰有道之人不處其國雱曰不處者濟難而已不以爲常是以君子居則貴左河曰貴柔弱也用兵則貴右明皇曰左陽也陽和則發生故平居所貴右陰也陰凝則肅殺故用兵所貴河曰貴剛强也此言兵道與君子道反所貴者異也兵者不祥之器明皇曰祥善也好兵者尚殺爲不善之材器也河曰兵革者不善之器也非君子之器明皇曰君子以道德爲材器不貴兵謀河曰非君子所貴重器也雱曰君國以無爲子民以慈惠故不尚兵不得已而用之河曰謂遭衰逢亂禍欲加萬民乃用之以自守恬淡爲上明皇曰夷狄内侵故不得已善勝不爭是恬淡爲上河曰不貪土地利人財寳故不美也河曰雖得勝而不以爲利美也若美必樂之樂之者是樂殺人也河曰是得勝者是爲喜樂殺人者雱曰兵器主於殺伐而過爲之飾使美而可觀是以殺人爲美也夫樂殺人者不可得志於天下矣明皇曰制勝於敵必哀其人故不以爲美也夫勝必多殺若以勝爲美者是樂多殺人也樂多殺人人必不附欲求得志不亦難乎河曰爲人君而樂殺人此不可得志於天下爲人主必專制人命妄行刑誅雱曰孟子曰不嗜殺人者能一之故吉事尚左河曰左生位也凶事尚右河曰陰道殺也是以偏將軍處左河曰偏將軍卑而居陽者以其不專殺也上將軍處右明皇曰偏將軍卑而處左者不專殺也上將軍尊而處右者主兵謀也河曰上將軍尊而居右者言其主殺也言居上勢則以喪禮處之明皇曰喪禮尚右今上將軍居右者是以喪禮處置之河曰上將軍於右喪禮尚右死人貴陰也殺人衆多以悲哀泣之明皇曰以生靈之貴而交戰殺之有惻隱之心故以悲哀傷泣之爾河曰傷己德薄不能以道化人而害無辜之民戰勝以喪禮處之明皇曰勇士雄人戰而獲勝勝則受爵居於右位尚右非吉是以喪禮處之但以爲不祥之器亦何必縞素爲資河曰古者戰勝將軍居喪主禮之位素服而哭之明君子貴德而賤兵不得已誅不祥心不樂之比於喪也知後世用兵不已故悲痛之弼曰疑此非老子之作也道常無名章第三十二道常無名明皇曰道以應用爲常常能應物其應非一故於常無名河曰道能陰能陽能弛能張能存能亡故無常名也雱曰道無體焉得名樸雖小天下莫能臣明皇曰樸妙本也妙本精一故云小而應用匠成則至大也故無敢以道爲臣者河曰道樸雖小微妙無形天下不敢有臣使道者也雱曰樸在人爲性於數爲一不主一氣而能成萬象故常在事物之先敦能臣之然取於一念而足可名爲小矣易曰復小而辨於物侯王若能守萬物將自賔明皇曰侯王若能守道精一無爲而化則萬物將自賔服矣河曰侯王若能守道無爲萬物將自賔服從於德也弼曰道無形不繫常不可名以無名爲常故曰道常無名也樸之爲物以無爲心也亦無名故將得道莫若守樸夫智者可以能臣也勇者可以武君也巧者可以事役也力者可以重任也樸之爲物憒然不偏近於無有故曰莫能臣也抱樸無爲不以物累其眞不以欲害其神則物自賔而道自得矣雱曰賔者伏而歸之之謂侯王體此無名之樸以爲天下正則不假威武勸賞物不知其然而自賔矣猶收其母則子必從也天地相合以降甘露河曰侯王動作能與天相應合天即下甘露善瑞也人莫之令而自均明皇曰侯王若能抱守精一則地平天成交泰致和故降灑甘露夫甘露之降簫蘭俱澤不煩教令而自均平取譬侯王稱物平施河曰天降善瑞則萬物莫有教令之者皆自均調若一也弼曰言天地相合則甘露不求而自降我守其眞性無爲則民不令而自均也雱曰守無名之樸以爲治則陰陽之升降各由其序而和氣應矣甘露者陰陽交和所生自然均彼無使之者蓋道之所感無所不周故也孟子曰上下與天地同流豈曰小補之哉此之謂也若莊子所謂寒暑之和不成反傷人之形者蓋失此道而已一本人作民非始制有名河曰始道也有名萬物也道無名能制於有名無形能制於有形也名亦既有明皇曰人君以道致平始能制御有名之物故有名之物亦盡爲侯王所有矣既盡也河曰既盡也有名之物盡有情欲叛道離德故身毁辱也天亦將知止河曰人能法道行德天亦將自知之知止所以不殆明皇曰若侯王能制有名之物則夫有名之物亦將知依止於侯王知依止有道之君所以無危殆之事河曰天知之則神靈祐助不復危殆弼曰始制謂樸散始爲官長之時也始制官長不可不立名分以定尊卑故始制有名也過此以往將爭錐刀之末故曰名亦既有夫亦將知止也遂任名以號物則失治之母也故知止所以不殆也雱曰名迹既立則民將遂而不返枝葉橫生源流派别而性命爛熳矣故始制有名當即知止則終無爭奪之危制者判樸成器之謂譬道之在天下由川谷之於江海也明皇曰天降甘露以瑞有道故譬有道之君在宥天下天則應之猶如川谷與江海通流爾河曰譬言道之在天下與人相應和如川谷與江海相流通也弼曰川谷之不求水與海非江海召之不召不求而自歸者世行道於天下者不令而自均不求而自得故曰猶川谷之與江海也雱曰江海不求水而水歸之者由鍾水之多則性同者往矣道民之性也聖人能集其純全則有生之類從而賔之亦性然也知人者智章第三十三知人者智河曰能知人好惡是爲智雱曰智足以知人而昩於見己者由私己故也可名爲智而未明也自知者明明皇曰智者役用以知物明者融照以鑒微智則有所不知明則無所不照河曰人能自知賢不肖是爲反聽無聲内視無形故爲明弼曰知人者自智而已矣未若自知者超智之上也雱曰智者如人識理明者如鏡鑒形鑒而無心所以能自見勝人者有力河曰能勝人者不過以威力也雱曰力可以勝人不可以勝己自勝者强明皇曰能制勝人者邇可謂有力能自勝其心使柔弱者方可全其强爾河曰人能自勝己情欲得天下無有能與己爭者故爲强弼曰勝人者有力而已矣未若自勝者無物以損其力用其智於人未若用其智於己也用其力於人未若用其力於己也明用於己則物無避焉力用於己則物無改焉雱曰自勝者克己從道能專氣者也孔子曰棖也欲焉得剛不能自勝者也知足者富河曰人能知足之爲足則長保福禄故爲富也弼曰知足者自不失故富也雱曰性分之内萬物皆足窮居不損大行不加而愚者或舍至貴而徇腐餘故知有萬之富則輕天下而不顧矣此眞富也孟子曰萬物皆備於我矣豈非富乎强行者有志明皇曰知止足者無貪求可謂富矣强力行者不懈怠可謂有志節矣河曰人能强力行善則爲有意於道道亦有意於人弼曰勤能行之其志必獲故曰强行者有志矣雱曰心營天下非眞志也唯强行此道乃可謂志不失其所者久明皇曰知足强力不失其所惟則是久於其道者河曰人能自節養不失其所愛天之精氣則可以久弼曰以眀自察量力而行不失其所必獲久長矣雱曰性不爲物誘則久矣此盡性者也死而不亡者壽明皇曰死者分理之終亡者天注之數壽者一期之盡夫知人勝人必招殃咎知足强力動得天常得天常者死而不亡是一期之盡可謂壽矣河曰目不妄視耳不妄聽口不妄言則無怨惡於天下故長壽弼曰雖死而以爲生之道不亡乃得全其壽身没而道猶存况身存而道不存乎雱曰賢人死曰鬼盡其道以反眞者也聖人死曰神未嘗死未嘗生也愚人死曰物雖生猶死耳盡道養神之人雖形體萬變而眞性湛然無所終極可謂壽矣此至於命者也嘗原此篇自知而後知所貴知所貴而後能修修者要在勝利欲之私勝其私者要在知内外之分夫然後能强行而進此道矣此盡性復命之序也蓋自知自勝者始也不可以不知人不勝人也而知人勝人者蓋將以自知自勝而己大道汎兮章第三十四大道汎兮河曰言道汎汎若浮若沉若有若無視之不見說之難殊其可左右明皇曰大道汎兮無繫而能應物左右無所偏名河曰道可左右無所不宜弼曰言道汎濫無所不適可左右上下周旋而用則無所不至也雱曰汎然不定於一物故用之無所不通萬物恃之以生河曰恃待也萬物皆恃道而生而不辭河曰道不辭謝而逆止也功成不居明皇曰言萬物恃賴沖用而生化而道不辭以爲勞功用備成不名己有河曰有道不名其有功也衣被萬物而不爲主河曰道雖愛養萬物不如人主有所收取故常無欲可名於小矣明皇曰愛養群材而不爲主宰於物無欲則可名於小言不可名小弼曰萬物皆由道而生既生而不知其所由故天下常無欲之時萬物各得所若道無於物故名於小矣雱曰此所謂小乃眞大也且以體道者譬之欲慮不萌泊然内一豈非小乎易曰復小而辨於物一本衣彼作愛養萬物歸焉而不知主河曰萬物皆歸道受氣道非如人主有所禁止也可名於大矣明皇曰愛養之故萬物歸之有萬物不同而不爲主則可名爲大言不可名大非小非大所以難名河曰萬物橫來橫去使各自在故不若於大也雱曰有意於主則反與物對唯其主萬物而未嘗有意乃所以充塞無外而莫能離大道之爲物方其小也未嘗不大方其大也未嘗離小但觀者各得其迹而已要而言之非小非大不可言傳可以意得是以聖人能成其大也河曰聖人法道匿德藏名不爲滿大以其不自大故能成其大明皇曰是以聖人法道忘功終不自爲光大故能成其光大之業河曰聖人以身帥導不言而化萬事修治故能成其大弼曰爲大於其細圖難於其易雱曰自大則有其大有其大則小矣唯其非大而强名以大則眞大也執大象章第三十五執大象天下往明皇曰大象道也帝王執持大道以理天下則天下萬物歸往矣河曰執守也象道也聖人守大道則天下萬民移心歸往之也治身則大率所明往來於己也弼曰大象天象之母也不寒不温不凉故能包統萬物無所犯傷主若執之則天下往也雱曰帝王體道以君臨者不示人以迹而使天下逍遥於自得之場大象者道之完體無形之謂也能執以御世則親譽不及往而不來夫豈慕羶呴沬之可擬哉往而不害雱曰聖人之治天下也雖窅然交喪無爲於上而能使天地鬼神鳥獸草木各暢其性而兩不相傷可謂至德矣安平泰明皇曰物性而不傷害則安於平泰河曰萬物歸往而不傷害則國安家寧而致太平矣治身不害神明則身安而大壽也弼曰無形無識不偏不彰故萬物得往而不害妨也雱曰安而後平平而後泰樂與餌過客止明皇曰樂音樂也餌飲食也言人家有音樂飲食則行過之客皆爲之留止如帝王執道以故泰平亦爲萬物所歸往矣又解云樂以聲聚餌以味聚過客少留非乆長也是以蘧廬不可以乆處仁義覯之而多責故人君體道清靜淡然無味始除察察之政終化淳淳之人故下文結云用不可既也河曰餌美也過客一也人能樂美於道則一留止也一者去盈而處虚忽忽如過客雱曰有聲有味故人悅而爲留道之出言淡乎其無味明皇曰人君以道德清靜爲教初出於口淡乎其無味不如俗中言教有親譽畏侮等也河曰道出入於口淡淡非如五味有酸鹹苦甘辛也視之不足見河曰足得也道無形非若五色有青黃赤白黑可得而見聽之不足聞河曰道非若五音有宫商角徵羽可得聽聞用之不可既明皇曰以道鎮靜初無言教故視之不足見聽之不足聞而淳風大行萬物既阜歳計有餘故用不可既既盡也河曰用道治國則國安民昌治身則壽命延長無有既盡時也弼曰言道之深大人聞道之言乃更不如樂與餌應時感悅人心也樂與餌能令過客止而道之出言淡然無味視之不足見則不足以悦其目聽之不足聞則不足以娱其耳若無所中然乃用之不可窮極也將欲歙之章第三十六將欲歙之必固張之河曰先開張之者欲極其奢淫將欲弱之必固强之河曰先强大之者欲使遇禍患將欲廢之必固興之河曰先興之者欲使其驕危也將欲奪之必固與之河曰先與之者欲極其貪心也雱曰陰陽之情周旋如轉輪反復如引鋸往窮必反盛極必衰觀乎月滿之虧日中之昃則萬物一致斷可知矣唯至人深達主機明乎無眹故養生則俗於屈伸處己則適乎消長蒞事則知成敗之策御敵則達擒縱之權古之人所以酬酢萬變而澹然無事者誠以此道也然則雖鬼神之幽將不能窺而况於世俗之昏亦何以測其妙乎易曰尺蠖之屈以求伸也龍蛇之蟄以存身也是謂徴明明皇曰經云正言若反易云巽以行權權反經而合義者也故君子行權貴於合義小人用之則爲詐譎孔子曰可與立未可與權信矣故老君前章示執大象斯謂之實此章繼以歙張是謂之權欲量象空根性故以權實覆却相明令必致於性命之域而惑者乃云能道德之忘何其迷而不悟哉故將欲歙斂衆生情欲則先開張極其侈心令自因於愛欲則當歙斂矣强弱等義略與此同此道甚微而效則明著故云是謂微明河曰此四事其道微其效明也弼曰將欲除强梁去暴亂當以此四者因物之性令其自戮故曰微明也足其張令之足而又求其張則象所翕也與其張之不足而改其求張者愈益而己反危雱曰此理至微而明惟知幾者足以識之易曰知幾其神乎幾者動之微吉之先見也此道之妙用聖人所以宰制役使能與造化同功者也故以此篇結道經之義柔之勝剛弱之勝强明皇曰巽順可以行權權行則能制物故知柔弱者必勝於剛强矣河曰柔弱者久長剛强者必亡也雱曰見形則知剛强之制柔弱識理則悟柔弱之勝剛强至人深達微明之義故謙而不亢沖而不盈不與物爭而亦莫能與之爭也雖然此道本之言耳若夫變化無常則一柔一剛一弱一强孰能定之哉顧雖剛强而柔弱不能勝者動契乎理而心不離乎柔弱也由此觀之又知柔弱之勝剛强矣此兩者所謂利器一本作柔弱勝剛强魚不可脱於淵河曰魚脱於淵爲去剛得柔不可復與也國之利器不可以示人明皇曰脱失也利器權道之訾權道不可以示非其人故舉喻云魚若失泉則爲人所得權道示非其人則當竊以爲詐譎矣河曰利器權道也治國權者不可以示執事之臣也不可道者不可以示非其人也弼曰利器利國之器以唯因物之性不假形以理物器不可睹而物各得其所則國之利器也示人者任刑也刑以利國則失矣魚脱於淵則必見失矣利國器而立形以示人亦必失矣雱曰魚巽伏柔弱而自藏於深眇之中以活身者也聖人退處幽密而操至權以獨運斡萬化於不測故力旋天地而世莫睹其徤威伏海内而人不名以哉豈暴露神靈而使衆得而議之哉嘗竊論之聖人之所以異於人者知幾也夫以剛强遇物則物之剛强不可勝敵矣天下皆以剛强勝物也而吾獨寓於柔弱不爭之地則發而用之其敦能禦之者觀夫天道則秋冬之爲春夏亦一驗矣彼聖人者自藏於深眇之中而託柔弱以爲表故行萬物於術内而神莫能知其自此所謂密用獨化者易曰嬰以行權莊子曰於魚得計義協於此言之雖繁豈能名其致哉唯明者以神解之以意了之斯可矣道常無爲章第三十七道常無烏河曰道以物爲惡常也弼曰順自然也雱曰雖爲之時未嘗有爲而無不爲弼曰萬物無不由爲以治以成之也雱曰雖無爲之時未嘗不爲侯王若能守雱曰君人體道以治則因時乘理而無意於爲故雖無爲而不廢天下之爲而吾實未嘗爲也天何言哉四時行焉萬物生焉侯王之道天其盡之矣萬物將自化明皇曰妙本謂靜故常無爲物將以生而無不爲也侯王若能守道無爲則萬物自化君之無爲而純樸矣河曰言侯王若能守道萬物將自化妙於已也雱曰日化於道而不知化而欲作雱曰化而日進則如嬰兒之長必至於志意充起天和漸衰觀夫三代中流物情彫敝則可知也吾將鎮以無名之樸明皇曰言人既從君上之化已無爲清靜而復欲動作有爲者吾將以無名之樸而鎮靜之無名之樸道也河曰吾身也無名之樸道也萬物以化效於己也復欲作巧偽者侯王當身鎮撫以道德雱曰天下既化於道則日進於治治極則名實俱立民逐而不返故常抱無名之樸以鎮定其志意使一於性本雖然救於已成則亦晩矣故於欲作之時便當爲爾也無名之樸弼曰化而欲作作欲成也吾將鎮之以無名之樸不爲主也亦將不欲弼曰無欲競也雱曰聖人之抱樸無爲乃其自然故雖應世之變糾紛於事物之時未嘗離也豈欲警天下之亂而後爲之哉夫欲爲而爲之則據此已有爲欲之實豈眞無名之樸歟唯渾然常一不知其然而自然者不期爲樸而樸常全也不欲以靜河曰言侯王鎮撫以道德民亦將不欲改當以清靜導化之也天下將自正明皇曰言人君既以無名之樸鎮靜蒼生不可執此無名之樸而令有迹將恐尋迹喪本復入有爲故於此無名之樸亦將兼忘不欲於無欲無欲亦忘泊然清靜而天下自正矣雱曰欲而動則離性離於性則非正也已且未正安能正天下哉故唯不欲而靜者能正己而物正也此爲道之效而道亦喪於此故道經終焉道德眞經集註卷之五
