body:
  text: 唐明皇河上公王弼王雱註道經雱曰道者萬物之所道在體爲體在用爲用無名無迹而無乎不在者是也故雖聖人之言常在其一曲雖在一曲而異乎諸子百家者不失理而當於時而已道可道章第一道可道河曰謂經術政教之道也非常道河曰非自然長生之道也常道以無爲養神無事安民含光藏暉滅迹匿端不可稱道雱曰可道之道適時而爲時徙不留道亦應變蓋造化密未嘗暫止昔之所是今已非矣而曲士攬英華爲道根指蘧廬爲聖宅老氏方將祛其弊而開以至理故以此首篇明乎此則方今之言猶非常也名可名河曰謂富貴尊榮高世之名也非常名明皇曰道者虚極之妙用名者物得之所稱用可於物故云可道名生於用故云可名應用且無方則非常於一道物殊而名異故非常於一名是則强名曰道而道常無名也河曰非自然常在之名也常名當如嬰兒之未言鷄子之未分明珠在蚌中美玉處石間内雖昭昭外如愚頑弼曰可道之道可名之名指事造形非其常也其不可道不可名也雱曰名生於實實有形數形數既具衰壞隨之其可常乎唯體此不常乃眞常也無名天地之始河曰無名者謂道道無形故不可名也始者道本也吐氣布化出於虚無爲天地本始也有名萬物之母明皇曰無名者妙本也妙本見氣權輿天地天地資始故無名有名者應用也應用既成茂養萬物物得其養故有名河曰有名謂天地天地有形位陰陽有柔剛是其有名也萬物母者天地含氣生萬物長大成就如母之養子弼曰凡有皆始於無故未形無名之時則爲萬物之始及其有形有名之時則長之育之亭之毒之爲其母也言道以無形無名始成萬物以始以成而不知其所以玄之又玄也雱曰受命於無而成形於有故曰天地之始萬物之母易曰有天地然後有萬物此言與易之序同據覆載之間方生之物故以天地爲先物與天地本無先後推而極之有無同體始母之言亦筌蹄也且天地雖大而受命成形未離有無而此乃獨言萬物之母然則老氏之言姑盡性而已常無欲以觀其妙河曰妙要也人常能無欲則可以觀道之要要謂一也弼曰妙者微之極也萬物始於微而後成始於無而後生故常無欲空虚其懷可以觀其始物之妙常有欲以觀其徼明皇曰人生而靜天之性感物而動性之欲若常守清靜解心釋神反照正性則觀乎妙本矣若不性其情逐欲而動性失於欲迷乎道源欲觀妙本則見邊徼矣河曰徼歸也常有欲之人可以觀世俗之所歸趣也弼曰徼歸終也凡有之爲利必以無爲用欲之所本適道而後濟故常有欲可以觀其終物之徼也雱曰易之陰陽老之有無以至於佛氏之色空其實一致說有漸次耳世之言無者舍有以求無則是有外更有安得爲無故方其有時實未嘗有此乃眞無也有無之體常一而有有以觀者但見其徼欲觀其妙當知本無而本無之無未嘗維有也既曰常無又曰常有者以明有無之不相代無即眞有有即實無耳言徼而知妙之爲奥言妙則知徼之爲粗比法言之體此兩者同出而異名明皇曰如上兩者皆本於道故云同也動出應用隨用立名則名異矣河曰兩者謂有欲無欲也同出者同出人心也而異名者所名異也名無欲者長存名有欲者亡身也同謂之玄眀皇曰出則名異同則謂玄玄深妙也河曰玄天也言有欲之人與無欲之人同受氣於天雱曰有無本一未有二名自學者言之則有不如無之精既得其道則兩皆至理初無彼此玄之又玄河曰天中復有天也禀氣有厚薄得中和滋液則生賢聖得錯亂濁辱則生貪淫也衆妙之門明皇曰意因不生則同乎玄妙猶恐執玄爲滯不至兼忘故寄又玄以遣玄示明無欲於無欲能如此者萬法由之而了出故云衆妙之門河曰能知天中復有天禀氣有厚薄除情欲守中和是謂知道要之門户也弼曰兩者始與母也出者同出於玄也異名所施不可同也在首則謂之始在終則謂之母玄者冥也默然無有也始母之所出也不可得而名故不可言同名曰玄而言謂之玄者取於不可得而謂之然也謂之然則不可以定乎一玄若定乎一玄而已則是其名則失之遠矣故曰玄之又玄也衆妙皆從門而出故曰衆妙之門也雱曰道有二物自形而下則陽尊而陰卑自形而上則陰先而陽後故道之至處曰妙曰玄妙德也玄色也言色則至矣而蓋有非色所及故曰又玄萬物皆有妙處皆出於此故曰衆妙之門天下皆知章第二天下皆知美之烏美河曰自揚已美便顯彰也斯惡已河曰有粗玉也皆知善之爲善河曰有功名也斯不善已明皇曰美善者生於欲心心茍所欲雖惡而美善矣故云皆知以己之所美爲美所善爲善矣美善無主但是妄情皆由封執無分别難易神奇臭腐以相傾奪大聖較量深知虚妄故云惡已河曰人所爭也雱曰道本無物而物有妄情自相分别此溺於轉徙之流而不能自出故耳然溺而不出者不由厭離而由樂著所以惡夫美善也故惡與不善美善之隨也當其美善之時蓋已惡且不善矣俟其隨而後悟則亦悟之晩也雖然至人所謂美善未嘗離乎惡與不善而惡與不善未嘗離乎美善也天下之愚不足與此故所謂美善常惡與不善也故有無之相生河曰見有而爲無也難易之相成河曰見難而爲易也長短之相形河曰見短而爲長也高下之相傾河曰見高而爲下也聲音之相和河曰上唱下必和也前後之相隨眀皇曰六者相違遞爲名稱亦如美惡非自性生是由妄情有此多故河曰上行下必隨也弼曰美者人心之所進樂也惡者人心之所惡疾也美惡猶喜怒也善不善猶是非也喜怒同根是非同門故不可偏舉也此六者皆陳自然而不可偏舉之明數也雱曰離道而我我則有彼彼我既分編類爲二矣此六對者物之所以不齊而喜怒哀樂生死之變更出迭入而不能自止者也凡此皆不冥夫陰陽之本而隨其末流自生分别執一廢百以妄爲常故耳此篇第二與莊子齊物論相似篇篇有序可以理推是以聖人處無爲之事河曰以道治也弼曰自然已足爲則敗也行不言之教明皇曰無爲之事無事也寄以事名故云處不言之教忘言也寄以教名故云行河曰以身帥導之也雱曰聖人無心以百姓心爲心雖事而未嘗涉爲之之迹雖教而未嘗發言之之意故事以之齊教以之行而吾寂然未始有言爲之累而天下亦因得以反常復樸也夫唯無累故雖寄形陰陽之間而造化不能求彼六對者惡能擾之哉萬物作而不辭眀皇曰令萬物各自得其動作而不辭謝於聖人河曰各自動也不辭謝而逆止雱曰萬物并作聖人各盡其性而無所辭以吾心空然無所去取故也茍懐去取之慮則物之萬態美惡多矣焉能不辭哉生而不有河曰元氣生萬物而不有爲而不恃河曰道所施爲不恃望其報也弼曰智慧自備爲則僞也功成不居明皇曰令萬物各遂其生不爲已有各得所爲而不負恃如此則太平之功成矣猶當日慎一日不敢寧居河曰功成事就退避不居其位弼曰因物而明功自彼成故不居也雱曰有則居居則遷矣夫唯不居河曰夫唯功成不居其位是以不去明皇曰夫唯不敢寧居而增修其德者則忘功而功存故不居而不去也河曰福德常在不去其身也上六句有高下長短若開一源下生百端百端之變無不動亂弼曰使功在己則功不可乆也雱曰形名而降莫不代謝唯道無體物莫能遷聖人體道故充塞無外而未嘗有物應接萬變而未嘗有心如是則豈以適然之事攬以爲功而固有之哉夫然後離六對之境絶美惡之名越生死流處常住法也持此心以涉世則功名雖高豈有充滿之累乎不尚賢章第三不尚賢河曰賢謂世俗之賢辯口明文離道行權去質爲文也不尚者不貴之以禄不尊之以官使民不爭明皇曰尚賢則有迹徇迹則爭興使賢不肖各當其分則不爭矣河曰不爭功名反自然也雱曰賢者出衆之稱尚之則民夸企外慕爭之端也不貴難得之貨河曰言人君不御好珍寳黃金棄於山珠玉捐於淵使民不爲盜明皇曰難得之貨謂性分所無者求不可得故云難得夫不安本分希效所無既失性分寧非盜竊欲使物任其性事稱其能則難得之貨不貴性命之情不盜矣河曰上化清靜下無貪人雱曰民衣食足而性定矣妄貴難得之貨則其求無已必至爲盜蓋民之生皆由妄生分别此篇務在齊物使民復性不見可欲河曰放鄭聲遠佞人使心不亂明皇曰既無尚賢之迹不求難得之貨是無可見之欲而心不惑亂也河曰不邪淫弼曰賢猶能也尚者嘉之名也貴者隆之稱也唯能是任尚之曷爲而唯用是施貴之曷爲尚賢顯名榮過其任下奔而競效能相射貴貨過用貪者競趣穿窬睹齎篋没命而盜故可欲不見則心無所亂也雱曰昩者妄見可欲所以心爲之隤亂唯聖人能知諸物皆非眞實故萬態一視而無取舍之心若然則心貧常夷物豈能亂之是以能不尚賢不貴貨也是以聖人之治也河曰說聖人治國與治身同也虚其心明皇曰心不爲可欲所亂則虚矣河曰除嗜慾去亂煩雱曰心虚則無所分別此中不尚賢之義實其腹明皇曰道德内充則無矜徇亦如屬饜而止不生貪求河曰懷道抱一守五神也弼曰心懷智而腹懷食虚有智而實無知也雱曰腹實則無所貪求此申不貴貨之義弱其志明皇曰心虚則志弱河曰知柔謙讓不處權也雱曰志强則夸企而勝志弱則無營於外此又申不尚賢之義强其骨明皇曰腹實則骨强河曰愛精重施髓滿骨堅弼曰骨無知以幹志生事以亂雱曰骨强所以自立自立則外物不能遷此又申不貴貨之義常使民無知無欲明皇曰常使人無爭尚之知無貪求之欲也河曰反樸守淳弼曰守其眞也雱曰知則妄見欲則外求二者既除性情定矣自不尚賢而化之可使至於無知自不貴貨而化之可使至於無欲使夫知者不敢爲也明皇曰清靜化人盡無知欲適有之者令不敢爲也河曰思慮深不輕言弼曰知者謂知爲雱曰智足以亂衆者禁而止之爲無爲河曰不造作動因循則無不治矣明皇曰於爲無爲人得其性則淳化有孚矣河曰德化厚百姓安雱曰爲無爲非無爲也爲在於無爲而已期於復性故也竊嘗論之三代之後民無不失其性者故君子則志强而好善求賢無已小人則骨弱而慕利逐貨不厭志强則多知骨弱則多欲或有知或有欲雖所趨不同而其爲徇外傷本一也惟至人不然弱其志非所見者卑而求近以爲無所求而道自足也强其骨非以自立而爲賢將以勝利欲而尊德性也夫然後名不能移利不能溺而性常定矣道沖章第四道沖而用之河曰沖中也道匿名藏譽其用在中或不盈眀皇曰言道動出沖和之氣而用生成有生成之功曾不盈滿云或似者於道不敢正言河曰或常也道常謙虚不盈滿雱曰道充塞無外贍足萬物而未嘗有故曰或不盈若虚若實謂之沖沖者陰陽之中而以虚爲體者也道之用於物者中道之應於事者虚此方言其用故曰沖淵兮似萬物之宗明皇曰泉深靜也道常生物而不盈滿妙本泉兮深靜故似爲萬物宗主河曰道淵深不可之也似爲萬物之宗祖雱曰道生萬物而體未嘗離物自物之散殊而觀之則似爲之宗耳淵者深而不測也人本足於此道欲體之者不可它求當挫銳解紛和光同塵則當自存矣挫其銳河曰銳挫也人欲銳精進取功名當挫正之法道不自見雱曰銳挫則渾然矣銳尖之形是也解其紛明皇曰道以沖和故能抑止銛利釋散紛擾若俗學求須則彌結矣河曰紛結恨也當念道無爲以解釋雱曰不與物講而坐觀其復則性命定而紛亂解矣和其光河曰言雖有獨見之明當如闇昩不當以曜亂人也雱曰挫銳解紛則性情定而自然充實光輝矣既有光則要不異於物而與之和同易曰蒙雜不著同其塵明皇曰道無不在所在常無在光在塵皆與爲一一光塵爾而非光塵也河曰當與衆庶同垢塵不當自别殊雱曰道乃性之常得性之常奚足珍尚故至人有道而不自異於塵湛兮似或存眀皇曰和光同塵而妙本不雜故湛兮似有所存河曰言當湛然安靜故能長存而不亡雱曰人能如上四事則道湛然存矣存而定有之則非道也似或者不可定有之謂吾不知誰之子河曰老子言我不知道所從生雱曰即今所稱道之中體蓋有所出矣雖有所出而廉然無象故曰不知誰之子也象帝之先明皇曰吾不知道所從生明道非生法故無父道者似在乎帝先爾帝者生物之主象似也河曰道自在天帝之前此言道乃先天地生也弼曰執一家之量者不能全家執一國之量者不能成國窮力舉重不能爲用故人雖知萬物治也治而不以二儀之道則不能贍也地雖形魄不法于天則不能全其寧天雖精象不能于道則不能保其精沖而用之用乃不能窮滿以追實實來則溢故沖而用之又復不盈其爲無窮亦已抑矣形雖大不能累其體事雖繁不能充其量萬物舍此而求其主主其安在乎不亦淵兮似萬物之宗乎銳挫而無損紛解而不勞和光而不污其體同塵而不渝其冥其然乎似或存乎地守其形德不能過其載天脅其象德不能過其覆天地莫能及之不亦似帝之先乎帝天帝也雱曰象有形之兆帝有物之尊爲帝王矣而道更在其先天地不仁章第五天地不仁河曰天施地化不以仁恩任自然也以萬物烏芻狗明皇曰天地生萬物人最爲貴天地視之如芻草狗畜不責望其報也河曰天地任自然無爲無造萬物自相治理故不仁也仁者必造立無施有恩有爲造立施化則物失其眞有恩有爲則物不具存物不具存則不足以備哉天地不爲獸生芻而獸食芻不爲人生狗無爲然萬物而萬物各適其所用則莫不贍矣若慧由己猶未足任也雱曰芻狗祭祀所用方其用也隆禮致敬以事之及其已事則棄而捐之等於糞壤其隆禮致敬之時非不以至誠也然而束芻爲狗耳實何足禮敬乎準不足禮敬而加禮敬者又非以爲也夫萬物各得其常生死成壞理有適然而天地獨爲之父母故不得無愛而原天地之心亦何係累哉故方其愛時雖以至誠而萬物自遂實無足愛者反要其終則糞壤同歸而已豈留情乎聖人不仁河曰聖人愛養萬民不以仁恩法天地行自然雱曰仁者人也以人道愛物謂之仁彼人貌而天者仁何足以名之以百姓烏芻狗明皇曰不仁者不爲仁恩也芻狗者結芻爲狗也大以守禦則有弊蓋之恩今芻狗徒有狗形而無警吠之用故無情於仁愛也言天地視人亦如人視芻狗無責望爾嘗試論之曰夫至仁無親孰爲兼愛愛則不至適是偏私不獨親其親則天下皆親矣不獨子其子則天下皆子矣是則至仁之無親乃至親豈兼愛乎河曰聖人視百姓如芻草狗畜不責望其禮意弼曰聖人與天地合其德以百姓比芻狗也雱曰聖人親親而仁民故獨言百姓若其道則與天地一矣而有人之形故任各異天地之間河曰天地之間空虚和氣流行故萬物自生人能除情欲節滋味清五臟則神明居之也其猶橐籥乎明皇曰橐者鞴也籥者笛也橐之鼓風笛之運吹皆以虚而無心故能動而有應則天地之間生物無私者亦以虚而無心故也河曰橐籥中空虚故能有聲氣雱曰橐籥虚以應物物感則應應而不藏天地之於萬物聖人之於百姓應其適然而不係累於當時不留情於既往故比橐籥之無窮也虛而不屈動而愈出明皇曰橐籥虚之而不屈撓動之而愈出聲以况聖人心無偏愛則無屈撓之時應用不窮可謂動而愈出也河曰言空虚無有用竭時動摇之益出聲氣也弼曰橐排橐也籥樂籥也橐籥之中空洞無情無爲故虚而不得窮屈動而不可竭盡也天地之中蕩然任自然故不可得而窮猶若橐籥也雱曰虚其體也動其用也多言數窮河曰多事害神多言害身口開舌舉必有禍患雱曰非應而言則窮矣舉言則爲可知此聖人之事言而不爲者也不如守中明皇曰多言而不詶故數彼窮屈兼愛則難遍便致怨憎故不如抱守中和自然皆足河曰不如守德於中育養精神愛氣希言弼曰愈爲之則愈失之矣物樹其惡事錯其言不齊不言不理必窮之數也橐籥而守數中則無窮盡棄己任物則莫不理若橐籥有意於爲聲也則不足以供吹者之求也雱曰守中所以應萬變谷神不死章第六谷神不死明皇曰谷者虚而能應者也神者妙而不測者也死者休息也谷之應聲莫知所以有感則應其應如神如神之應曾不休息欲明至道虚而生物妙用難名故舉谷神以爲喻說河曰谷養也人能養神則不死也神謂五藏之神也肝藏魂肺藏魄心藏神腎藏精脾藏志五藏盡傷則五神去矣雱曰谷應而不窮神化而不測萬物受命於我而我未嘗生未嘗死者谷神也言神則極矣而加谷者且能虚能盈而又能容以應也以其活而不敝故但稱不死是謂玄牝明皇曰玄深也牝母也谷神應物沖用無方深妙不窮能母萬物故寄谷神玄牝之號將明大道生畜之功河曰言不死之道在於玄牝玄天也於人爲鼻牝地也於人爲口天食人以五氣從鼻入藏於心五藏清徹爲精神聰明音聲五性其鬼曰魂魂者雄也主出入人鼻與天通故鼻爲玄也地食人以五味從口入藏於胃五性濁辱爲形骸骨肉血脉六情其鬼曰魄魄者雌也主出入於口與地通故曰爲牝也雱曰谷神受命而玄牝賦以自爲陰陽以成天地然本一物也由其受命故曰谷神由其賦形故曰玄牝玄牝之門是謂天地根明皇曰深妙虚牝能母萬物萬物由出是謂之門天地有形故資禀爲根本矣河曰根元也言鼻口之門是乃通天地之元氣所從往來雱曰玄牝體陰而一體之中又自有陰陽稱門者異於户也萬物由此門以出而不得見故曰玄牝之門綿綿若存河曰鼻口呼吸喘息當綿綿微妙若可存復若無有雱曰綿綿引而不絶之謂神牝生生不盡而若有若無不可定有用之不勤明皇曰虚牝之用綿綿微妙應用若存其用無心故不勤勞矣河曰用氣當寬舒不當急疾勤勞也弼曰谷神谷中央無谷也無形無影無逆無違處卑不動守靜不衰谷以成而不見其形此至物也處卑而不可得名故謂之天地之根綿綿若存用之不勤門玄牝之所由也本其所由與極同體故謂之天地之根也欲言存邪則不見其形欲言亡邪萬物以之生故綿綿若存也無物不成用而不勞也故曰用而不勤也雱曰動而愈出何勤之有道徳眞經集註卷之一
