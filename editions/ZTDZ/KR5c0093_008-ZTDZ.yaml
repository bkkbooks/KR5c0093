front:
  text: 道德眞經集註卷之八恃一
  hash: sha256:c0d0e18a2321c98b542b652c0d7c255a085e30b2b3de5eae0feceaccb400c6bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0093_SJB_008-130072c, image: sjb/13/130072c.png}
body:
  text: 明皇河上公王弼王雱註使我介然章第五十三使我介然有知行於大道河曰介大也老子疾時王不行大道故設此言使我介然有知於政事我則行於大道躬無爲之化唯施是畏明皇曰老君言若使我耿介然矜其有知欲行大道既與道不合故唯所施爲是皆可畏河曰唯獨也獨畏有所施爲失道意欲賞善恐僞善生欲信忠恐詐忠起弼曰言若使我可介然有知行大道於天下唯施爲是畏也雱曰小有知於道而由大道以行者已憚於施設矣况大有知者乎何則至人之道不以末傷本者也施爲盛於外則根本虚於内矣故終篇云大道甚夷河曰夷平易也而民好徑明皇曰大道平易是畏有知而人多故欲心求捷如彼行人好從邪徑邪徑之弊具如下文河曰徑邪不平正也大道甚平易而民好從邪徑也弼曰言大道蕩然正平而民猶尚舍之而不由好從邪徑況復施爲以塞大道之中乎故曰大道甚夷而民好徑雱曰徑茍一時之速明迷於大道而好施者皆由用近智而無遠圖也朝甚除明皇曰尚賢矜智生巧偽除理也河曰高臺榭宫室修弼曰朝宫室也除潔好也田甚蕪明皇曰浮食惰業廢農事河曰農事廢不耕治倉甚虛明皇曰南畝不收無儲積河曰五穀傷害國無儲也弼曰朝甚除則田甚蕪倉甚虚矣設一而衆害生也雱曰田事治倉積實國之本也今務除其朝廷以爲一時之榮觀而不恤根本之已竭豈持乆之道乎明以末傷本者皆然也服文綵明皇曰刻雕綺綉害工利河曰好飾偽貴外華帶利劍明皇曰文德不修尚武備河曰尚剛强武且奢厭飲食明皇曰烹肥擊鮮重滋味厭飫足也資財有餘明皇曰聚斂積實饒珍異河曰多嗜欲無定時雱曰侈費於外以取一時之適而忘本業此明好施以傷本者一本作貨財是謂盜誇河曰百姓不足而君有餘者是由劫盜以爲服飾持行誇人不知身死家破親戚并隨也非道也哉明皇曰矜其有知動以成弊行同盜竊仍自矜誇誇盜非道適令興歎也哉哉者歎辭也河曰人君所行如是此非道也復言也哉者痛傷之辭弼曰凡物不以其道得之則皆邪也邪則盜也誇而不以其道得之盜誇也貴而不以其道得之竊位也故舉非道以明非道則皆盜誇也雱曰盜者偷頃刻之榮誇者矜身外之飾爲道者深根固本用之不窮豈務施以徇外哉善建不拔章第五十四善建者不拔明皇曰善能以道建國立本者不可傾拔也河曰建立也善以道立身立國者不可得引而拔也弼曰固其根而後營其末故不拔也雱曰建中也善抱者不脱明皇曰善能以道懷抱百姓者不可脱離河曰善以道抱精神者終不可拔引解脱弼曰不貪於多齊其所能故不脱也雱曰抱一也子孫以祭祀不輟明皇曰言善以道德建抱之君功施於後愛其甘棠况其子孫乎而王者祖有功宗有德故周之興也起於后稷成於文武周之祭也郊祀后稷宗祀文王故雖卜代三十卜年七百而后稷文王郊宗之祀不輟止也河曰爲人子孫能修道如是長生不死世世以久祭祀先祖宗廟無絶時弼曰子孫傳此道以祭祀則不輟也雱曰聖人修己治人要在乎建中抱一此萬法之極致天地有終而不可易者也故能貽法無窮功彼四海而天人歸德澤及苗裔也一本無以字修之身其德乃眞明皇曰修道於身德乃眞純河曰修道於身愛氣養神益壽延年其德如是乃爲眞人修之家其德乃餘明皇曰一家盡修德乃餘美河曰修道於家父慈子孝兄友弟順夫信妻貞其德如是乃有餘慶及於來世子孫弼曰以身及人也修之身則眞修之家則有餘修之不廢所施博大修之鄕其德乃長明皇曰一鄉盡修德乃長久河曰修道於鄉尊敬長老愛養幼少教誨愚鄙其德如是乃無不覆及也修之國其德乃豐明皇曰一國盡修德乃豐盈河曰修道於國則君信臣忠仁義自生禮樂自興政平無私其德如是乃爲人厚也修之天下其德乃普明皇曰若天下盡修其德施乃周普矣河曰人主修道於天下不言而化不教而治下之應上信如影響其德如是乃爲普博雱曰因修身之法而推之以及其外餘而後長長而後豐豐而後普故以身觀身明皇曰以修身之法觀身能清靜者眞河曰以修道之身觀不修道之身孰亡孰存也以家觀家明皇曰以修家之法觀家能和睦者有餘河曰以修道之家觀不修道之家也以鄕觀鄉明皇曰以修鄉之法觀鄉能順序者乃長河曰以修道之鄉觀不修道之鄉也以國觀國明皇曰以修國之法觀國能勤儉者乃豐河曰以修道之國觀不修道之國也弼曰彼皆然也以天下觀天下明皇曰以修天下之法觀天下能無爲者乃普河曰以修道之主觀不修道之主也弼曰以天下百姓心觀天下之道也天下之道逆順吉凶亦皆如人之道也雱曰聖人之於有物也盡理之極而不容私智故無不克也故修身則法一身之理盡一身之理則身治矣自此以往施一家則一家以爲心治一鄉則一鄉以爲法夫然故所遇彌廣而彌有餘也書曰天聰明自我民聰明聖人天而已矣吾何以知天下之然哉以此明皇曰以此觀身等觀之則可以爾河曰老子言吾何以知天下修道者昌背道者亡以此五事觀而知之弼曰此上之所云也言吾何以得知天下乎察己以知之不求於外也所謂不出户以知天下者也雱曰聖人所守一道更無異說故其所以爲所以知皆由此道也含德之厚章第五十五含德之厚河曰謂含懷道德之厚者比於赤子明皇曰至人含懷道德之厚者其行比於赤子河曰神明保祐含德之乆若父母之於赤子也雱曰德性未嘗不厚而必至於薄者欲慮使然也故全其天眞而不以外耗内則淳氣中積而人道充至可名於大矣然則足以馴虎豹服鬼神無足怪也或曰赤子何以不能曰夫淳氣之守豈一身之所能末世之俗雖有赤子之形而原其失眞蓋已乆矣世何足以知此哉毒蟲不螫河曰蜂蠆蛇虺不螫猛獸不據攫鳥不搏明皇曰至人神矣物不能傷既無害物之心故無螫摶之地此至人之含德也河曰赤子不害於物物亦不害之故太平之世人無貴賤皆有仁心有刺之物還反其本有毒之蟲不傷於人弼曰赤子無求無欲不犯衆物故毒螫之物無犯於人也含德之厚者不犯於物故無物以損其全也雱曰淳氣之守足以爲此竊嘗論之萬物所以相傷者氣有所受也人爲萬物貴所禀至和而或見侵於物者失其常故也故陰陽以沖氣爲和夫唯守眞氣之沖和則物豈能傷之哉然猶大人之德耳未聖也骨弱筋柔而握固河曰赤子筋骨柔弱而持物堅固以其意心不移也弼曰以柔弱之故故握能堅固未知牝牡之合而䘒作弼曰作長也無物以損其身故能全長也言含德之厚者無物可以損其德渝其眞柔弱不爭而不摧折皆若此也精之至也河曰赤子未知男女之合會而陰作怒者由精氣多之所致也雱曰非有慕好於外而䘒作則是順其氣之自運而不以心者也若夫目營於外而心佚於内則精喪而死矣安能乆乎舉世之大患莫大於此而學者之至戒也䘒一作全終曰號而嗌不嗄弼本嗄作噫弼曰無爭欲之心故終日出聲而不噫也和之至也明皇曰赤子骨弱筋柔而能握拳牢固未知陰陽配合而含氣之源動作者猶精粹之至終日啼號而聲不嘶嗄猶純和之至此赤子之全和也河曰赤子從朝至暮啼號聲不變易者和氣多之所致雱曰孟子曰以直養而無害則塞乎天地之間此則和氣也在彼則稱其浩在此則稱其和所稱則異而氣一也故心氣交使迷理失常以至於斃者豈其禀或殊哉持之非其道耳全德之人雖形與物接而心常泊然故雖用氣而氣自動耳故但動而無動之累然則其淳氣之守孰能擾之哉故雖年躋壯老而不失其赤子之常廣成子修身千二百歲而形不衰者如斯而己嗄之爲言夏也夏者天和發散之時嗌之嗄者和氣不積故也一本作噫散噫氣之噫噫信也亦通知和曰常明皇曰能如嬰兒固守和柔是謂知常之行河曰人能知和氣之柔弱有益於人者則爲知道之常也弼曰物以和爲常故知和則得常也雱曰復命之常體神也知和之常守氣也知守氣則可以言復命矣未至乎復命也此兩者聖之所以聖賢之所以賢更無它道古之學者一出乎此大道既隱士逐末而不知本學始有外此者矣常者性有定分能盡其性則自别於物而物莫能遷故曰常蓋自性分之外一皆蠱僞無有常者知常曰明明皇曰守和知常是曰明了河曰人能知道之常行則曰以明達於玄妙也弼曰不皦不昩不温不凉此常也無形不可得而見曰明也雱曰不知常之人雖有察物之小智而闇於大本矣可謂明乎益生曰祥明皇曰祥者吉凶之兆言人不知守常而求益生越分動之死地是曰凶祥河曰祥長也言益生欲自生日以長大弼曰生不可益益之則妖也雱曰生理至足無欠無餘以直養之則亦至矣從而增焉秖以爲贅祥非常之事也心使氣曰强明皇曰心有是非氣無分别若役心使氣是曰强梁之人河曰心當專一和柔而氣實内故形柔而反使妄有所爲和氣去於中故形體自以剛强也弼曰心宜無有使氣則强雱曰有心以使氣則氣復使心心氣交使則天和雕喪損其眞矣人所受者不可益損故增生損氣俱爲失理孟子有揠苗不芸之戒而老子有益生使氣之說凡以全其淳氣而已此强非自勝之强强梁之强也物壯則老河曰萬物壯極則枯老也是謂不道河曰老不得道雱曰人之有壯老者形也若夫定分則常而不遷矣失性之人形化而心興之變故壯則血氣充溢而老則精神衰憊唯含德之厚者不然吾心未嘗移則氣亦有常而不變故雖外有壯老而心不異乎赤子之時此有道者也凡易於歳時而隨壯老以化者物而已矣豈道也哉不道早已明皇曰凡物壯極則衰老故戒云矜壯恃强謂不合於道當須早已河曰不得道者早已死也雱曰不道之人雖其少時已失生理故曰早已知者不言章第五十六知者不言河曰知者貴行不貴言也弼曰因自然也雱曰理極於無言言者不知明皇曰知了悟也言辯說也河曰駟不及舌多言多患弼曰造事端也雱曰惟其有言已非知理塞其兊明皇曰了悟者於法無愛染於言無執滯故云塞其兊雱曰其神無郤閉其門明皇曰既無愛染則嗜欲之門閉矣河曰塞閉之者欲絶其源挫其銳河曰情欲有所銳爲當念道無爲以挫止之弼曰含守質也解其紛河曰紛結恨不休當念道無爲以釋之弼曰除爭原也和其光河曰雖有獨見之明當和之使闇昩不使曜亂弼曰無所特顯則物物無偏爭也同其塵河曰不當自别殊也弼曰無所特賤則物物無偏耻也雱曰眞知者其處己如此是謂玄同明皇曰解貝如道沖章彼則約道此則約人言人能體道是謂與玄同德也河曰玄天也人能行此上事是謂與天同道也雱曰道至於玄而物我爲一者不立己以敵物故物不得而有之故不可得而親明皇曰玄同無私故不可得而親河曰不以榮譽爲樂獨立爲哀不可得而踈明皇曰汎然和衆故不可得而踈河曰志靜無欲與人無怨弼曰可得而親則可得而踈也不可得而利明皇曰無欲故不可得而利河曰身不欲富貴口不欲五味不可得而害明皇曰不爭故不可得而害河曰不與貪爭利不與勇爭氣弼曰可得而利則可得而害也不可得而貴明皇曰體道自然故不可得而貴河曰不爲亂世主不處闇君位亦不可得而賤明皇曰洗然無滓故不可得而賤河曰不以乘權故驕不以失志故屈弼曰可得而貴則可得而賤也故爲天下貴明皇曰體了無滯言忘理暢銳紛盡解光塵亦同既難親疏不可貴賤故爲天下至貴矣河曰其德如此天子不得臣諸侯不得屈與世沉浮容身避害故爲天下貴也弼曰無物可以加之者雱曰不言者非密而不言誠無所事言何則不見一法故也不見一法故物物而不物於物况可得而親疏貴賤者物而已矣彼物物而不物於物故莫之爵而常貴也以正治國章第五十七以正治國河曰以至也天使正身之人使至有國也雱曰治國在乎盡道之正而已無容私智以竒用兵河曰奇詐也天使詐僞之人使用兵也雱曰兵非有道之器而聖人所不能無但不以爲常故曰以奇用也以無事取天下明皇曰在宥天下貴乎無若以政教理國奇詐用兵斯皆不合於道唯無事無爲可以取天下此三句標也河曰以無事無爲之人使取天下爲之主弼曰以道治國則國平以正治國則奇兵起也以無事則能取天下也上章云其取天下者常以無事及其有事不足以取天下也故以正治國則不足以取天下而以奇用兵也夫以道治國崇本以息末以正治國立辟以攻末本不立而末淺民無所及故必至於奇用兵也雱曰以正治國則天下自服奚以有事爲哉蓋天下神器唯無爲者能有之故下云吾何以知其然哉以此明皇曰以此下知之河曰此今也老子言我何以知天意然哉以今日所見知之也夫天下多忌諱而民彌貧明皇曰以政理國動多忌諱人失作業政令彌貧河曰天下謂人主也忌諱者防禁也令煩則姦生禁多則下作相殆故貧雱曰事爲之禁則民擾而失業故貧也此亂之所始民多利器國家滋昏明皇曰利器謂權謀人主以權謀爲多不能反實下則應之以詐譎故令國家滋益昏亂河曰利器者權也民多權則視者眇於目聽者惑於耳上下不親故國家昏亂弼曰利器凡所以利己之器也民强則國家弱雱曰有利器則必有機心機心生則下難知故國家昏也人多伎巧奇物滋起明皇曰人主以伎巧爲多不能見素下則應之以奢泰故令淫奇之物滋起也河曰人謂人君百里諸侯也多知伎巧謂刻畫宫觀雕琢服章奇物滋起下則化上飾金鐵玉文綉綵色日以滋甚弼曰民多智慧則巧僞生巧偽生則邪事起雱曰古初之民器用鄙樸下逮末俗製作彌精巧思日生風俗愈弊非常之事由此滋多一本利作伎法令滋彰盜賊多有明皇王弼二本物作令明皇曰無爲既失法令益明竊法爲奸盡成盜賊豈非多有乎河曰法物好物也珍好之物滋生彰著則農事廢飢寒並至故盜賊多有也弼曰立正欲以息邪而奇兵用多忌諱欲以耻貧而民彌貧利器欲以强國者也而國愈昏多皆舍本以治末故以致此也故聖人云河曰謂下事也我無烏而民自化河曰聖人言我修道承天無所改作而民自化成也雱曰無爲則體常上體常則民亦體常故自化申上文利器之義我好靜而民自正河曰聖人言我好靜不言不教民皆自忠正也雱曰好靜則復性上復性則民亦復其性故自正申上文盜賊之義我無事而民自富河曰我無徭役徵召之事民安其業故皆自富雱曰無爲好靜故能無所事而民遂其生夫豈多忌諱哉我無欲而民自樸明皇曰無爲則清靜故人自化無事則不擾故人自富好靜則得性故人自正無欲則全和故人自樸此無事取天下矣河曰我常無欲去華文微服飾民則隨我爲質樸也弼曰上之所欲民從之速也我之所欲唯無欲而民亦無欲而自樸也此四者崇本以息末也雱曰申上文奇物之義竊嘗論曰聖人之治也化之以無爲正之以好靜使各遂於富庶而要其終也復之樸而已夫然則豈有利器奇物而假法令以爲之制哉凡民之所以毁樸趨僞皆在於多欲也上誠無欲則民安得欲乎此帝皇之極致也一本自富在自正前其政悶悶者第五十八其政悶悶河曰其政教寬大悶悶昩昩似若不明也其民淳淳明皇曰政教悶悶無爲寬大人則應之淳淳然而質樸矣河曰政教寬大故民淳淳富厚相親睦也弼曰言善治政者無形無名無事無正可舉悶悶然卒至於大治故曰其政悶悶也其民無所爭競寬大淳淳故曰其民淳淳也其政察察河曰其政教急疾言决於口聽决於耳也雱曰察察治已甚也其民缺缺明皇曰政教察察有苛急人則應之缺然而凋弊矣河曰政急民不聊生故缺缺日以疏薄弼曰立刑名明賞罰以檢姦僞故曰察察也殊類分析民懷爭競故曰其民缺缺雱曰缺如器物破缺言不全也禍兮福之所倚河曰倚因也夫禍因福而生人遭禍而能悔過責己修善行道則禍去而福來福兮禍之所伏河曰禍伏匿於福中人得福而爲驕恣則福去禍來也孰知其極明皇曰倚因也伏藏也上言其政悶悶俗則以爲無政理之體人反淳淳然而質樸此則禍爲福之所因也其政察察而俗則以爲有政理之術人乃缺缺然而凋弊此福爲禍之所藏也河曰禍福相生誰能知其窮極時雱曰萬物通乎一氣而一氣之運往而復返終則有初轉徙如流無有窮極故禍福相代如彼四時聖人唯知其然故事貴適中不爲已甚若夫察察之政欲崇正而禁奇止妖而興善以盡天下之福而不知竒正相生妖善迭化志欲爲福而不知福極爲禍故莊周寓言於才與不才之間然則推而爲政其亦在察與不察之間乎故曰其政悶悶蓋如上說則其於善惡是非若有所不辨是以小智覩之意或不快也此句與荒兮未央之語同蓋彼齊唯阿此等禍福理皆一致其無正邪明皇王弼二本正下有邪字河曰無不也謂人君不正其身其無國也雱曰言誰知善治之極乎唯無正可舉無刑可名悶悶然而天下大化是其極也雱曰大運不留當時者爲是欲定奇正而不知正不可常則可謂知乎雖然以爲無正者是以無正爲正者也邪者疑辭亦不定乎無正也正復爲奇河曰奇詐也人君不正下雖正復化上爲詐也弼曰以正治國則便復以奇用兵矣故正復爲奇善復爲妖明皇曰禍福之極豈無正邪但衆生迷執正者復以爲奇詐善者復以爲妖祥故禍福倚伏若無正爾河曰善人皆復化上爲妖祥也弼曰立善以和物則便復有妖妖佞之患也人之迷其日固久明皇曰以正爲奇以善爲妖如此迷倒其爲日也固以乆矣河曰言人君迷惑失正以來其日已固久弼曰言人之迷惑失道固乆矣不可便正善治以責雱曰民失其性而不冥夫道自有生以來蓋已如此非一日之積矣而爲政者方乃事其察察然而欲使天下畢協於吾一偏之正既爲不可而又不知其所謂正者未嘗正也聖人則不然雖方廉且直以道德之光燭天下而體常混然不示人以迹故民得安常復樸而風俗淳淳也豈曰小補之哉是以聖人方而不割河曰聖人行方正者欲以率下不以割截人也弼曰以方導物舍去其邪不以方割物所謂大方無隅雱曰大方無隅言混然也若有割絶之迹則與物分界矣廉而不劌明皇王弼二本害作劌河曰聖人廉清欲以化民不以傷害人也今則不然正己以害人也弼曰廉清廉也劌傷也以清廉清民令去其污不以清廉劌傷於物也雱曰雖有廉隅不至於劌也一本劌作穢非直而不肆河曰肆申也聖人雖直曲已從人不自申之也弼曰以直導物令去其僻而不以直激沸於物也所謂大直若屈也雱曰直而肆則有其直大直於理爲直而常委曲以從理光而不耀明皇曰聖人善化不割彼而爲方不劌彼而爲廉不申彼而爲直不耀彼而爲光修之身而天下自化矣肆申也河曰聖人雖有獨知之明常如暗昩不以耀亂人也弼曰以光鑒其所以迷不以光照求其隱匿也所謂明道若昩也此皆崇本以息末不攻而使復之也雱曰光以爚物謂之耀和其光歸其明者豈耀以爚物哉治人事天章第五十九治人河曰謂人君治理人民事天河曰事用也當用天道順四時莫若嗇明皇曰嗇愛也人君將欲治人事天之道莫若愛費使倉禀實人知禮節三時不害則天降之嘉祥人和可以理人天保可以事天矣河曰嗇貪也治國者當愛民財不爲奢泰治身者當愛精氣不放逸弼曰莫如猶莫過也嗇農夫農人之治田務去其殊類歸於齊一也全其自然不急其荒病除其所以荒病上承於天命下綏百姓莫過於此雱曰治人在乎正己事天在乎盡性此兩者一於嗇而已葆其精神不以外耗内者嗇也人之本眞充塞六極無所不徧而終至於不足者侈有爲而輕自用故也唯嗇也故能全吾所受命於天而不多費於妄作然則性其有不盡者乎己其有不正者乎孟子曰盡其心知其性所以事天也蓋全其初之所命則天心得矣人則與我同其所受者也我誠全則同者應矣其於治也何有哉夫唯嗇是以早復明皇曰何以聚人曰財故能儉愛則四方之人將襁負而至早服事其君矣服事也河曰早先也服德也夫獨愛民財愛精氣則能先得天道也弼曰復常也雱曰動極而靜則其復晩矣唯嗇者不侈於費己其去本也未嘗遠故復靜爲早一本復作服非早復謂之重積德明皇曰夫能儉嗇以是有德人歸有德早事其君故云重積德河曰光得大道是謂重積德於己也弼曰唯重積德不欲銳速然後乃能使早復其常故曰早復謂之重積德者也雱曰德不外耗則積於内矣積於内而資納無窮其爲積也積之又積者也重積德則無不克明皇曰聖人積德四海歸仁則無有不能制服者矣克能也河曰克勝也重積德於己則無不勝雱曰盡性之人蓋將生天生地宰制造化其於事物何所不能無不克則莫知其極明皇曰人君之德無有不能制御者則無遠不至故四方莫知其窮極也河曰無不克勝則莫有知己德之窮極也弼曰道無窮也雱曰盡性則大矣大而化之則聖矣化則無窮故莫知其極也莫知其極可以有國明皇曰莫知其窮極然後可以爲有國河曰莫知己德有極則可以有社稷爲民致福弼曰以有窮而莅國非能有國也雱曰聖人糠粃土苴足以陶鑄堯舜其於有國也何有有國之母可以長乆明皇曰有國而茂養百姓者則其福祚可以長乆矣河曰國身同也母道也人能保身中之道使精氣不勞五神不苦則可以長久弼曰國之所以安謂之母重積德是唯圖其根然後營末乃得其終也雱曰有國之母所以有國者也莫知其極者是是謂深根固柢河曰人能以氣爲根以精爲蒂如樹根不深則枝蒂不堅則落言當深藏其氣固守其精使無漏泄雱曰人以性命爲根外乎此者枝葉也失性之人盛枝葉以傷根根傷則精氣衰而蒂不固此所以早斃也夫唯嗇則不以外傷其根根深則蒂固蒂固則形連乎命而遲脱矣柢一本作蒂音義同長生乆視之道明皇曰積德有國則根深而蒂固矣深固者是長生乆視之道河曰深根固蒂者乃長生乆視之道雱曰精神發見於目故人死則目暝而無光能嗇以深根則蒂固而根深其視久矣治大國章第六十治大國若烹小鮮明皇曰烹小鮮者不可撓理大國者不可煩煩則人勞撓則魚爛河曰鮮魚烹小魚不去腸不去鱗不敢撓恐其糜也治國煩則下亂治身煩則精散弼曰不擾也躁則多害靜則全眞故其國彌大而其主彌靜然後乃能廣感衆心矣雱曰烹鮮之術唯待其自熟無所施其巧攪而撓之則潰矣治國之道亦然大國小鮮者明所治雖大得其道則甚易爲也以道莅天下者其鬼不神明皇曰以道臨莅天下不求有妄之福故鬼無以見其神明河曰以道德居位治天下則鬼不敢見其精神以犯人也弼曰治大國則若烹小鮮以道莅天下則其鬼不神也雱曰民不擾則得盡其性民盡其性則天地之和應而萬物無不遂矣故鬼亦安其處而不能爲神也人鬼殊道而每至於相干者陰陽之氣有盩而交失其所故萬物得乘釁矣非其鬼不神其神不傷人明皇曰上言其鬼不神非謂鬼歇滅而無神但有其神而不見怪以傷人也河曰其鬼非無精神也邪不入正不能傷自然之民弼曰神不害自然也物守自然則神無所加神無加則不知神之爲神也非其神不傷人聖人亦不傷人明皇曰鬼見神怪則傷人聖人有爲則傷人今鬼所以不見神怪而傷人者蓋以聖人無爲清靜故爾河曰非鬼神不能傷害人以聖人在位不傷害人故鬼不敢干之也弼曰道洽則神不傷人神不傷人則不知神之爲神道洽則聖人亦不傷人聖人不傷人則亦不知聖人之爲聖也猶云非獨不知神之爲神亦不知聖人之爲聖也夫恃威網以使物者治之衰也使不知神聖之爲神聖道之極也雱曰唯聖人不傷人故天地之和應而人鬼各遂兩不相傷也夫兩不相傷河曰鬼與聖人俱兩不相傷也故德交歸焉明皇曰鬼神傷人則害國虧本聖人傷人則匱神乏祀今兩不相傷物故德交歸焉河曰夫兩不相傷人得治於陽鬼得治於陰人得全其性命鬼得保其精神故德交歸焉弼曰神不傷人聖人亦不傷人聖人不傷人神亦不傷人故曰兩不相傷也神聖合道交歸之也雱曰人歸德於鬼鬼歸德於人道德眞經集註卷之八
